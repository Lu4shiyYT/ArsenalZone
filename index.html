<!DOCTYPE html>
<html lang="ru">
<head>

    <title>ArsenalZone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg: #1b1b1b; --panel: #2a2a2a; --text: #ccc; --accent: #ffd700;
            --usual: #a0a0a0; --frequent: #7a9eb1; --conveyor: #4b69ff;
            --rare: #8845ff; --unique: #d32ce6; --relic: #e74c3c; --gold: #ffd700;
            --button: #3a3a3a; --button-hover: #4d4d4d;
            --danger: #e74c3c; --success: #2ecc71; --battlepass: #ff6a00;

        body {

            display: flex; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        header {
            background: var(--panel); padding: 10px 15px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid #444; flex-shrink: 0; flex-wrap: wrap; gap: 5px;

        .balance { font-weight: bold; color: var(--gold); }
        .energy { font-size: 0.9em; color: #4fc3f7; }
        .battlepass-header { color: var(--battlepass); font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        nav {
            display: flex; background: var(--panel); border-top: 1px solid #444; flex-shrink: 0; overflow-x: auto;
        }
        nav button {
            flex: 1 0 auto; padding: 12px 5px; background: transparent; color: var(--text); border: none;
            border-bottom: 3px solid transparent; font-size: 0.85rem; cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        nav button.active { border-bottom-color: var(--accent); color: #fff; }
        main {
            flex: 1; overflow-y: auto; padding: 10px 10px 60px 10px; display: flex; flex-direction: column;
        }
        .view { display: none; flex: 1; flex-direction: column; }
        .view.active { display: flex; }
        .inventory-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; position: relative; }
        @media (max-width: 600px) { .inventory-grid { grid-template-columns: repeat(3, 1fr); } }
        .item-card {
            background: var(--panel); border-radius: 6px; padding: 5px; border-left: 4px solid var(--usual);

            align-items: center; min-height: 120px; justify-content: center;

        .item-card:hover { background: #3a3a3a; }
        .item-name { font-size: 0.7rem; text-align: center; margin: 4px 0; }
        .item-wear { font-size: 0.6rem; color: #999; }
        .item-card[data-rarity="Usual"] { border-left-color: var(--usual); }
        .item-card[data-rarity="Frequent"] { border-left-color: var(--frequent); }
        .item-card[data-rarity="Conveyor-type"] { border-left-color: var(--conveyor); }
        .item-card[data-rarity="Rare"] { border-left-color: var(--rare); }
        .item-card[data-rarity="Unique"] { border-left-color: var(--unique); }
        .item-card[data-rarity="Relic"] { border-left-color: var(--relic); }
        .item-card[data-rarity="Gold"] { border-left-color: var(--gold); }
        .item-img { width: 80px; height: 60px; object-fit: contain; margin-bottom: 5px; }
        .favorite-badge { position: absolute; top: 5px; right: 5px; font-size: 1rem; color: var(--accent); }
        .stattrack-label { position: absolute; top: 5px; left: 5px; font-size: 0.65rem; color: #ff8c00; font-weight: bold; }
        .new-badge { position: absolute; top: 2px; right: 2px; background: #ff4444; color: white; padding: 1px 4px; font-size: 0.6rem; border-radius: 3px; z-index: 2; }
        .item-stickers { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; justify-content: center; }
        .item-stickers img { width: 20px; height: 15px; object-fit: contain; }
        .sticker-wrapper { position: relative; display: inline-block; }
        .sticker-tooltip {

            white-space: nowrap; z-index: 50; display: none; pointer-events: none;

        .modal {

        .quest-item { background: var(--panel); padding: 10px; margin: 5px 0; border-radius: 5px; }
        .achievement { background: var(--panel); padding: 8px; margin: 4px 0; border-radius: 5px; display: flex; justify-content: space-between; }
        .sticker-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        .sticker-select-item { background: var(--button); border-radius: 6px; padding: 5px; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .sticker-select-item:hover { background: var(--button-hover); }
        .sticker-select-item img { width: 50px; height: 40px; object-fit: contain; }
        .sticker-rarity-bar { width: 100%; height: 6px; border-radius: 2px; }
        .rarity-bar { width: 100%; height: 4px; margin-top: 4px; border-radius: 2px; }

            position: relative; overflow: hidden; display: flex; flex-direction: column; pointer-events: auto;

        #console-modal .drag-handle { cursor: move; background: #111; padding: 5px 10px; color: #0f0; font-weight: bold; flex-shrink: 0; }
        #console-log { flex: 1; overflow-y: auto; padding: 5px; white-space: pre-wrap; font-size: 13px; }
        .resize-handle { position: absolute; z-index: 10; background: transparent; }
        .resize-n { top: 0; left: 0; right: 0; height: 6px; cursor: n-resize; }
        .resize-s { bottom: 0; left: 0; right: 0; height: 6px; cursor: s-resize; }
        .resize-e { top: 0; bottom: 0; right: 0; width: 6px; cursor: e-resize; }
        .resize-w { top: 0; bottom: 0; left: 0; width: 6px; cursor: w-resize; }
        .resize-ne { top: 0; right: 0; width: 12px; height: 12px; cursor: ne-resize; }
        .resize-nw { top: 0; left: 0; width: 12px; height: 12px; cursor: nw-resize; }
        .resize-se { bottom: 0; right: 0; width: 12px; height: 12px; cursor: se-resize; }
        .resize-sw { bottom: 0; left: 0; width: 12px; height: 12px; cursor: sw-resize; }
        .trade-item { position: relative; }
        .trade-item.selected::after { content: '✅'; position: absolute; top: 2px; right: 2px; font-size: 1.2rem; }
        #trade-modal .modal-content {

        #sound-toggle { background: transparent; border: none; font-size: 1.3rem; cursor: pointer; padding: 0 5px; color: var(--text); }
        .inventory-counter { margin-bottom: 8px; font-size: 0.9rem; color: var(--accent); }
        .selected-for-transfer { outline: 2px solid var(--accent); }
        .storage-card { border-left: 4px solid #ffaa00!important; background: #2a2a2a; }
        .storage-icon { font-size: 2.5rem; margin-bottom: 5px; }
        .storage-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;

            border-bottom: 1px solid #444;
        }
        #storage-modal .modal-content {
            width: 100%; height: 100%; max-width: none; max-height: none; border-radius: 0;
            padding: 10px; display: flex; flex-direction: column;
        }
        #storage-content { flex: 1; overflow-y: auto; }
        #item-detail-modal, #case-modal { z-index: 1100; }
        .bulk-controls { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .transfer-buttons { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .sell-controls { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 10px; }
        #item-detail-modal .modal-content.fullskin {
            background: #1b1b1b; max-width: 100vw; max-height: 100vh; width: 100vw; height: 100vh;
            border-radius: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            position: relative; overflow: hidden;

        .fullskin .skin-header { text-align: center; padding: 15px 20px 5px; flex-shrink: 0; }
        .fullskin .skin-header h2 { margin: 0; color: #fff; font-size: 1.8rem; }
        .fullskin .skin-header .stat-track { color: #ff8c00; margin-right: 5px; }
        .fullskin .skin-header .collection-name { color: #aaa; font-size: 0.9em; }
        .fullskin .rarity-line { width: 100%; height: 3px; margin-top: 4px; }
        .fullskin .skin-image-area {

        .fullskin .skin-image-area img { max-width: 90%; max-height: 50vh; object-fit: contain; }

        .fullskin .bulk-nav.right { right: 10px; }
        .fullskin .close-fullskin {

        .battlepass-item:hover { background: var(--button-hover); }

    formatPrice(value) {
        if (isNaN(value)) return '0,00';
        let parts = value.toFixed(2).split('.');
        let intPart = parts[0];
        let decPart = parts[1];
        intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        return intPart + ',' + decPart;
    }

    safeGet(k, d) {
        try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return this._memory[k] || d; }
    }

    safeSet(k, v) {
        try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { this._memory[k] = v; }
    }

    loadState() {
        let s = this.safeGet('arsenalzone_save', null);
        if (!s) s = this.defaultState();
        if (typeof s.balance !== 'number') s.balance = 100;
        if (typeof s.energy !== 'number') s.energy = 50;
        if (typeof s.maxEnergy !== 'number') s.maxEnergy = 50;
        if (typeof s.lastEnergyTime !== 'number') s.lastEnergyTime = Date.now();
        if (!s.stats || typeof s.stats !== 'object') s.stats = { casesOpened:0, itemsCollected:0, goldItems:0, upgrades:0, tttWins:0 };
        if (!s.quests || typeof s.quests !== 'object') s.quests = { daily: [], lastDailyReset: new Date().toDateString() };
        if (!Array.isArray(s.quests.daily)) s.quests.daily = [];
        if (!s.settings) s.settings = { language:'ru', soundEnabled: true };
        if (typeof s.settings.soundEnabled !== 'boolean') s.settings.soundEnabled = true;
        s.consoleLog = Array.isArray(s.consoleLog) ? s.consoleLog : [];
        if (!Array.isArray(s.storageUnits)) s.storageUnits = [];
        if (!s.marketFilters) s.marketFilters = { type:[], rarity:[], collection:[], name:'' };
        else {
            if (typeof s.marketFilters.type === 'string') s.marketFilters.type = s.marketFilters.type === 'all' ? [] : [s.marketFilters.type];
            if (typeof s.marketFilters.rarity === 'string') s.marketFilters.rarity = s.marketFilters.rarity === 'all' ? [] : [s.marketFilters.rarity];
            if (typeof s.marketFilters.collection === 'string') s.marketFilters.collection = s.marketFilters.collection === 'all' ? [] : [s.marketFilters.collection];
            if (!Array.isArray(s.marketFilters.type)) s.marketFilters.type = [];
            if (!Array.isArray(s.marketFilters.rarity)) s.marketFilters.rarity = [];
            if (!Array.isArray(s.marketFilters.collection)) s.marketFilters.collection = [];
        }
        this._itemCounter = s._itemCounter || 0;
        let maxSeq = 0;
        if (s.inventory) {
            s.inventory.forEach(i => {
                if (typeof i.sequence === 'number' && i.sequence > maxSeq) maxSeq = i.sequence;
            });
            if (maxSeq > this._itemCounter) this._itemCounter = maxSeq;
            s.inventory.forEach(i => {
                i.rarity = i.rarity || 'Usual';
                i.weaponType = i.weaponType || i.name || 'Unknown';
                i.skinName = i.skinName || '';
                i.wearCategory = i.wearCategory || 'Worn';
                i.pattern = i.pattern || 0;
                i.stickers = (i.stickers || []).map(s => {
                    if (typeof s === 'string') return { name: s, imageUrl: '', minPrice: 0 };
                    if (!s.rarity) s.rarity = this.getStickerRarityByName(s.name);
                    return s;
                });
                i.isFavorite = i.isFavorite || false;
                i.statTrack = i.statTrack || false;
                i.type = i.type || 'weapon';
                if (!i.image) i.image = i.imageUrl || this.generateItemImage(i);
                if (typeof i.minPrice !== 'number') i.minPrice = 0.1;
                if (i.type === 'case' || i.type === 'capsule') i.sellable = false;
                if (!i.acquiredDate || i.acquiredDate.length === 10) i.acquiredDate = new Date().toISOString().slice(0,16).replace('T',' ');
                if (i.purchasePrice !== undefined && typeof i.purchasePrice !== 'number') i.purchasePrice = undefined;
                if (typeof i.isNew === 'undefined') i.isNew = false;
                if (typeof i.sequence === 'undefined') i.sequence = ++this._itemCounter;
            });
        }
        if (!s.marketPurchaseHistory) s.marketPurchaseHistory = [];
        s._marketRefreshTimestamps = Array.isArray(s._marketRefreshTimestamps) ? s._marketRefreshTimestamps : [];
        this._marketRefreshTimestamps = s._marketRefreshTimestamps;
        if (!s.sortMode) s.sortMode = 'type_desc';
        if (typeof s.battlePasses !== 'number') s.battlePasses = 0;
        if (typeof s.battleStars !== 'number') s.battleStars = 0;
        if (typeof s.totalXp !== 'number') s.totalXp = 0;
        if (typeof s.currentXp !== 'number') s.currentXp = 0;
        s._itemCounter = this._itemCounter;
        return s;
    }

    getStickerRarityByName(name) {
        for (const col of Object.values(this.collections)) {
            if (col.stickersByRarity) {
                for (const [rarity, stickers] of Object.entries(col.stickersByRarity)) {
                    if (stickers.some(s => s.name === name)) return rarity;
                }
            }
        }
        return undefined;
    }

    generateItemImage(item) {
        if (!item || !item.name) return '';
        const c = document.createElement('canvas'); c.width = 200; c.height = 150;
        const ctx = c.getContext('2d');
        const rc = this.rarityColors[item.rarity] || '#888';
        const g = ctx.createLinearGradient(0,0,200,150);
        g.addColorStop(0, rc); g.addColorStop(1, '#111');
        ctx.fillStyle = g; ctx.fillRect(0,0,200,150);
        if (item.emoji) {
            ctx.font = '80px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(item.emoji, 100, 70);
        } else {
            ctx.fillStyle = 'white'; ctx.font = 'bold 24px "Segoe UI"';
            ctx.textAlign = 'center'; ctx.fillText(item.name, 100, 75);
        }
        ctx.font = '14px "Segoe UI"'; ctx.fillStyle = 'white';
        ctx.textAlign = 'center'; ctx.fillText(item.rarity, 100, 130);
        return c.toDataURL();
    }

    generateItem(colN, dropT, allowGold = true, chOvr = null) {
        const col = this.collections[colN];
        if (!col) return null;
        let chances = chOvr || col.odds || this.globalRarityChances;
        if (!allowGold) {
            chances = chances.filter(r => r.rarity !== 'Gold');
            if (chances.length === 0) return null;
        }
        let itT = dropT;
        if (!itT) {
            if (col.weaponsByRarity) itT = 'weapon';
            else if (col.stickersByRarity) itT = 'sticker';
            else if (col.agentsByRarity) itT = 'agent';
            else if (col.gloves) itT = 'gloves';
            else if (col.knife) itT = 'knife';
            else if (col.charmsByRarity) itT = 'charm';
            else return null;
        }
        const rand = Math.random() * 100;
        let cum = 0, selectedRarity = null;
        for (const r of chances) {
            cum += r.chance;
            if (rand < cum) { selectedRarity = r.rarity; break; }
        }
        if (!selectedRarity) selectedRarity = chances[0].rarity;
        if (selectedRarity === 'Gold') {
            if (col.gloves && col.gloves.length > 0) {
                itT = 'gloves';
            } else if (col.knife && col.knife.length > 0) {
                itT = 'knife';
            }
        }
        let pool;
        if (itT === 'weapon') pool = col.weaponsByRarity?.[selectedRarity];
        else if (itT === 'sticker') pool = col.stickersByRarity?.[selectedRarity];
        else if (itT === 'agent') pool = col.agentsByRarity?.[selectedRarity];
        else if (itT === 'gloves') pool = col.gloves;
        else if (itT === 'knife') pool = col.knife;
        else if (itT === 'charm') pool = col.charmsByRarity?.[selectedRarity];
        if (!pool || pool.length === 0) return null;
        const data = pool[Math.floor(Math.random() * pool.length)];
        if (!data) return null;
        const name = typeof data === 'string' ? data : data.name;
        let wt, sn;
        if (name && name.includes(' | ')) {
            const p = name.split(' | ');
            wt = p[0]; sn = p.slice(1).join(' | ');
        } else { wt = name; sn = ''; }
        let wear = 0, wc = '', pat = 0;
        if (itT !== 'agent' && itT !== 'sticker' && itT !== 'case' && itT !== 'capsule' && itT !== 'charm') {
            wear = this.MIN_WEAR + Math.random() * (this.MAX_WEAR - this.MIN_WEAR);
            if (wear < 0.05) wc = 'Freshly Made';
            else if (wear < 0.20) wc = 'Practically New';
            else if (wear < 0.50) wc = 'Lightly-Used';
            else if (wear < 0.70) wc = 'Worn';
            else wc = 'Heavily-Worn';
            pat = Math.floor(Math.random() * 10000);
        }
        const st = (itT === 'weapon' || itT === 'knife') && Math.random() < 0.1 && !['Sunrise'].includes(colN);
        let specialPattern = null;
        if (this.specialPatterns[name]) {
            for (const sp of this.specialPatterns[name]) {
                if (pat >= sp.min && pat <= sp.max) { specialPattern = sp; break; }
            }
        }
        return {
            id: Date.now() + Math.random().toString(36),
            type: itT,
            collection: colN,
            name,
            weaponType: wt,
            skinName: sn,
            rarity: selectedRarity,
            wear,
            wearCategory: wc,
            pattern: pat,
            stickers: [],
            isFavorite: false,
            statTrack: st,
            emoji: data?.emoji || '',
            imageUrl: data?.imageUrl || '',
            minPrice: data?.minPrice || 0.1,
            sellable: true,
            acquiredDate: new Date().toISOString().slice(0,16).replace('T',' '),
            specialPattern: specialPattern,
            isNew: true
        };
    }

    addItem(item) {
        if (!item.image) item.image = item.imageUrl || this.generateItemImage(item);
        if (!item.acquiredDate) item.acquiredDate = new Date().toISOString().slice(0,16).replace('T',' ');
        if (typeof item.isNew === 'undefined') item.isNew = true;
        item.sequence = ++this._itemCounter;
        this.state.inventory.push(item);
        if (typeof this.state.stats.itemsCollected === 'number') this.state.stats.itemsCollected++;
        if (item.rarity === 'Gold' && typeof this.state.stats.goldItems === 'number') this.state.stats.goldItems++;
        this.checkAchievements();
        this.saveState();
    }

    getItemPrice(item) {
        if (typeof item.minPrice === 'number') {
            if (item.type === 'weapon' || item.type === 'knife' || item.type === 'gloves') {
                let p = item.minPrice * (1 + (1 - item.wear) * 3.2);
                if (item.statTrack) p *= (item.type === 'knife' || item.type === 'gloves' ? 1.3 : 3);
                if (item.stickers && item.stickers.length > 0) {
                    item.stickers.forEach(s => { if (s.minPrice) p += s.minPrice * 0.3; });
                }
                if (item.specialPattern) p *= item.specialPattern.multiplier;
                return isNaN(p) ? 0 : p;
            }
            return item.minPrice;
        }
        const base = { Usual:0.3, Frequent:1, 'Conveyor-type':3, Rare:10, Unique:30, Relic:80, Gold:300 }[item.rarity] || 0.3;
        return base;
    }

    getSellPrice(item) {
        const base = this.getItemPrice(item) * 0.8;
        if (item.purchasePrice !== undefined && item.purchasePrice > 0) {
            return Math.min(base, item.purchasePrice * 0.8);
        }
        return base;
    }

    initSound() {
        const AC = window.AudioContext || window.webkitAudioContext;
        const ctx = new AC();
        return {
            play: (type) => {
                if (type === 'case_open' && this.state.settings.soundEnabled) {
                    const osc = ctx.createOscillator(), gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
                }
            }
        };
    }

    sortInventory(items) {
        const mode = this.state.sortMode || 'type_desc';
        const typeOrder = this.typeOrder;
        const rarityOrder = this.rarities;
        const compareTypes = (a, b, dir = 1) => {
            const ta = typeOrder.indexOf(a.type), tb = typeOrder.indexOf(b.type);
            return ta !== tb ? dir * (ta - tb) : 0;
        };
        const compareRarity = (a, b, dir = 1) => {
            const ra = rarityOrder.indexOf(a.rarity), rb = rarityOrder.indexOf(b.rarity);
            return ra !== rb ? dir * (rb - ra) : 0;
        };
        const compareWear = (a, b, dir = 1) => {
            const wa = a.wear || 0, wb = b.wear || 0;
            return dir * (wa - wb);
        };
        const compareStatTrack = (a, b) => (a.statTrack !== b.statTrack) ? (a.statTrack ? -1 : 1) : 0;
        const compareName = (a, b) => a.name.localeCompare(b.name);
        const typeDescComparator = (a, b) => {
            if (a.isFavorite !== b.isFavorite) return a.isFavorite ? -1 : 1;
            const typeCmp = compareTypes(a, b, 1);
            if (typeCmp !== 0) return typeCmp;
            const rarityCmp = compareRarity(a, b, 1);
            if (rarityCmp !== 0) return rarityCmp;
            const stCmp = compareStatTrack(a, b);
            if (stCmp !== 0) return stCmp;
            const nameCmp = compareName(a, b);
            if (nameCmp !== 0) return nameCmp;
            return compareWear(a, b, 1);
        };
        const reverseComparator = (cmp) => (a, b) => -cmp(a, b);
        switch (mode) {
            case 'type_desc': return items.sort(typeDescComparator);
            case 'type_asc': return items.sort(reverseComparator(typeDescComparator));
            case 'price_desc': return items.sort((a, b) => this.getItemPrice(b) - this.getItemPrice(a));
            case 'price_asc': return items.sort((a, b) => this.getItemPrice(a) - this.getItemPrice(b));
            case 'rarity_desc': return items.sort((a, b) => { const rc = compareRarity(a, b, 1); return rc !== 0 ? rc : typeDescComparator(a, b); });
            case 'rarity_asc': return items.sort((a, b) => { const rc = compareRarity(a, b, -1); return rc !== 0 ? rc : reverseComparator(typeDescComparator)(a, b); });
            case 'date_desc': return items.sort((a, b) => (a.sequence || 0) - (b.sequence || 0));
            case 'date_asc': return items.sort((a, b) => (b.sequence || 0) - (a.sequence || 0));
            default: return items.sort(typeDescComparator);
        }
    }

    arrayFilter(items, filterArr, getter) {
        if (!filterArr || filterArr.length === 0) return items;
        return items.filter(i => filterArr.includes(getter(i)));
    }

    getFilteredItems(excludeCases = false) {
        let items = [...this.state.inventory];
        items = this.arrayFilter(items, this.state.filterType, i => {
            if (i.type === 'case' || i.type === 'capsule') return 'case';
            return i.type;
        });
        items = this.arrayFilter(items, this.state.filterRarity, i => i.rarity);
        items = this.arrayFilter(items, this.state.filterCollection, i => i.collection);
        items = this.arrayFilter(items, this.state.filterWear, i => i.wearCategory);
        if (this.state.filterStatTrack === 'yes') items = items.filter(i => i.statTrack);
        else if (this.state.filterStatTrack === 'no') items = items.filter(i => !i.statTrack);
        const pmn = parseFloat(this.state.filterPatternMin), pmx = parseFloat(this.state.filterPatternMax);
        if (!isNaN(pmn)) items = items.filter(i => i.pattern >= pmn);
        if (!isNaN(pmx)) items = items.filter(i => i.pattern <= pmx);
        if (excludeCases) items = items.filter(i => i.type !== 'case' && i.type !== 'capsule');
        return this.sortInventory(items);
    }

    getStorageFilters(unitId) {
        if (!this._storageFilters[unitId]) {
            this._storageFilters[unitId] = {
                filterType:[], filterRarity:[], filterStatTrack:'all', filterWear:[],
                filterCollection:[], filterPatternMin:'', filterPatternMax:''
            };
        }
        return this._storageFilters[unitId];
    }

    getFilteredStorageItems(unitId) {
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return [];
        const filters = this.getStorageFilters(unitId);
        let items = [...unit.items];
        items = this.arrayFilter(items, filters.filterType, i => {
            if (i.type === 'case' || i.type === 'capsule') return 'case';
            return i.type;
        });
        items = this.arrayFilter(items, filters.filterRarity, i => i.rarity);
        items = this.arrayFilter(items, filters.filterCollection, i => i.collection);
        items = this.arrayFilter(items, filters.filterWear, i => i.wearCategory);
        if (filters.filterStatTrack === 'yes') items = items.filter(i => i.statTrack);
        else if (filters.filterStatTrack === 'no') items = items.filter(i => !i.statTrack);
        const pmn = parseFloat(filters.filterPatternMin), pmx = parseFloat(filters.filterPatternMax);
        if (!isNaN(pmn)) items = items.filter(i => i.pattern >= pmn);
        if (!isNaN(pmx)) items = items.filter(i => i.pattern <= pmx);
        return this.sortInventory(items);
    }

    getFilteredTransferItems() {
        let items = [...this.state.inventory];
        const f = this._transferFilters;
        items = this.arrayFilter(items, f.filterType, i => {
            if (i.type === 'case' || i.type === 'capsule') return 'case';

        if (!isNaN(pmn)) items = items.filter(i => i.pattern >= pmn);
        if (!isNaN(pmx)) items = items.filter(i => i.pattern <= pmx);
        return this.sortInventory(items);
    }

    createMultiSelect(containerId, options, selectedValues, onChange, placeholder) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        container.className = 'custom-multi-select';
        const label = document.createElement('div');
        label.className = 'select-label';
        label.textContent = placeholder;
        container.appendChild(label);
        const dropdown = document.createElement('div');
        dropdown.className = 'select-dropdown';
        options.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option';
            if (selectedValues.includes(opt.value)) div.classList.add('selected');
            div.textContent = opt.label;
            div.dataset.value = opt.value;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                const val = e.currentTarget.dataset.value;
                const idx = selectedValues.indexOf(val);
                if (idx > -1) selectedValues.splice(idx, 1);
                else selectedValues.push(val);
                div.classList.toggle('selected');
                this.updateMultiSelectLabel(container, placeholder);
                if (onChange) onChange();
            });
            dropdown.appendChild(div);
        });
        container.appendChild(dropdown);
        label.addEventListener('click', (e) => {
            e.stopPropagation();
            container.classList.toggle('open');
        });
        this.updateMultiSelectLabel(container, placeholder);
    }

    updateMultiSelectLabel(container, placeholder) {
        const selected = container.querySelectorAll('.option.selected');
        const label = container.querySelector('.select-label');
        if (selected.length === 0) label.textContent = placeholder;
        else label.textContent = `Выбрано: ${selected.length}`;
    }

        return `<div class="filter-bar">

    toggleSellMode() {
        this._sellMode = !this._sellMode;
        if (!this._sellMode) this._sellSelected.clear();
        this.renderInventory();
    }

    changeSellQuantity(delta) {
        const input = document.getElementById('sell-qty-input');
        if (!input) return;
        const filtered = this.getFilteredItems(true);
        const max = Math.min(100, filtered.length);
        let val = parseInt(input.value) || 0;
        val = Math.max(0, Math.min(max, val + delta));
        input.value = val;
        this._applySellQuantity(val, filtered);
    }

    validateSellQuantity() {
        const input = document.getElementById('sell-qty-input');
        if (!input) return;
        const filtered = this.getFilteredItems(true);
        const max = Math.min(100, filtered.length);
        let val = parseInt(input.value) || 0;
        if (val > max) val = max;
        if (val < 0) val = 0;
        input.value = val;
        this._applySellQuantity(val, filtered);
    }

    _applySellQuantity(qty, filtered) {
        this._sellSelected.clear();
        for (let i = 0; i < qty && i < filtered.length; i++) this._sellSelected.add(filtered[i].id);
        this.updateSellUI();
        this.applyFiltersAndStorage(filtered, true);
    }

    toggleSellSelection(itemId) {
        if (!this._sellMode) return;
        if (this._sellSelected.has(itemId)) this._sellSelected.delete(itemId);
        else this._sellSelected.add(itemId);
        const input = document.getElementById('sell-qty-input');
        if (input) input.value = this._sellSelected.size;
        this.updateSellUI();
        this.applyFiltersAndStorage(this.getFilteredItems(true), true);
    }

    updateSellUI() {
        const countSpan = document.getElementById('sell-count');
        const totalSpan = document.getElementById('sell-total');
        if (!countSpan || !totalSpan) return;
        const count = this._sellSelected.size;
        let total = 0;
        this._sellSelected.forEach(id => {
            const item = this.state.inventory.find(i => i.id === id);
            if (item) total += this.getSellPrice(item);
        });
        countSpan.textContent = count;
        totalSpan.textContent = this.formatPrice(total);
    }

    sellSelectedItems() {
        if (this._sellSelected.size === 0) return;
        if (!confirm(this.t('confirm_sell_selected'))) return;
        let total = 0;
        const ids = Array.from(this._sellSelected);
        ids.forEach(id => {
            const item = this.state.inventory.find(i => i.id === id);
            if (item) {
                total += this.getSellPrice(item);
                this.state.inventory = this.state.inventory.filter(i => i.id !== id);
            }
        });
        this.state.balance += total;
        this._sellSelected.clear();
        this._sellMode = false;
        this.saveState();
        this.updateBalanceDisplay();
        this.renderInventory();
        this.addConsoleLog(`Продано предметов на ₽${this.formatPrice(total)}`);
    }

    applyFiltersAndStorage(items, sellMode = false) {
        const grid = document.getElementById('inv-grid');
        if (!grid) return;
        items = this.sortInventory(items);
        grid.innerHTML = '';
        if (!sellMode && this.state.storageUnits.length > 0) {
            this.state.storageUnits.forEach(unit => {
                const card = document.createElement('div');
                card.className = 'item-card storage-card';
                card.innerHTML = `<div class="storage-icon">🗄️</div><span class="item-name">${unit.name}</span><span class="item-wear">Предметов: ${unit.items.length}</span>`;
                card.addEventListener('click', () => this.showStorage(unit.id));
                grid.appendChild(card);
            });
        }
        const displayItems = sellMode ? items.filter(i => i.type !== 'case' && i.type !== 'capsule') : items;
        if (displayItems.length === 0 && (this.state.storageUnits.length === 0 || sellMode)) {
            grid.innerHTML = `<p style="grid-column:1/-1;text-align:center">${this.t('no_items')}</p>`;
            return;
        }
        displayItems.forEach(item => {
            if (!item.image) item.image = item.imageUrl || this.generateItemImage(item);
            const card = document.createElement('div');
            card.className = 'item-card';
            card.dataset.rarity = item.rarity;
            card.dataset.id = item.id;
            const stickersHtml = (item.stickers || []).map(s => s.imageUrl ? `<img src="${s.imageUrl}" title="${s.name}" style="width:20px;height:15px;object-fit:contain;">` : '').join('');
            const isFav = item.isFavorite;
            const isStat = item.statTrack;
            const isSelected = sellMode && this._sellSelected.has(item.id);
            if (isSelected) card.classList.add('selected-for-transfer');
            const isCase = item.type === 'case' || item.type === 'capsule';
            const displayName = isCase ? (this.collectionDisplayNames[item.collection] || item.collection) : item.weaponType;
            const collectionOrSkin = isCase ? item.collection : (item.skinName || '');
            const newBadge = (!sellMode && item.isNew) ? '<span class="new-badge">NEW</span>' : '';
            card.innerHTML = `${isFav ? '<span class="favorite-badge">⭐</span>' : ''}${isStat ? '<span class="stattrack-label">StatTrack™</span>' : ''}${newBadge}<img src="${item.image}" class="item-img"><span class="item-name">${displayName}</span><span class="item-wear">${collectionOrSkin}</span><div class="item-stickers">${stickersHtml}</div><div class="rarity-bar" style="background:${this.rarityColors[item.rarity] || '#888'};"></div>`;
            card.addEventListener('click', (e) => {
                if (sellMode) {
                    this.toggleSellSelection(item.id);
                } else {
                    this.toggleMiniDetail(item, card);
                }
            });
            grid.appendChild(card);
        });
    }

    toggleMiniDetail(item, cardElement) {
        if (this._miniDetailOpenId === item.id) {
            this.closeMiniDetail();
            return;
        }
        this.closeMiniDetail();
        item.isNew = false;
        this.saveState();
        const rect = cardElement.getBoundingClientRect();
        const el = this._miniDetailEl;
        const padding = 5;
        let left = rect.left;
        let top = rect.bottom + 5;
        if (left + 120 > window.innerWidth) left = window.innerWidth - 120 - padding;
        if (left < padding) left = padding;
        const estimatedHeight = 150;
        if (top + estimatedHeight > window.innerHeight) top = rect.top - estimatedHeight - 5;
        if (top < padding) top = padding;
        el.style.position = 'fixed';
        el.style.left = left + 'px';
        el.style.top = top + 'px';
        el.style.display = 'block';
        const t = this.t.bind(this);
        const colName = this.collectionDisplayNames[item.collection] || item.collection;
        const rarityColor = this.rarityColors[item.rarity] || '#888';
        const sw = item.type !== 'agent' && item.type !== 'sticker' && item.type !== 'case' && item.type !== 'capsule';
        let inner = `<p><b>${t('collection')}:</b> ${colName}</p>`;
        inner += `<p><b>${t('rarity')}:</b> <span style="color:${rarityColor}">${item.rarity}</span></p>`;
        if (sw) {
            inner += `<p><b>${t('wear')}:</b> ${item.wear.toFixed(10)} (${item.wearCategory})</p>`;
            const patStr = String(item.pattern).padStart(4,'0');
            inner += `<p><b>${t('pattern')}:</b> ${patStr}</p>`;
        }
        inner += `<p><b>${t('acquiredDate')}:</b> ${item.acquiredDate || '—'}</p>`;
        if (item.type === 'case' || item.type === 'capsule') {
            inner += `<button onclick="Game.closeMiniDetail(); Game.showCaseDetail(Game.state.inventory.find(i=>i.id==='${item.id}'))">${t('open')}</button>`;
        } else {
            inner += `<button onclick="Game.closeMiniDetail(); Game.showItemDetail(Game.state.inventory.find(i=>i.id==='${item.id}'))">${t('info')}</button>`;
        }
        if (item.sellable !== false) {
            inner += `<button onclick="Game.closeMiniDetail(); Game.sellItem('${item.id}')">${t('sell')} (${this.formatPrice(this.getSellPrice(item))})</button>`;
        }
        el.innerHTML = inner;
        this._miniDetailOpenId = item.id;
        this.renderInventory();
    }

    closeMiniDetail() {
        this._miniDetailEl.style.display = 'none';
        this._miniDetailOpenId = null;
    }

    onItemClick(item) {
        if (item.type === 'case' || item.type === 'capsule') this.showCaseDetail(item);
        else this.showItemDetail(item);
    }

    getOdds(col) {
        const chances = this.collections[col]?.odds || this.globalRarityChances;
        const odds = {};
        chances.forEach(r => odds[r.rarity] = r.chance);
        return odds;
    }

    showCaseDetail(cItem, storageId = null) {
        const t = this.t.bind(this);
        const modal = document.getElementById('item-detail-modal');
        modal.classList.add('active');
        const content = document.getElementById('item-detail-content');
        const col = this.collections[cItem.collection];
        const odds = this.getOdds(cItem.collection);
        const displayName = this.collectionDisplayNames[cItem.collection] || cItem.collection;
        let buttons = '';
        if (storageId) {
            buttons = `<button onclick="Game.openCaseFromStorage('${storageId}','${cItem.id}')">${t('open')}</button>
                       <button onclick="Game.moveFromStorageToInventory('${storageId}','${cItem.id}')">${t('storage_move_to_inv')}</button>`;
        } else {
            buttons = `<button onclick="Game.openCaseById('${cItem.id}')">${t('open')}</button>
                       <button onclick="Game.closeModal(); setTimeout(() => Game.startBulkOpen('${cItem.id}'), 0)">${t('open_fast')}</button>`;
        }
        let skinItems = [];
        if (col.weaponsByRarity) {
            const rarityOrder = odds ? Object.keys(odds) : Object.keys(col.weaponsByRarity);
            rarityOrder.forEach(rarity => {
                if (col.weaponsByRarity[rarity]) col.weaponsByRarity[rarity].forEach(w => skinItems.push({ ...w, type: 'weapon', rarity }));
            });
        } else if (col.stickersByRarity) {
            const rarityOrder = odds ? Object.keys(odds) : Object.keys(col.stickersByRarity);
            rarityOrder.forEach(rarity => {
                if (col.stickersByRarity[rarity]) col.stickersByRarity[rarity].forEach(s => skinItems.push({ ...s, type: 'sticker', rarity }));
            });
        } else if (col.agentsByRarity) {
            const rarityOrder = odds ? Object.keys(odds) : Object.keys(col.agentsByRarity);
            rarityOrder.forEach(rarity => {
                if (col.agentsByRarity[rarity]) col.agentsByRarity[rarity].forEach(a => skinItems.push({ ...a, type: 'agent', rarity }));
            });
        }
        if ((col.knife && col.knife.length > 0) || (col.gloves && col.gloves.length > 0)) {
            skinItems.push({ type: 'gold', rarity: 'Gold', name: '', imageUrl: this.goldPlaceholder.src });
        }
        let skinsHTML = '<div class="case-skins-scroll"><div class="case-skin-items">';
        skinItems.forEach(skin => {
            const rarityColor = this.rarityColors[skin.rarity] || '#888';
            let imgSrc = skin.imageUrl || this.generateItemImage(skin);
            let nameDisplay = skin.name || '';
            if (skin.type === 'gold') { imgSrc = this.goldPlaceholder.src; nameDisplay = ''; }
            skinsHTML += `<div class="case-skin-card"><img src="${imgSrc}" alt="${nameDisplay}"><div class="skin-name">${nameDisplay}</div><div class="rarity-line" style="background:${rarityColor};"></div></div>`;
        });
        skinsHTML += '</div></div>';
        content.innerHTML = `<button class="close-fullskin" onclick="Game.closeItemDetail()">✕</button>
            <div class="skin-header"><h2>${displayName}</h2><div class="collection-name">${cItem.collection}</div><div class="rarity-line" style="background:#6b6b6b;"></div></div>
            <div class="skin-image-area" style="flex:1 1 auto; display:flex; justify-content:center; align-items:center; padding:10px;"><img src="${cItem.image}" style="max-width: ${cItem.collection === 'Momentum' ? '60%' : '90%'}; max-height: ${cItem.collection === 'Momentum' ? '30vh' : '50vh'}; object-fit:contain;"></div>
            ${skinsHTML}
            <div class="skin-actions">${buttons}</div>`;
    }

    openCaseById(id) {
        const item = this.state.inventory.find(i => i.id === id);
        if (!item) return;
        this.closeModal();
        this.openCase(item);
    }

    showItemDetail(item, storageId = null, bulkItems = null, bulkIndex = 0, isMarketOffer = false) {
        const modal = document.getElementById('item-detail-modal');
        const content = document.getElementById('item-detail-content');
        modal.classList.add('active');
        this._currentBulkItems = bulkItems;
        this._currentBulkIndex = bulkIndex;
        const t = this.t.bind(this);
        const rarityColor = this.rarityColors[item.rarity] || '#888';
        const sw = item.type !== 'agent' && item.type !== 'sticker' && item.type !== 'case' && item.type !== 'capsule';
        const statTrackLabel = item.statTrack ? '<span class="stat-track">StatTrack™</span>' : '';
        const collectionName = this.collectionDisplayNames[item.collection] || item.collection;
        const releaseDate = this.collectionReleaseDates[item.collection] || 'неизвестно';
        const sellPrice = this.getSellPrice(item);
        const hideStickers = ['sticker','charm','agent','knife','gloves','case','capsule'].includes(item.type);
        let infoHTML = '';
        if (sw) {
            infoHTML += `<p><strong>${t('wear')}:</strong> ${item.wear.toFixed(10)} (${item.wearCategory})</p>`;
            const patStr = String(item.pattern).padStart(4,'0');
            if (item.specialPattern) infoHTML += `<p><strong>${t('pattern')}:</strong> ${patStr} (${item.specialPattern.name})</p>`;
            else infoHTML += `<p><strong>${t('pattern')}:</strong> ${patStr}</p>`;
        }
        infoHTML += `<p><strong>${t('rarity')}:</strong> <span style="color:${rarityColor}">${item.rarity}</span></p>`;
        if (!hideStickers) {
            if ((item.stickers || []).length > 0) {
                const stickerList = (item.stickers || []).map(s => {
                    const stickerRarityColor = this.rarityColors[s.rarity] || '#ccc';
                    return `<span class="sticker-wrapper" style="position:relative; display:inline-block;">
                        <img src="${s.imageUrl}" style="width:20px;height:20px;vertical-align:middle;">
                        <span class="sticker-tooltip" style="position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:#333; color:${stickerRarityColor}; padding:2px 6px; border-radius:3px; font-size:0.7rem; white-space:nowrap; pointer-events:none;">${s.name}</span>
                    </span>`;
                }).join('');
                infoHTML += `<p><strong>${t('stickers')}:</strong> ${stickerList}</p>`;
            } else infoHTML += `<p><strong>${t('stickers')}:</strong> —</p>`;
            infoHTML += `<p><strong>${t('with_charms')}:</strong> —</p>`;
        }
        if (isMarketOffer && item.seller) infoHTML += `<p><strong>Продавец:</strong> ${item.seller}</p>`;
        else {
            infoHTML += `<p><strong>${t('acquiredDate')}:</strong> ${item.acquiredDate || '—'}</p>`;
            infoHTML += `<p><strong>${t('collectionReleaseDates')}:</strong> ${releaseDate}</p>`;
        }
        let navButtons = '';
        let counterHTML = '';
        if (bulkItems && bulkItems.length > 1) {
            navButtons = `<button class="bulk-nav left" onclick="Game.bulkPrev()">❮</button><button class="bulk-nav right" onclick="Game.bulkNext()">❯</button>`;
            counterHTML = `<div class="bulk-counter">${bulkIndex+1}/${bulkItems.length}</div>`;
        }
        const closeBtn = `<button class="close-fullskin" onclick="Game.closeItemDetail()">✕</button>`;
        const stickersIcons = (!hideStickers && item.stickers && item.stickers.length > 0)
            ? item.stickers.map(s => {
                const stickerRarityColor = this.rarityColors[s.rarity] || '#ccc';
                return `<span class="sticker-wrapper" style="position:relative; display:inline-block;">
                    <img src="${s.imageUrl}" title="${s.name}" style="height: 1.8em; width: auto; vertical-align: middle; margin-left: 4px;">
                    <span class="sticker-tooltip" style="position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:#333; color:${stickerRarityColor}; padding:2px 6px; border-radius:3px; font-size:0.7rem; white-space:nowrap; pointer-events:none;">${s.name}</span>
                </span>`;
            }).join('')
            : '';
        let leftGroup = `<span style="display:flex; align-items:center;"><button id="info-btn" onclick="Game.toggleInfoPopup()">i</button>${stickersIcons}</span>`;
        let rightGroup = '';
        if (isMarketOffer) {
            const marketPrice = item._marketPrice ?? this.getItemPrice(item) ?? 0;
            const purchased = item._purchased || false;
            rightGroup = `<button class="${purchased ? 'purchased-btn' : ''}" onclick="${purchased ? '' : `Game.buyMarketOfferFromDetail('${item.id}', ${marketPrice})`}">${purchased ? t('purchased') : t('buy')} (₽${this.formatPrice(marketPrice)})</button>`;
        } else if (storageId) {
            rightGroup = `<button onclick="Game.moveFromStorageToInventory('${storageId}','${item.id}')">${t('storage_move_to_inv')}</button>`;
        } else {
            rightGroup = `${item.sellable !== false ? `<button onclick="Game.sellItem('${item.id}')">${t('sell')} (₽${this.formatPrice(sellPrice)})</button>` : ''}
                          ${item.type === 'weapon' ? `<button onclick="Game.applyStickerModal('${item.id}')">${t('apply_sticker')}</button>` : ''}
                          ${item.type === 'weapon' && (item.stickers || []).length > 0 ? `<button onclick="Game.removeStickerModal('${item.id}')">${t('remove_sticker')}</button>` : ''}
                          <button onclick="Game.toggleFavorite('${item.id}')">${item.isFavorite ? '💔' : '❤️'}</button>
                          <button onclick="Game.moveItemToStorage('${item.id}')">${t('storage_move_to_storage')}</button>`;
        }
        let actionsHTML = `<div class="skin-actions">${leftGroup}<span style="display:flex; align-items:center; gap:5px; margin-left:auto;">${rightGroup}</span></div>`;
        content.innerHTML = `${counterHTML}
            <div class="skin-header"><h2>${statTrackLabel} ${item.weaponType} | ${item.skinName || ''}</h2><div class="collection-name">${collectionName}</div><div class="rarity-line" style="background:${rarityColor}"></div></div>
            <div class="skin-image-area">${navButtons}<img src="${item.image}" alt="${item.name}"></div>
            ${actionsHTML}
            ${closeBtn}
            <div id="info-popup">${infoHTML}</div>`;
    }

    toggleInfoPopup() {
        const popup = document.getElementById('info-popup');
        if (popup) popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
    }

    bulkPrev() {
        if (!this._currentBulkItems || this._currentBulkIndex <= 0) return;
        this._currentBulkIndex--;
        this.showItemDetail(this._currentBulkItems[this._currentBulkIndex], null, this._currentBulkItems, this._currentBulkIndex);
    }

    bulkNext() {
        if (!this._currentBulkItems || this._currentBulkIndex >= this._currentBulkItems.length - 1) return;
        this._currentBulkIndex++;
        this.showItemDetail(this._currentBulkItems[this._currentBulkIndex], null, this._currentBulkItems, this._currentBulkIndex);
    }

    applyStickerModal(itemId) {
        const item = this.state.inventory.find(i => i.id === itemId);
        if (!item) return;
        if (item.type !== 'weapon') { alert('Стикеры можно клеить только на оружие!'); return; }
        if ((item.stickers || []).length >= 5) { alert('Максимум 5 стикеров.'); return; }
        const stickers = this.state.inventory.filter(i => i.type === 'sticker');
        stickers.sort((a, b) => {
            const rarityDiff = this.rarities.indexOf(b.rarity) - this.rarities.indexOf(a.rarity);
            if (rarityDiff !== 0) return rarityDiff;
            return a.name.localeCompare(b.name);
        });
        const t = this.t.bind(this);
        const modal = document.getElementById('item-detail-modal');
        modal.classList.add('active');
        const content = document.getElementById('item-detail-content');
        if (stickers.length === 0) {
            content.innerHTML = `<p>${t('no_stickers')}</p><button onclick="Game.showItemDetail(Game.state.inventory.find(i=>i.id==='${itemId}'))">${t('back')}</button>`;
            return;
        }
        content.innerHTML = `<button onclick="Game.showItemDetail(Game.state.inventory.find(i=>i.id==='${itemId}'))" style="position:sticky;top:0;background:var(--panel);z-index:1;">✖</button><h3>Выберите стикер</h3><div class="sticker-select-grid" id="sticker-grid"></div>`;
        const grid = document.getElementById('sticker-grid');
        stickers.forEach(s => {
            const div = document.createElement('div');
            div.className = 'sticker-select-item';
            const rarityColor = this.rarityColors[s.rarity] || '#888';
            div.innerHTML = `<img src="${s.image || ''}" style="width:50px;height:40px;object-fit:contain;"><small>${s.name}</small><div class="sticker-rarity-bar" style="background:${rarityColor};"></div>`;
            div.onclick = () => {
                if (!confirm(`Наклеить стикер "${s.name}"?`)) return;
                item.stickers = item.stickers || [];
                item.stickers.push({ name: s.name, imageUrl: s.imageUrl || '', minPrice: s.minPrice || 0, rarity: s.rarity });
                this.state.inventory = this.state.inventory.filter(i => i.id !== s.id);
                this.saveState();
                this.showItemDetail(item);
                this.renderInventory();
            };
            grid.appendChild(div);
        });
    }

    removeStickerModal(itemId) {
        const item = this.state.inventory.find(i => i.id === itemId);
        if (!item || (item.stickers || []).length === 0) return;
        const t = this.t.bind(this);
        const modal = document.getElementById('item-detail-modal');
        modal.classList.add('active');
        const content = document.getElementById('item-detail-content');
        let html = `<button onclick="Game.showItemDetail(Game.state.inventory.find(i=>i.id==='${itemId}'))" style="position:sticky;top:0;background:var(--panel);z-index:1;">✖</button><h3>Выберите стикер для снятия</h3><div class="sticker-select-grid">`;
        (item.stickers || []).forEach((s, idx) => {
            html += `<div class="sticker-select-item" onclick="Game.removeSticker('${itemId}', ${idx})">${s.imageUrl ? `<img src="${s.imageUrl}" style="width:50px;height:40px;object-fit:contain;">` : `<span style="font-size:2rem;">${this.stickerEmojis[s.name] || '🏷️'}</span>`}<small>${s.name}</small></div>`;
        });
        html += '</div>';
        content.innerHTML = html;
    }

    removeSticker(itemId, idx) {
        const item = this.state.inventory.find(i => i.id === itemId);
        if (!item) return;
        if (!confirm(`Снять стикер "${item.stickers[idx].name}"?`)) return;
        item.stickers.splice(idx, 1);
        this.saveState();
        this.showItemDetail(item);
        this.renderInventory();
    }

    sellItem(id) {
        const item = this.state.inventory.find(i => i.id === id);
        if (!item) return;
        if (!confirm(this.t('confirm_sell'))) return;
        const price = this.getSellPrice(item);
        this.state.balance += price;
        this.state.inventory = this.state.inventory.filter(i => i.id !== id);
        this.closeMiniDetail();
        this.saveState();
        this.updateBalanceDisplay();
        this.renderInventory();
        this.closeModal();
        this.addConsoleLog(`Продан ${item.name} за ₽${this.formatPrice(price)}`);
    }

    toggleFavorite(id) {
        const item = this.state.inventory.find(i => i.id === id);
        if (!item) return;
        item.isFavorite = !item.isFavorite;
        this.saveState();
        if (this._currentBulkItems && this._currentBulkItems.length > 1) {
            this.showItemDetail(item, null, this._currentBulkItems, this._currentBulkIndex);
        } else {
            this.showItemDetail(item);
        }
        this.renderInventory();
    }

    moveItemToStorage(itemId) {
        const item = this.state.inventory.find(i => i.id === itemId);
        if (!item) return;
        if (this.state.storageUnits.length === 0) {
            if (confirm('Нет хранилищ. Купить одно за 2000₽?')) this.buyStorageUnit();
            return;
        }
        const t = this.t.bind(this);
        const target = prompt(`${t('storage_select_target')}:\n` + this.state.storageUnits.map((u,i) => `${i+1}. ${u.name}`).join('\n'));
        if (!target) return;
        const idx = parseInt(target) - 1;
        if (isNaN(idx) || idx < 0 || idx >= this.state.storageUnits.length) return alert('Неверный выбор');
        this.state.inventory = this.state.inventory.filter(i => i.id !== itemId);
        this.state.storageUnits[idx].items.push(item);
        this.saveState();
        this.renderInventory();
        if (document.getElementById('item-detail-modal').classList.contains('active')) this.closeModal();
        this.addConsoleLog(`Предмет ${item.name} перемещён в ${this.state.storageUnits[idx].name}`);
    }

    closeItemDetail() {
        const modal = document.getElementById('item-detail-modal');
        if (modal) modal.classList.remove('active');
        this._currentBulkItems = null;
        this._currentBulkIndex = 0;
        this.renderInventory();
    }

    openCase(cItem) {
        const idx = this.state.inventory.findIndex(i => i.id === cItem.id);
        if (idx === -1) return;
        this.state.inventory.splice(idx, 1);
        if (typeof this.state.stats?.casesOpened === 'number') this.state.stats.casesOpened++;
        const quest = Array.isArray(this.state.quests?.daily) ? this.state.quests.daily.find(q => q.id === 'open3') : null;
        if (quest) quest.progress++;
        this.saveState();
        this.addConsoleLog(`Открыт кейс ${cItem.collection}`);
        this.animateCaseOpen(cItem.collection, cItem.dropType);
        this.renderInventory();
    }

    openCaseFromStorage(unitId, caseId) {
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return;
        const caseIdx = unit.items.findIndex(i => i.id === caseId);
        if (caseIdx === -1) return;
        const cItem = unit.items[caseIdx];
        unit.items.splice(caseIdx, 1);
        if (typeof this.state.stats?.casesOpened === 'number') this.state.stats.casesOpened++;
        const quest = Array.isArray(this.state.quests?.daily) ? this.state.quests.daily.find(q => q.id === 'open3') : null;
        if (quest) quest.progress++;
        this.saveState();
        this.closeItemDetail();
        this.addConsoleLog(`Открыт кейс ${cItem.collection} в хранилище ${unit.name}`);
        this.animateCaseOpen(cItem.collection, cItem.dropType, () => {
            this.showStorage(unitId);
            this.renderInventory();
        });
    }

    skipCaseAnimation() {
        const modal = document.getElementById('case-modal');
        if (modal.classList.contains('active') && this._currentWonItem) {
            modal.classList.remove('active');
            if (this._currentWonItem._realImageUrl) {
                this._currentWonItem.imageUrl = this._currentWonItem._realImageUrl;
                this._currentWonItem.image = this._currentWonItem._realImageUrl;
                delete this._currentWonItem._realImageUrl;
            }
            this.addItem(this._currentWonItem);
            this.showItemDetail(this._currentWonItem);
            this.sound.play('case_open');
            this.checkQuests();
            if (this._currentAnimCallback) this._currentAnimCallback();
            this.renderInventory();
            this._currentWonItem = null;
            this._currentAnimCallback = null;
        }
    }

    animateCaseOpen(colN, dropT, callback = null) {
        const modal = document.getElementById('case-modal');
        modal.classList.add('active');
        const canvas = document.getElementById('case-canvas');
        const ctx = canvas.getContext('2d');
        const col = this.collections[colN];
        if (!col) { modal.classList.remove('active'); return; }
        const chances = col.odds || this.globalRarityChances;
        let won = this.generateItem(colN, dropT, true, chances);
        if (!won) won = this.generateItem(colN, dropT, false, chances.filter(r => r.rarity !== 'Gold'));
        if (!won) { modal.classList.remove('active'); return; }
        this._currentWonItem = won;
        this._currentAnimCallback = callback;
        const items = [];
        const desiredCount = 25;
        for (let i = 0; i < desiredCount; i++) {
            const it = this.generateItem(colN, dropT, false, chances);
            if (!it) continue;
            it.imageObj = new Image();
            it.imageObj.src = it.imageUrl || this.generateItemImage(it);
            items.push(it);
        }
        if (items.length === 0) {
            const fb = this.generateItem(colN, dropT, false, chances);
            if (fb) { fb.imageObj = new Image(); fb.imageObj.src = fb.imageUrl || this.generateItemImage(fb); items.push(fb); }
            else { modal.classList.remove('active'); return; }
        }
        const actualCount = items.length;
        const iw = 144, tw = actualCount * iw, centerLineX = canvas.width / 2;
        const stopIdx = Math.floor(Math.random() * actualCount);
        if (won.rarity === 'Gold') {
            won.imageObj = this.goldPlaceholder;
            items[stopIdx] = won;
            won._realImageUrl = won.imageUrl;
        } else {
            items[stopIdx] = won;
            won.imageObj = new Image();
            won.imageObj.src = won.imageUrl || this.generateItemImage(won);
        }
        const offsetInsideCell = Math.random() * iw;
        const td = 2 * tw + (stopIdx * iw + offsetInsideCell - centerLineX);
        const dur = 4500;
        let st = performance.now();
        const draw = (now) => {
            if (!modal.classList.contains('active')) return;
            const el = now - st;
            if (el >= dur) {
                const disp = ((td % tw) + tw) % tw;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                this.drawItems(ctx, items, disp, iw);
                this.drawCenterLine(ctx, canvas);
                setTimeout(() => {
                    if (!modal.classList.contains('active')) return;
                    modal.classList.remove('active');
                    if (won._realImageUrl) {
                        won.imageUrl = won._realImageUrl;
                        won.image = won._realImageUrl;
                        delete won._realImageUrl;
                    }
                    this.addItem(won);
                    this.showItemDetail(won);
                    this.sound.play('case_open');
                    this.checkQuests();
                    if (callback) callback();
                    this.renderInventory();
                    this._currentWonItem = null;
                    this._currentAnimCallback = null;
                }, 500);
                return;
            }
            const prog = el / dur, ease = 1 - Math.pow(1 - prog, 3);
            const co = td * ease, disp = ((co % tw) + tw) % tw;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            this.drawItems(ctx, items, disp, iw);
            this.drawCenterLine(ctx, canvas);
            requestAnimationFrame(draw);
        };
        requestAnimationFrame(draw);
    }

    drawItems(ctx, items, off, iw) {
        const c = ctx.canvas;
        const sx = -off;
        const gap = 2;
        for (let i = 0; i < items.length * 2; i++) {
            const idx = i % items.length;
            const x = sx + i * iw;
            if (x > -iw && x < c.width + iw) {
                const it = items[idx];
                if (it.imageObj && it.imageObj.complete) {
                    ctx.drawImage(it.imageObj, x + gap, 18, iw - 2 * gap, c.height - 36);
                    ctx.fillStyle = this.rarityColors[it.rarity] || '#888';
                    ctx.fillRect(x + gap, c.height - 18, iw - 2 * gap, 6);
                } else {
                    ctx.fillStyle = this.rarityColors[it.rarity] || '#888';
                    ctx.fillRect(x + gap, 16, iw - 2 * gap, c.height - 32);
                    ctx.fillStyle = '#fff';
                    ctx.font = '14px sans-serif';
                    ctx.fillText(it.weaponType, x + gap + 4, 40);
                    ctx.font = '12px sans-serif';
                    ctx.fillText(it.skinName || '', x + gap + 4, 60);
                }
            }
        }
    }

    drawCenterLine(ctx, c) {
        const cx = c.width / 2;
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(cx, 0);
        ctx.lineTo(cx, c.height);
        ctx.stroke();
    }

    startBulkOpen(itemId) {
        const item = this.state.inventory.find(i => i.id === itemId);
        if (!item) return;
        const sameCases = this.state.inventory.filter(i => i.type === item.type && i.collection === item.collection);
        if (sameCases.length === 0) { alert('Нет других таких кейсов'); return; }
        this._bulkCases = sameCases;
        const modal = document.getElementById('bulk-open-modal');
        const content = document.getElementById('bulk-open-content');
        modal.classList.add('active');
        this._bulkSelected = new Set();
        const totalAvailable = sameCases.length;
        const maxSelect = Math.min(100, totalAvailable);
        let html = `<button class="modal-close-btn" onclick="Game.closeModal()">✕</button>
            <div class="bulk-controls">
                <button onclick="Game.changeBulkQuantity(-1)">-</button>
                <input type="number" id="bulk-qty-input" value="1" min="0" max="${maxSelect}" style="width:60px;" oninput="Game.validateBulkQuantity()">
                <button onclick="Game.changeBulkQuantity(1)">+</button>
            </div>
            <p style="margin:5px 0;">Выбрано: <span id="bulk-count">1</span>/100 (всего ${totalAvailable})</p>
            <button onclick="Game.confirmBulkOpen('${item.collection}')" style="margin-bottom:10px;">Открыть выбранные</button>
            <div class="inventory-grid" id="bulk-grid">`;
        sameCases.forEach(c => {
            const displayName = this.collectionDisplayNames[c.collection] || c.collection;
            html += `<div class="item-card" data-id="${c.id}" onclick="Game.toggleBulkSelect('${c.id}')" id="bulkitem-${c.id}"><img src="${c.image}" class="item-img"><span class="item-name">${displayName}</span></div>`;
        });
        html += `</div>`;
        content.innerHTML = html;
        this._applyBulkQuantity(1);
    }

    changeBulkQuantity(delta) {
        const input = document.getElementById('bulk-qty-input');
        if (!input) return;
        let val = parseInt(input.value) || 0;
        const max = Math.min(100, this._bulkCases.length);
        val = Math.max(0, Math.min(max, val + delta));
        input.value = val;
        this._applyBulkQuantity(val);
    }

    validateBulkQuantity() {
        const input = document.getElementById('bulk-qty-input');
        if (!input) return;
        let val = parseInt(input.value) || 0;
        const max = Math.min(100, this._bulkCases.length);
        if (val > max) val = max;
        if (val < 0) val = 0;
        input.value = val;
        this._applyBulkQuantity(val);
    }

    _applyBulkQuantity(qty) {
        this._bulkSelected = new Set();
        for (let i = 0; i < qty && i < this._bulkCases.length; i++) this._bulkSelected.add(this._bulkCases[i].id);
        this._updateBulkUI();
    }

    toggleBulkSelect(id) {
        if (this._bulkSelected.has(id)) this._bulkSelected.delete(id);
        else {
            if (this._bulkSelected.size >= 100) return;
            this._bulkSelected.add(id);
        }
        const input = document.getElementById('bulk-qty-input');
        if (input) input.value = this._bulkSelected.size;
        this._updateBulkUI();
    }

    _updateBulkUI() {
        const allCards = document.querySelectorAll('#bulk-grid .item-card');
        allCards.forEach(card => {
            const id = card.dataset.id;
            if (this._bulkSelected.has(id)) card.classList.add('selected-for-transfer');
            else card.classList.remove('selected-for-transfer');
        });
        const countSpan = document.getElementById('bulk-count');
        if (countSpan) countSpan.textContent = this._bulkSelected.size;
        const input = document.getElementById('bulk-qty-input');
        if (input) input.value = this._bulkSelected.size;
    }

    confirmBulkOpen(collection) {
        if (this._bulkSelected.size === 0) return;
        const ids = Array.from(this._bulkSelected).slice(0, 100);
        const casesToOpen = [];
        ids.forEach(id => {
            const idx = this.state.inventory.findIndex(i => i.id === id);
            if (idx !== -1) {
                casesToOpen.push(this.state.inventory[idx]);
                this.state.inventory.splice(idx, 1);
            }
        });
        const drops = [];
        casesToOpen.forEach(c => {
            const won = this.generateItem(c.collection, c.dropType);
            if (won) { this.addItem(won); drops.push(won); }
        });
        this.saveState();
        this.renderInventory();
        this.closeModal();
        if (drops.length > 0) {
            this._bulkDrops = drops;
            this._bulkCurrentIdx = 0;
            this.showItemDetail(drops[0], null, drops, 0);
        }
    }

    closeModal() {
        document.querySelectorAll('.modal').forEach(m => {
            if (m.id !== 'console-modal') m.classList.remove('active');
        });
        this.renderInventory();
    }

        c.innerHTML = `<h2>${t('market_title')}</h2>
            <button onclick="Game.showPurchaseHistory()">${t('purchase_history')}</button>
            <div class="filter-bar" id="market-filters">
                <div id="multi-type-market"></div>
                <div id="multi-rarity-market"></div>
                <div id="multi-collection-market"></div>

                <button onclick="Game.applyMarketFilters()">Показать скины</button>
                <button id="reset-market-filters-btn">${t('reset_btn')}</button>
            </div>
            <div class="inventory-grid" id="market-grid"></div>`;
        const typeOptions = [

        ];
        const rarityOptions = this.rarities.map(r => ({ value:r, label:r }));
        const collectionOptions = Object.keys(this.collections).map(c => ({ value:c, label:this.collectionDisplayNames[c] || c }));
        this.createMultiSelect('multi-type-market', typeOptions, mf.type, () => { this.saveState(); this.applyMarketFilters(); }, t('filter_type'));
        this.createMultiSelect('multi-rarity-market', rarityOptions, mf.rarity, () => { this.saveState(); this.applyMarketFilters(); }, t('filter_rarity'));
        this.createMultiSelect('multi-collection-market', collectionOptions, mf.collection, () => { this.saveState(); this.applyMarketFilters(); }, t('filter_collection'));
        document.getElementById('reset-market-filters-btn').addEventListener('click', () => {
            mf.type = []; mf.rarity = []; mf.collection = []; mf.name = '';

        });

    applyMarketFilters() {
        const mf = this.state.marketFilters;
        mf.name = document.getElementById('market-filter-name')?.value || '';
        this.saveState();
        const grid = document.getElementById('market-grid');
        if (!grid) return;
        const skins = new Map();

        for (const [cn, col] of Object.entries(this.collections)) {
            if (mf.collection.length > 0 && !mf.collection.includes(cn)) continue;

            const allItems = [];
            if (col.weaponsByRarity) {
                for (const pool of Object.values(col.weaponsByRarity)) {
                    allItems.push(...pool.map(w => ({...w, type:'weapon', collection:cn})));
                }
            }
            if (col.knife) allItems.push(...col.knife.map(k => ({...k, type:'knife', collection:cn})));
            if (col.gloves) allItems.push(...col.gloves.map(g => ({...g, type:'gloves', collection:cn})));
            if (col.stickersByRarity) {
                for (const pool of Object.values(col.stickersByRarity)) {
                    allItems.push(...pool.map(s => ({...s, type:'sticker', collection:cn})));
                }
            }
            if (col.agentsByRarity) {
                for (const pool of Object.values(col.agentsByRarity)) {
                    allItems.push(...pool.map(a => ({...a, type:'agent', collection:cn})));
                }
            }

            for (const d of allItems) {
                if (mf.type.length > 0 && !mf.type.includes(d.type)) continue;
                if (mf.rarity.length > 0 && !mf.rarity.includes(d.rarity)) continue;
                const name = typeof d === 'string' ? d : d.name;
                if (mf.name && !name.toLowerCase().includes(mf.name.toLowerCase())) continue;
                if (!skins.has(name)) skins.set(name, d);
            }

            if (col.isCaseOnMarket) {
                const caseName = this.collectionDisplayNames[cn] || `${cn} Case`;
                if (mf.type.length > 0 && !mf.type.includes('case')) continue;
                if (mf.rarity.length > 0 && !mf.rarity.includes('Usual')) continue;
                if (mf.name && !caseName.toLowerCase().includes(mf.name.toLowerCase())) continue;
                if (!skins.has(caseName)) {
                    skins.set(caseName, {
                        name: caseName,
                        rarity: 'Usual',
                        type: 'case',
                        collection: cn,
                        minPrice: col.caseMinPrice || 1,
                        imageUrl: col.caseImageUrl || col.imageUrl || '',
                        isCaseOnMarket: true
                    });
                }
            }
        }

        if (this.battlePassConfig.limitedMarketSkins) {
            for (const limited of this.battlePassConfig.limitedMarketSkins) {
                if (mf.collection.length > 0 && !mf.collection.includes(limited.collection)) continue;
                if (mf.type.length > 0 && !mf.type.includes(limited.type)) continue;
                if (mf.rarity.length > 0 && !mf.rarity.includes(limited.rarity)) continue;
                const name = limited.name;
                if (mf.name && !name.toLowerCase().includes(mf.name.toLowerCase())) continue;
                if (!skins.has(name)) {
                    skins.set(name, { ...limited });
                }
            }
        }

        grid.innerHTML = '';
        if (skins.size === 0) {
            grid.innerHTML = `<p style="grid-column:1/-1">${this.t('market_no_items')}</p>`;
            return;
        }

        const sorted = Array.from(skins.values()).sort((a,b) => {
            const ra = this.rarities.indexOf(a.rarity), rb = this.rarities.indexOf(b.rarity);
            if (ra !== rb) return rb - ra;
            return (a.name || '').localeCompare(b.name || '');
        });

        sorted.forEach(d => {
            const name = d.name;
            const minPrice = d.minPrice != null ? d.minPrice : 0.1;
            const displayMin = (minPrice * 0.7);
            const item = {
                name,
                rarity: d.rarity,
                weaponType: name.split(' | ')[0],
                skinName: name.split(' | ').slice(1).join(' | '),
                type: d.type,
                collection: d.collection,
                emoji: d.emoji || '',
                imageUrl: d.imageUrl || '',
                minPrice: minPrice,
                isCaseOnMarket: d.isCaseOnMarket || false
            };
            item.image = item.imageUrl || this.generateItemImage(item);
            const card = document.createElement('div');
            card.className = 'item-card';
            card.dataset.rarity = item.rarity;
            card.innerHTML = `<img src="${item.image}" class="item-img">
                              <span class="item-name">${item.weaponType} ${item.skinName}</span>
                              <span style="color:var(--gold);">от ₽${this.formatPrice(displayMin)}</span>`;
            if (item.type === 'case' && item.isCaseOnMarket) {
                card.addEventListener('click', () => this.showMarketCaseDetail(item));
            } else {
                card.addEventListener('click', () => this.showMarketItemDetail(item));
            }
            grid.appendChild(card);
        });
    }

                    col.weaponsByRarity[rarity].forEach(w => skinItems.push({ ...w, type: 'weapon', rarity }));
                }
            });
        } else if (col.stickersByRarity) {
            const rarityOrder = odds ? Object.keys(odds) : Object.keys(col.stickersByRarity);
            rarityOrder.forEach(rarity => {
                if (col.stickersByRarity[rarity]) {
                    col.stickersByRarity[rarity].forEach(s => skinItems.push({ ...s, type: 'sticker', rarity }));
                }
            });
        } else if (col.agentsByRarity) {
            const rarityOrder = odds ? Object.keys(odds) : Object.keys(col.agentsByRarity);

                    col.agentsByRarity[rarity].forEach(a => skinItems.push({ ...a, type: 'agent', rarity }));
                }
            });
        }
        if ((col.knife && col.knife.length > 0) || (col.gloves && col.gloves.length > 0)) {

        });

                <div class="rarity-line" style="background:#6b6b6b;"></div>

            </div>
