<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ArsenalZone</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        :root{--bg:#1b1b1b;--panel:#2a2a2a;--text:#ccc;--accent:#ffd700;--usual:#6b6b6b;--frequent:#a0a0a0;--conveyor:#4b69ff;--rare:#8845ff;--unique:#d32ce6;--relic:#e74c3c;--gold:#ffd700;--button:#3a3a3a;--button-hover:#4d4d4d;--danger:#e74c3c;--success:#2ecc71}
        body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;-webkit-tap-highlight-color:transparent}
        header{background:var(--panel);padding:10px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #444;flex-shrink:0}
        .balance{font-weight:bold;color:var(--gold)}.energy{font-size:0.9em;color:#4fc3f7}
        nav{display:flex;background:var(--panel);border-top:1px solid #444;flex-shrink:0}
        nav button{flex:1;padding:12px 5px;background:transparent;color:var(--text);border:none;border-bottom:3px solid transparent;font-size:0.85rem;cursor:pointer;transition:0.2s}
        nav button.active{border-bottom-color:var(--accent);color:#fff}
        main{flex:1;overflow-y:auto;padding:10px 10px 60px 10px;display:flex;flex-direction:column}
        .view{display:none;flex:1;flex-direction:column}.view.active{display:flex}
        .inventory-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
        @media(max-width:600px){.inventory-grid{grid-template-columns:repeat(3,1fr)}}
        .item-card{background:var(--panel);border-radius:6px;padding:5px;border-left:4px solid var(--usual);cursor:pointer;position:relative;transition:0.2s;display:flex;flex-direction:column;align-items:center;min-height:120px;justify-content:center}
        .item-card:hover{background:#3a3a3a}.item-name{font-size:0.7rem;text-align:center;margin:4px 0}.item-wear{font-size:0.6rem;color:#999}
        .item-card[data-rarity="Usual"]{border-left-color:var(--usual)}.item-card[data-rarity="Frequent"]{border-left-color:var(--frequent)}.item-card[data-rarity="Conveyor-type"]{border-left-color:var(--conveyor)}.item-card[data-rarity="Rare"]{border-left-color:var(--rare)}.item-card[data-rarity="Unique"]{border-left-color:var(--unique)}.item-card[data-rarity="Relic"]{border-left-color:var(--relic)}.item-card[data-rarity="Gold"]{border-left-color:var(--gold)}
        .item-img{width:80px;height:60px;object-fit:contain;margin-bottom:5px}.favorite-badge{position:absolute;top:5px;right:5px;font-size:1rem;color:var(--accent)}.stattrack-label{position:absolute;top:5px;left:5px;font-size:0.65rem;color:#ff8c00;font-weight:bold}.item-stickers{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center}.item-stickers span{font-size:0.7rem}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:1000;flex-direction:column}.modal.active{display:flex}
        .modal-content{background:var(--panel);border-radius:10px;padding:20px;max-width:760px;width:95%;text-align:center;max-height:80vh;overflow-y:auto}
        #case-canvas{background:#0d0d0d;border-radius:8px;width:100%;height:210px}
        button{background:var(--button);color:var(--text);border:none;padding:10px 15px;border-radius:4px;cursor:pointer;transition:0.2s;font-weight:bold;font-size:0.9rem;margin:4px}button:hover{background:var(--button-hover)}button.accent{background:var(--accent);color:#000}button.danger{background:var(--danger)}
        .profile-stat{display:flex;justify-content:space-between;margin:10px 0}
        .filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}.filter-bar select,.filter-bar input,.filter-bar button{padding:5px 10px;background:var(--button);color:var(--text);border:none;border-radius:4px}
        .quest-item{background:var(--panel);padding:10px;margin:5px 0;border-radius:5px}.achievement{background:var(--panel);padding:8px;margin:4px 0;border-radius:5px;display:flex;justify-content:space-between}
        .sticker-select-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.sticker-select-item{background:var(--button);border-radius:6px;padding:5px;cursor:pointer;text-align:center}.sticker-select-item:hover{background:var(--button-hover)}.sticker-select-item img{width:50px;height:40px;object-fit:contain}
        #console-toggle{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:2000;font-size:0.8rem}
        #console-modal{background: none; pointer-events: none;}
        #console-modal .modal-content{width:500px;max-width:90vw;height:300px;min-width:200px;min-height:100px;background:#000;color:#0f0;font-family:monospace;padding:0;box-shadow:0 0 10px #000;position:relative;overflow:hidden;display:flex;flex-direction:column;pointer-events: auto;}
        #console-modal .drag-handle{cursor:move;background:#111;padding:5px 10px;color:#0f0;font-weight:bold;flex-shrink:0}
        #console-log{flex:1;overflow-y:auto;padding:5px;white-space:pre-wrap;font-size:13px}
        .resize-handle{position:absolute;z-index:10;background:transparent}
        .resize-n{top:0;left:0;right:0;height:6px;cursor:n-resize}.resize-s{bottom:0;left:0;right:0;height:6px;cursor:s-resize}.resize-e{top:0;bottom:0;right:0;width:6px;cursor:e-resize}.resize-w{top:0;bottom:0;left:0;width:6px;cursor:w-resize}
        .resize-ne{top:0;right:0;width:12px;height:12px;cursor:ne-resize}.resize-nw{top:0;left:0;width:12px;height:12px;cursor:nw-resize}.resize-se{bottom:0;right:0;width:12px;height:12px;cursor:se-resize}.resize-sw{bottom:0;left:0;width:12px;height:12px;cursor:sw-resize}
        .trade-item{position:relative}.trade-item.selected::after{content:'✅';position:absolute;top:2px;right:2px;font-size:1.2rem}
        #trade-modal .modal-content{width:100%;height:100%;max-width:none;max-height:none;border-radius:0;padding:10px;display:flex;flex-direction:column}#trade-content{flex:1;overflow-y:auto}
        #market-item-modal .modal-content{width:100%;height:100%;max-width:100vw;max-height:100vh;border-radius:0;padding:10px;display:flex;flex-direction:column}
        #market-item-content{flex:1;display:flex;flex-direction:column;overflow-y:auto}
        #sound-toggle{background:transparent;border:none;font-size:1.3rem;cursor:pointer;padding:0 5px;color:var(--text)}
        .inventory-counter{margin-bottom:8px;font-size:0.9rem;color:var(--accent)}
    </style>
</head>
<body>
    <header>
        <span class="balance" id="balance">$0.00</span>
        <span class="energy" id="energy">⚡ 50/50</span>
        <select id="lang-select"><option value="ru">Русский</option><option value="en">English</option></select>
        <button id="sound-toggle">🔊</button>
    </header>
    <main id="main-container"></main>
    <nav>
        <button data-view="inventory" class="active">🎒 Инвентарь</button><button data-view="market">🏪 Рынок</button><button data-view="minigames">🎮 Мини-игры</button><button data-view="profile">👤 Профиль</button><button data-view="shop">🛒 Магазин</button>
    </nav>
    <div class="modal" id="case-modal"><div class="modal-content"><h3>Открытие кейса</h3><canvas id="case-canvas" width="740" height="210"></canvas></div></div>
    <div class="modal" id="item-detail-modal"><div class="modal-content" id="item-detail-content"></div></div>
    <div class="modal" id="console-modal"><div class="modal-content" id="console-modal-content"><div class="drag-handle" id="console-drag-handle">Консоль</div><div id="console-log"></div><div class="resize-handle resize-n" data-resize="n"></div><div class="resize-handle resize-s" data-resize="s"></div><div class="resize-handle resize-e" data-resize="e"></div><div class="resize-handle resize-w" data-resize="w"></div><div class="resize-handle resize-ne" data-resize="ne"></div><div class="resize-handle resize-nw" data-resize="nw"></div><div class="resize-handle resize-se" data-resize="se"></div><div class="resize-handle resize-sw" data-resize="sw"></div></div></div>
    <div class="modal" id="trade-modal"><div class="modal-content" id="trade-content"></div></div>
    <div class="modal" id="market-item-modal"><div class="modal-content" id="market-item-content"></div></div>
    <button id="console-toggle">📟 Консоль</button>
    <script>
    class ArsenalZone {
        constructor() {
            this._memory = {};
            this.initData();
            this.state = this.loadState();
            this.sound = this.initSound();
            this.locale = this.state.settings.language || 'ru';
            this.translations = {
                ru: { inventory:'🎒 Инвентарь',market:'🏪 Рынок',minigames:'🎮 Мини-игры',profile:'👤 Профиль',shop:'🛒 Магазин',backup:'💾 Бэкап',import:'📥 Импорт',profile_title:'Профиль',cases_opened:'Кейсов открыто',items_collected:'Предметов собрано',gold_items:'Золотых предметов',reset:'Сбросить прогресс',quest_daily:'Ежедневные квесты',shop_title:'Магазин',buy:'Купить',price:'Цена',trade_up:'🔃 Trade Up',open:'Открыть',odds:'Шансы',open_fast:'Быстрое открытие',wear:'Износ',rarity:'Редкость',collection:'Коллекция',type:'Тип',pattern:'Паттерн',stickers:'Стикеры',apply_sticker:'Наклеить',sell:'Продать',favorite:'Избранное',close:'Закрыть',filter_all:'Все',filter_weapon:'Оружие',filter_knife:'Ножи',filter_gloves:'Перчатки',filter_charm:'Брелоки',filter_sticker:'Стикеры',filter_agent:'Агенты',filter_case:'Кейсы/Капсулы',no_items:'Нет предметов',no_stickers:'У вас нет стикеров',back:'Назад',stattrack_filter:'StatTrack',wear_filter:'Износ',pattern_filter:'Паттерн',select_rarity:'Выберите редкость',select_items:'Выберите 10 предметов',submit_trade:'Сдать на трейд',need_more:'Выберите ещё',market_buy:'Купить на рынке',market_no_items:'Ничего не найдено',market_title:'Рынок' },
                en: { inventory:'🎒 Inventory',market:'🏪 Market',minigames:'🎮 Mini-games',profile:'👤 Profile',shop:'🛒 Shop',backup:'💾 Backup',import:'📥 Import',profile_title:'Profile',cases_opened:'Cases opened',items_collected:'Items collected',gold_items:'Gold items',reset:'Reset progress',quest_daily:'Daily quests',shop_title:'Shop',buy:'Buy',price:'Price',trade_up:'🔃 Trade Up',open:'Open',odds:'Odds',open_fast:'Fast Open',wear:'Wear',rarity:'Rarity',collection:'Collection',type:'Type',pattern:'Pattern',stickers:'Stickers',apply_sticker:'Apply',sell:'Sell',favorite:'Favorite',close:'Close',filter_all:'All',filter_weapon:'Weapons',filter_knife:'Knives',filter_gloves:'Gloves',filter_charm:'Charms',filter_sticker:'Stickers',filter_agent:'Agents',filter_case:'Cases/Capsules',no_items:'No items',no_stickers:'No stickers available',back:'Back',stattrack_filter:'StatTrack',wear_filter:'Wear',pattern_filter:'Pattern',select_rarity:'Select rarity',select_items:'Select 10 items',submit_trade:'Submit Trade',need_more:'Need more',market_buy:'Buy on market',market_no_items:'Nothing found',market_title:'Market' }
            };
            this.goldPlaceholder = new Image();
            this.goldPlaceholder.src = 'https://i.ibb.co/r29jJTNL/image.png';
            this.initUI();
            this.energyTimer = setInterval(() => this.regenerateEnergy(), 60000);
            this.dailyCheck();
            this.initConsoleDrag();
            this.initConsoleResize();
        }

        safeGet(k,d){ try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return this._memory[k] || d; } }
        safeSet(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { this._memory[k] = v; } }

        loadState() {
            let s = this.safeGet('arsenalzone_save', null);
            if (!s) s = this.defaultState();
            if (typeof s.balance !== 'number') s.balance = 100;
            if (typeof s.energy !== 'number') s.energy = 50;
            if (typeof s.maxEnergy !== 'number') s.maxEnergy = 50;
            if (typeof s.lastEnergyTime !== 'number') s.lastEnergyTime = Date.now();
            if (!s.stats || typeof s.stats !== 'object') s.stats = { casesOpened:0, itemsCollected:0, goldItems:0, upgrades:0, tttWins:0 };
            if (!s.quests || typeof s.quests !== 'object') s.quests = { daily: [], lastDailyReset: new Date().toDateString() };
            if (!Array.isArray(s.quests.daily)) s.quests.daily = [];
            if (!s.settings) s.settings = { language:'ru', soundEnabled: true };
            if (typeof s.settings.soundEnabled !== 'boolean') s.settings.soundEnabled = true;
            s.consoleLog = Array.isArray(s.consoleLog) ? s.consoleLog : [];
            if (s.inventory) s.inventory.forEach(i => {
                i.rarity = i.rarity || 'Usual';
                i.weaponType = i.weaponType || i.name || 'Unknown';
                i.skinName = i.skinName || '';
                i.wearCategory = i.wearCategory || 'Worn';
                i.pattern = i.pattern || 0;
                i.stickers = i.stickers || [];
                i.isFavorite = i.isFavorite || false;
                i.statTrack = i.statTrack || false;
                i.type = i.type || 'weapon';
                if (!i.image) i.image = i.imageUrl || this.generateItemImage(i);
                if (typeof i.minPrice !== 'number') i.minPrice = 0.1;
            });
            return s;
        }

        defaultState() {
            return {
                balance:100, energy:50, maxEnergy:50, lastEnergyTime:Date.now(),
                inventory:[], stats:{ casesOpened:0, itemsCollected:0, goldItems:0, upgrades:0, tttWins:0 },
                quests:{
                    daily:[
                        {id:'open3',desc:'Открыть 3 кейса',progress:0,goal:3,reward:30,completed:false},
                        {id:'ttt2',desc:'Выиграть 2 раза в крестики-нолики',progress:0,goal:2,reward:20,completed:false},
                        {id:'upgrade5',desc:'Улучшить предметы 5 раз',progress:0,goal:5,reward:25,completed:false}
                    ],
                    lastDailyReset:new Date().toDateString()
                },
                achievements:[
                    {id:'first_case',desc:'Открыть кейс',unlocked:false},
                    {id:'gold_found',desc:'Выбить золотой предмет',unlocked:false},
                    {id:'collector_10',desc:'Выбить 10 предметов',unlocked:false},
                    {id:'upgrade_master',desc:'Улучшить предмет до Gold',unlocked:false},
                    {id:'ttt_master',desc:'Выиграть 10 игр в крестики-нолики',unlocked:false}
                ],
                settings:{ language:'ru', soundEnabled: true },
                lastDailyBonus:null,
                filterType:'all', filterRarity:'all', filterStatTrack:'all', filterWear:'all',
                filterPatternMin:'', filterPatternMax:'',
                consoleLog:[], marketListings:[]
            };
        }

        saveState() {
            if (this._saveTimeout) clearTimeout(this._saveTimeout);
            this._saveTimeout = setTimeout(() => {
                this.state.lastEnergyTime = Date.now();
                const s = JSON.parse(JSON.stringify(this.state));
                s.inventory.forEach(i => delete i.image);
                s.marketListings = [];
                if (s.consoleLog.length > 20) s.consoleLog = s.consoleLog.slice(0,20);
                this.safeSet('arsenalzone_save', s);
            }, 500);
        }

        initData() {
            this.rarities = ['Usual','Frequent','Conveyor-type','Rare','Unique','Relic','Gold'];
            this.rarityColors = {
                'Usual':'#6b6b6b','Frequent':'#a0a0a0','Conveyor-type':'#4b69ff',
                'Rare':'#8845ff','Unique':'#d32ce6','Relic':'#e74c3c','Gold':'#ffd700'
            };
            this.collections = {
                'Armor': {
                    weaponsByRarity: {
                        'Conveyor-type': [
                            { name:'Glock-18 | Кобальтовый Клык', rarity:'Conveyor-type', emoji:'🔫', imageUrl:'https://i.ibb.co/Fq5mDgDx/Glock-18.png', minPrice:0.3 },
                            { name:'USP-S | Призрак Бездны', rarity:'Conveyor-type', emoji:'🔫', imageUrl:'https://i.ibb.co/KxPNKFSX/USP-S.png', minPrice:0.45 }
                        ],
                        'Rare': [
                            { name:'M4A1-S | Тлеющий Страж', rarity:'Rare', emoji:'🎯', imageUrl:'https://i.ibb.co/VYgsNpjs/M4-A1-S.png', minPrice:1.3 },
                            { name:'Desert Eagle | Арктический Пульс', rarity:'Rare', emoji:'🔫', imageUrl:'https://i.ibb.co/p7FrGR9/Desert-Eagle.png', minPrice:1.9 }
                        ],
                        'Unique': [
                            { name:'PP-19 Бизон | Обсидиановый Поток', rarity:'Unique', emoji:'🔫', imageUrl:'https://i.ibb.co/8nBCLZtV/f070582c0743519cfe87a938130d216b-a5e173fa-f067-49f6-976d-2e96b2f1108b-Photoroom.png', minPrice:14 },
                            { name:'AK-47 | Фантомный Хекс', rarity:'Unique', emoji:'🎯', imageUrl:'https://i.ibb.co/LhnVTPzn/AK-47.png', minPrice:28 }
                        ],
                        'Relic': [
                            { name:'M4A4 | Неоновый Осколок', rarity:'Relic', emoji:'🎯', imageUrl:'https://i.ibb.co/218khcKP/M4-A4.png', minPrice:126 }
                        ]
                    },
                    knife: [
                        { name:'Штык-нож M9 | Искажённое пламя', rarity:'Gold', emoji:'🔪', imageUrl:'https://i.ibb.co/Z6v4536w/M9.png', minPrice:1194 },
                        { name:'Штык-нож M9 | Сицилийский', rarity:'Gold', emoji:'🔪', imageUrl:'https://i.ibb.co/20Qy3nJ4/M9.png', minPrice:311 },
                        { name:'Штык-нож M9 | Белое золото', rarity:'Gold', emoji:'🔪', imageUrl:'https://i.ibb.co/C5VRCdBM/M9.png', minPrice:809 },
                        { name:'Штык-нож M9 | Змеиный заговор', rarity:'Gold', emoji:'🔪', imageUrl:'https://i.ibb.co/5hWP77kd/M9.png', minPrice:405 },
                        { name:'Штык-нож M9 | Цветной мрамор', rarity:'Gold', emoji:'🔪', imageUrl:'https://i.ibb.co/4R6RncmC/M9.png', minPrice:1350 }
                    ],
                    odds: [
                        { rarity:'Conveyor-type', chance:5 },{ rarity:'Rare', chance:5 },
                        { rarity:'Unique', chance:5 },{ rarity:'Relic', chance:5 },
                        { rarity:'Gold', chance:80 }
                    ]
                },
                'Sticker Capsule': {
                    stickersByRarity: {
                        'Usual': [{ name:'Banana', rarity:'Usual', emoji:'🍌', imageUrl:'' }],
                        'Frequent': [{ name:'NaVi', rarity:'Frequent', emoji:'🌊', imageUrl:'' }],
                        'Conveyor-type': [{ name:'G2', rarity:'Conveyor-type', emoji:'🐺', imageUrl:'' }],
                        'Rare': [{ name:'Spirit', rarity:'Rare', emoji:'🐉', imageUrl:'' }]
                    },
                    odds: [
                        { rarity:'Usual', chance:80 },{ rarity:'Frequent', chance:15 },
                        { rarity:'Conveyor-type', chance:4 },{ rarity:'Rare', chance:0.9 },{ rarity:'Unique', chance:0.1 }
                    ]
                },
                'Agent Pack': {
                    agentsByRarity: {
                        'Usual': [{ name:'SASiska', rarity:'Usual', emoji:'🕵️', imageUrl:'' }],
                        'Frequent': [{ name:'Force', rarity:'Frequent', emoji:'💂', imageUrl:'' }],
                        'Conveyor-type': [{ name:'SWAG', rarity:'Conveyor-type', emoji:'🧑‍✈️', imageUrl:'' }],
                        'Rare': [{ name:'GIGachad', rarity:'Rare', emoji:'🦸', imageUrl:'' }]
                    },
                    odds: [
                        { rarity:'Usual', chance:60 },{ rarity:'Frequent', chance:25 },
                        { rarity:'Conveyor-type', chance:10 },{ rarity:'Rare', chance:4 },{ rarity:'Unique', chance:1 }
                    ]
                }
            };
            this.stickerEmojis = { 'Banana':'🍌','NaVi':'🌊','G2':'🐺','Spirit':'🐉' };
            this.typeOrder = ['knife','gloves','weapon','case','capsule','sticker','charm','agent'];
            this.globalRarityChances = this.collections['Armor'].odds;
            this.wearLevels = ['Practically New','Lightly-Used','Worn','Heavily-Worn'];
            this.tradeSelected = []; this.tradeRarity = null;
            this.sellerNames = Array.from({length:250}, (_,i) => `Seller_${Math.random().toString(36).substring(2,8)}`);
        }

        t(k) { return (this.translations[this.locale] || {})[k] || k; }

        generateItemImage(item) {
            if (!item || !item.name) return '';
            const c = document.createElement('canvas'); c.width = 200; c.height = 150;
            const ctx = c.getContext('2d');
            const rc = this.rarityColors[item.rarity] || '#888';
            const g = ctx.createLinearGradient(0,0,200,150);
            g.addColorStop(0, rc); g.addColorStop(1, '#111');
            ctx.fillStyle = g; ctx.fillRect(0,0,200,150);
            if (item.emoji) {
                ctx.font = '80px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(item.emoji, 100, 70);
            } else {
                ctx.fillStyle = 'white'; ctx.font = 'bold 24px "Segoe UI"';
                ctx.textAlign = 'center'; ctx.fillText(item.name, 100, 75);
            }
            ctx.font = '14px "Segoe UI"'; ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.fillText(item.rarity, 100, 130);
            return c.toDataURL();
        }

        generateItem(colN, dropT, allowGold = true, chOvr = null) {
            const col = this.collections[colN];
            if (!col) return null;
            let chances = chOvr || col.odds || this.globalRarityChances;
            if (!allowGold) {
                chances = chances.filter(r => r.rarity !== 'Gold');
                if (chances.length === 0) return null;
            }
            let itT = dropT;
            if (!itT) {
                if (col.weaponsByRarity) itT = 'weapon';
                else if (col.stickersByRarity) itT = 'sticker';
                else if (col.agentsByRarity) itT = 'agent';
                else if (col.knife) itT = 'knife';
                else return null;
            }
            const rand = Math.random() * 100;
            let cum = 0, selectedRarity = null;
            for (const r of chances) {
                cum += r.chance;
                if (rand < cum) { selectedRarity = r.rarity; break; }
            }
            if (!selectedRarity) selectedRarity = chances[0].rarity;
            if (itT === 'weapon' && selectedRarity === 'Gold') itT = 'knife';
            if (itT === 'knife') selectedRarity = 'Gold';
            let pool;
            if (itT === 'weapon') pool = col.weaponsByRarity?.[selectedRarity];
            else if (itT === 'sticker') pool = col.stickersByRarity?.[selectedRarity];
            else if (itT === 'agent') pool = col.agentsByRarity?.[selectedRarity];
            else if (itT === 'knife') pool = col.knife;
            if (!pool || pool.length === 0) return null;
            const data = pool[Math.floor(Math.random() * pool.length)];
            if (!data) return null;
            const name = typeof data === 'string' ? data : data.name;
            let wt, sn;
            if (name && name.includes(' | ')) {
                const p = name.split(' | '); wt = p[0]; sn = p.slice(1).join(' | ');
            } else { wt = name; sn = ''; }
            let wear = 0, wc = '', pat = 0;
            if (itT !== 'agent' && itT !== 'sticker' && itT !== 'case' && itT !== 'capsule') {
                wear = Math.random() * 0.9999999998 + 0.0000000001;
                if (wear < 0.1) wc = 'Practically New';
                else if (wear < 0.25) wc = 'Lightly-Used';
                else if (wear < 0.4) wc = 'Worn';
                else wc = 'Heavily-Worn';
                pat = Math.floor(Math.random() * 10000);
            }
            const st = (itT === 'weapon' || itT === 'knife') && Math.random() < 0.2;
            return {
                id: Date.now() + Math.random().toString(36),
                type: itT, collection: colN, name, weaponType: wt, skinName: sn,
                rarity: selectedRarity, wear, wearCategory: wc, pattern: pat,
                stickers: [], isFavorite: false, statTrack: st,
                emoji: data?.emoji || '',
                imageUrl: data?.imageUrl || '',
                minPrice: data?.minPrice || 0.1
            };
        }

        addItem(item) {
            if (!item.image) item.image = item.imageUrl || this.generateItemImage(item);
            this.state.inventory.push(item);
            if (typeof this.state.stats.itemsCollected === 'number') this.state.stats.itemsCollected++;
            if (item.rarity === 'Gold' && typeof this.state.stats.goldItems === 'number') this.state.stats.goldItems++;
            this.checkAchievements(); this.saveState();
        }

        getItemPrice(item) {
            if (typeof item.minPrice === 'number' && (item.type === 'weapon' || item.type === 'knife')) {
                let p = item.minPrice * (1 + (1 - item.wear) * 4.5);
                if (item.statTrack) p *= (item.type === 'knife' ? 1.3 : 3);
                item.stickers.forEach(() => p += 0.15);
                return isNaN(p) ? 0 : p;
            }
            const base = { Usual:0.3, Frequent:1, 'Conveyor-type':3, Rare:10, Unique:30, Relic:80, Gold:300 }[item.rarity] || 0.3;
            return base;
        }

        initSound() {
            const AC = window.AudioContext || window.webkitAudioContext;
            const ctx = new AC();
            return { play: (type) => {
                if (type === 'case_open' && this.state.settings.soundEnabled) {
                    const osc = ctx.createOscillator(), gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
                }
            }};
        }

        sortInventory(items) {
            return items.sort((a,b) => {
                if (a.isFavorite !== b.isFavorite) return a.isFavorite ? -1 : 1;
                const ta = this.typeOrder.indexOf(a.type), tb = this.typeOrder.indexOf(b.type);
                if (ta !== tb) return ta - tb;
                const ra = this.rarities.indexOf(a.rarity), rb = this.rarities.indexOf(b.rarity);
                if (ra !== rb) return rb - ra;
                if (a.statTrack !== b.statTrack) return a.statTrack ? -1 : 1;
                if (a.name !== b.name) return a.name.localeCompare(b.name);
                return (a.wear || 0) - (b.wear || 0);
            });
        }

        getFilteredItems() {
            const tf = this.state.filterType || 'all', rf = this.state.filterRarity || 'all', sf = this.state.filterStatTrack || 'all', wf = this.state.filterWear || 'all', pmn = parseInt(this.state.filterPatternMin), pmx = parseInt(this.state.filterPatternMax);
            let items = [...this.state.inventory];
            if (tf !== 'all') items = items.filter(i => { if (tf === 'case') return i.type === 'case' || i.type === 'capsule'; return i.type === tf; });
            if (rf !== 'all') items = items.filter(i => i.rarity === rf);
            if (sf === 'yes') items = items.filter(i => i.statTrack);
            else if (sf === 'no') items = items.filter(i => !i.statTrack);
            if (wf !== 'all') items = items.filter(i => i.wearCategory === wf);

        openCase(cItem) {

        // Новая логика: сначала определяем, что выпадет (по полным шансам),
        // затем генерируем ленту без золота и вставляем выигрышный предмет.
animateCaseOpen(colN, dropT) {
    const modal = document.getElementById('case-modal'); modal.classList.add('active');
    const canvas = document.getElementById('case-canvas'); const ctx = canvas.getContext('2d');
    const col = this.collections[colN];
    if (!col) { modal.classList.remove('active'); return; }
    const chances = col.odds || this.globalRarityChances;

    // 1. Заранее определяем выигрыш (по полным шансам)
    let won = this.generateItem(colN, dropT, true, chances);
    if (!won) {
        won = this.generateItem(colN, dropT, false, chances.filter(r => r.rarity !== 'Gold'));
    }
    if (!won) { modal.classList.remove('active'); return; }

    // 2. Генерируем ленту БЕЗ золотых предметов
    const items = [];
    const desiredCount = 25;
    for (let i = 0; i < desiredCount; i++) {
        const it = this.generateItem(colN, dropT, false, chances);
        if (!it) continue;
        it.imageObj = new Image();
        it.imageObj.src = it.imageUrl || this.generateItemImage(it);
        items.push(it);
    }
    if (items.length === 0) {
        const fb = this.generateItem(colN, dropT, false, chances);
        if (fb) {
            fb.imageObj = new Image(); fb.imageObj.src = fb.imageUrl || this.generateItemImage(fb);
            items.push(fb);
        } else { modal.classList.remove('active'); return; }
    }
    const actualCount = items.length;
    const iw = 144, tw = actualCount * iw, centerLineX = canvas.width / 2;

    // 3. Вставляем выигрыш в случайную позицию
    const stopIdx = Math.floor(Math.random() * actualCount);
    if (won.rarity === 'Gold') {
        won.imageObj = this.goldPlaceholder;
        items[stopIdx] = won;
        won._realImageUrl = won.imageUrl;
    } else {
        items[stopIdx] = won;
        won.imageObj = new Image();
        won.imageObj.src = won.imageUrl || this.generateItemImage(won);
    }

    // 4. Анимация
    const offsetInsideCell = Math.random() * iw;
    const td = 2 * tw + (stopIdx * iw + offsetInsideCell - centerLineX);
    const dur = 4500;
    let st = performance.now();
    const draw = (now) => {
        const el = now - st;
        if (el >= dur) {
            const disp = ((td % tw) + tw) % tw;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            this.drawItems(ctx, items, disp, iw);
            this.drawCenterLine(ctx, canvas);
            setTimeout(() => {
                modal.classList.remove('active');
                if (won._realImageUrl) {
                    won.imageUrl = won._realImageUrl;
                    won.image = won._realImageUrl;
                    delete won._realImageUrl;
                }
                this.addItem(won);
                this.sound.play('case_open');
                this.showItemDetail(won);
                this.checkQuests();
                this.renderInventory();
            }, 500);
            return;
        }
        const prog = el / dur, ease = 1 - Math.pow(1 - prog, 3);
        const co = td * ease, disp = ((co % tw) + tw) % tw;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        this.drawItems(ctx, items, disp, iw);
        this.drawCenterLine(ctx, canvas);
        requestAnimationFrame(draw);
    };
    requestAnimationFrame(draw);
}

        drawItems(ctx, items, off, iw) {
            const c = ctx.canvas; const sx = -off; const gap = 2;
            for (let i = 0; i < items.length * 2; i++) {
                const idx = i % items.length;
                const x = sx + i * iw;
                if (x > -iw && x < c.width + iw) {
                    const it = items[idx];
                    if (it.imageObj && it.imageObj.complete) {
                        ctx.drawImage(it.imageObj, x + gap, 18, iw - 2 * gap, c.height - 36);
                        ctx.fillStyle = this.rarityColors[it.rarity] || '#888';
                        ctx.fillRect(x + gap, c.height - 18, iw - 2 * gap, 6);
                    } else {
                        ctx.fillStyle = this.rarityColors[it.rarity] || '#888';
                        ctx.fillRect(x + gap, 16, iw - 2 * gap, c.height - 32);
                        ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif'; ctx.fillText(it.weaponType, x + gap + 4, 40);
                        ctx.font = '12px sans-serif'; ctx.fillText(it.skinName || '', x + gap + 4, 60);
                    }
                }
            }
        }

        drawCenterLine(ctx, c) {
            const cx = c.width / 2;
            ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, c.height); ctx.stroke();
        }

        openCaseFast(cItem) {
            const idx = this.state.inventory.findIndex(i => i.id === cItem.id);
            if (idx === -1) return;
            this.state.inventory.splice(idx, 1);
            if (typeof this.state.stats?.casesOpened === 'number') this.state.stats.casesOpened++;
            const quest = Array.isArray(this.state.quests?.daily) ? this.state.quests.daily.find(q => q.id === 'open3') : null;
            if (quest) quest.progress++;
            this.saveState();
            const won = this.generateItem(cItem.collection, cItem.dropType);
            if (!won) return;
            this.addItem(won);
            this.sound.play('case_open');
            this.showItemDetail(won);
            this.checkQuests();
            this.renderInventory();
            this.addConsoleLog(`Выпал ${won.rarity} ${won.name}`);
        }

        closeModal() { document.querySelectorAll('.modal').forEach(m => { if (m.id !== 'console-modal') m.classList.remove('active'); }); }

        // Рынок
        renderMarket() {
            const c = document.getElementById('view-market'); if (!c) return;
            const t = this.t.bind(this); const cols = Object.keys(this.collections);
            c.innerHTML = `
            <h2>${t('market_title')}</h2>
            <div class="filter-bar">
                <select id="market-filter-type">
                    <option value="all">${t('filter_all')}</option><option value="weapon">${t('filter_weapon')}</option>

        applyMarketFilters() {
            const grid = document.getElementById('market-grid'); if (!grid) return;
            const type = document.getElementById('market-filter-type')?.value || 'all';
            const colF = document.getElementById('market-filter-collection')?.value || 'all';
            const rarF = document.getElementById('market-filter-rarity')?.value || 'all';
            const skins = new Map();
            for (const [cn, col] of Object.entries(this.collections)) {
                if (colF !== 'all' && cn !== colF) continue;
                const allItems = [];
                if (col.weaponsByRarity) for (const pool of Object.values(col.weaponsByRarity)) allItems.push(...pool.map(w => ({...w, type:'weapon', collection:cn})));
                if (col.knife) allItems.push(...col.knife.map(k => ({...k, type:'knife', collection:cn})));
                if (col.stickersByRarity) for (const pool of Object.values(col.stickersByRarity)) allItems.push(...pool.map(s => ({...s, type:'sticker', collection:cn})));
                if (col.agentsByRarity) for (const pool of Object.values(col.agentsByRarity)) allItems.push(...pool.map(a => ({...a, type:'agent', collection:cn})));
                for (const d of allItems) {
                    if (type !== 'all' && d.type !== type) continue;
                    if (rarF !== 'all' && d.rarity !== rarF) continue;
                    const name = typeof d === 'string' ? d : d.name;
                    if (!skins.has(name)) skins.set(name, d);
                }
            }
            grid.innerHTML = '';
            if (skins.size === 0) { grid.innerHTML = `<p style="grid-column:1/-1">${this.t('market_no_items')}</p>`; return; }
            const sorted = Array.from(skins.values()).sort((a,b) => {
                const ra = this.rarities.indexOf(a.rarity), rb = this.rarities.indexOf(b.rarity);
                if (ra !== rb) return rb - ra;
                return (a.name || '').localeCompare(b.name || '');
            });
            sorted.forEach(d => {
                const name = typeof d === 'string' ? d : d.name;
                const item = {
                    name, rarity: d.rarity, weaponType: name.split(' | ')[0],
                    skinName: name.split(' | ').slice(1).join(' | '),
                    type: d.type, collection: d.collection,
                    emoji: d.emoji || '', imageUrl: d.imageUrl || '', minPrice: d.minPrice
                };
                item.image = item.imageUrl || this.generateItemImage(item);
                const card = document.createElement('div'); card.className = 'item-card'; card.dataset.rarity = item.rarity;
                card.innerHTML = `<img src="${item.image}" class="item-img"><span class="item-name">${item.weaponType} ${item.skinName}</span>`;
                card.addEventListener('click', () => this.showMarketItemDetail(item));
                grid.appendChild(card);
            });
        }
        showMarketItemDetail(tpl) {
            const modal = document.getElementById('market-item-modal'); modal.classList.add('active');
            const content = document.getElementById('market-item-content'); const t = this.t.bind(this);
            const isWeapon = tpl.type === 'weapon' || tpl.type === 'knife';
            const minPrice = tpl.minPrice != null ? tpl.minPrice : 0.1;
            content.innerHTML = `<h3>${tpl.weaponType} | ${tpl.skinName||''}</h3>
            <div class="filter-bar">

        generateMarketOffers(skinName, collection, type, rarity, minPrice) {
            const listDiv = document.getElementById('market-item-list'); if (!listDiv) return;
            const wearMin = parseFloat(document.getElementById('market-item-wear-min')?.value);
            const wearMax = parseFloat(document.getElementById('market-item-wear-max')?.value);
            const pmin = parseInt(document.getElementById('market-item-patmin')?.value);
            const pmax = parseInt(document.getElementById('market-item-patmax')?.value);
            const st = document.getElementById('market-item-stattrack')?.value || 'all';
            const offers = [];
            for (let i = 0; i < 10; i++) {
                const item = this.generateItem(collection, type, true);
                if (!item) continue;
                item.name = skinName;
                const parts = skinName.split(' | '); item.weaponType = parts[0]; item.skinName = parts.slice(1).join(' | ');
                item.collection = collection; item.rarity = rarity; item.minPrice = minPrice;
                if (type === 'weapon' || type === 'knife') {
                    if (!isNaN(wearMin) && !isNaN(wearMax) && wearMin <= wearMax) item.wear = wearMin + Math.random() * (wearMax - wearMin);
                    else item.wear = Math.random() * 0.9999999998 + 0.0000000001;
                    if (item.wear < 0.1) item.wearCategory = 'Practically New';
                    else if (item.wear < 0.25) item.wearCategory = 'Lightly-Used';
                    else if (item.wear < 0.4) item.wearCategory = 'Worn';
                    else item.wearCategory = 'Heavily-Worn';
                    if (!isNaN(pmin) && !isNaN(pmax)) item.pattern = pmin + Math.floor(Math.random() * (pmax - pmin + 1));
                    else if (!isNaN(pmin)) item.pattern = pmin;
                    else if (!isNaN(pmax)) item.pattern = pmax;
                    if (st === 'yes') item.statTrack = true; else if (st === 'no') item.statTrack = false;
                } else { item.wear = 0; item.wearCategory = ''; item.pattern = 0; item.statTrack = false; }
                item.seller = this.sellerNames[Math.floor(Math.random() * this.sellerNames.length)];
                item.sellerMarkup = 0.9 + Math.random() * 0.3;
                item.image = item.imageUrl || this.generateItemImage(item);
                offers.push(item);
            }
            offers.sort((a,b) => (this.getItemPrice(b) * b.sellerMarkup) - (this.getItemPrice(a) * a.sellerMarkup));
            listDiv.innerHTML = '';
            if (offers.length === 0) { listDiv.innerHTML = '<p>Не удалось сгенерировать</p>'; return; }
            offers.forEach(item => {
                const price = this.getItemPrice(item) * item.sellerMarkup;
                const card = document.createElement('div'); card.className = 'item-card'; card.dataset.rarity = item.rarity;
                card.innerHTML = `<img src="${item.image}" class="item-img"><span class="item-name">${item.weaponType}</span><span class="item-wear">${item.wearCategory ? item.wearCategory + ' | ' : ''}Паттерн:${String(item.pattern).padStart(4,'0')}</span>${item.statTrack ? '<span class="stattrack-label">StatTrack™</span>' : ''}<span>$${price.toFixed(2)}</span><span class="seller-name">${item.seller}</span>`;
                card.addEventListener('click', () => { if (confirm(`Купить у ${item.seller} за $${price.toFixed(2)}?`)) this.buyMarketOffer(item); });
                listDiv.appendChild(card);
            });
        }
        buyMarketOffer(item) {
            const price = this.getItemPrice(item) * item.sellerMarkup;
            if (this.state.balance < price) return alert('Недостаточно $');
            this.state.balance -= price;
            delete item.seller; delete item.sellerMarkup;
            this.addItem(item); this.saveState(); this.updateBalanceDisplay(); this.renderInventory();
            const listDiv = document.getElementById('market-item-list');
            if (listDiv) {
                const cards = listDiv.querySelectorAll('.item-card');
                for (const card of cards) if (card.querySelector('.seller-name')?.textContent === item.seller) { card.remove(); break; }
            }
        }

        prepareMinigamesView() {
            const v = document.getElementById('view-minigames');
            if (v) v.innerHTML = `<h2>${this.t('minigames')}</h2><button onclick="Game.startUpgrader()">⬆️ Апгрейдер (10$)</button><button onclick="Game.startTicTacToe()">❌⭕ Крестики-нолики (энергия 1)</button><div id="minigame-container"></div>`;
        }
        startUpgrader() {
            const items = this.state.inventory.filter(i => i.type !== 'case' && i.type !== 'capsule');
            if (items.length === 0) return alert('Нет предметов');
            if (this.state.balance < 10) return alert('Недостаточно $');
            this.state.balance -= 10; this.saveState(); this.updateBalanceDisplay();
            const item = items[Math.floor(Math.random() * items.length)];
            const r = Math.random();
            if (r < 0.7) { item.wear = Math.max(0.0000000001, item.wear - 0.05); alert('Износ улучшен!'); }
            else if (r < 0.95) alert('Ничего не изменилось.');
            else if (r < 0.99) {
                const idx = this.rarities.indexOf(item.rarity);
                if (idx < this.rarities.length - 1) { item.rarity = this.rarities[idx + 1]; item.image = item.imageUrl || this.generateItemImage(item); alert('Редкость повышена!'); }
                else alert('Максимальная редкость.');
            } else { this.state.inventory = this.state.inventory.filter(i => i.id !== item.id); alert('Предмет сломан!'); }
            this.saveState(); this.renderInventory();
        }
        startTicTacToe() {
            if (this.state.energy < 1) return alert('Нет энергии');
            this.state.energy--; this.updateEnergyDisplay();
            const container = document.getElementById('minigame-container'); if (!container) return;
            container.innerHTML = '';
            const board = Array(9).fill(null); let gameOver = false;
            const renderBoard = () => {
                container.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.style = 'width:60px;height:60px;border:1px solid #555;display:inline-flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;';
                    cell.textContent = board[i] || '';
                    cell.onclick = () => {
                        if (gameOver || board[i]) return;
                        board[i] = 'X'; renderBoard();
                        if (checkWin(board, 'X')) { gameOver = true; this.handleTTTResult('win'); return; }
                        if (board.every(c => c)) { gameOver = true; this.handleTTTResult('draw'); return; }
                        this.tttAI(board); renderBoard();
                        if (checkWin(board, 'O')) { gameOver = true; this.handleTTTResult('lose'); return; }
                        if (board.every(c => c)) { gameOver = true; this.handleTTTResult('draw'); }
                    };
                    container.appendChild(cell);
                }
            }; renderBoard();
        }
        tttAI(board) {
            const empty = board.map((v,i) => v === null ? i : null).filter(v => v !== null);
            if (empty.length === 0) return;
            let best = -Infinity, move = empty[0];
            for (let i of empty) { board[i] = 'O'; const score = this.minimax(board, 0, false); board[i] = null; if (score > best) { best = score; move = i; } }
            board[move] = 'O';
        }
        minimax(board, depth, isMax) {
            if (checkWin(board, 'O')) return 10 - depth;
            if (checkWin(board, 'X')) return depth - 10;
            if (board.every(c => c)) return 0;
            const empty = board.map((v,i) => v === null ? i : null).filter(v => v !== null);
            if (isMax) { let best = -Infinity; for (let i of empty) { board[i] = 'O'; best = Math.max(best, this.minimax(board, depth + 1, false)); board[i] = null; } return best; }
            else { let best = Infinity; for (let i of empty) { board[i] = 'X'; best = Math.min(best, this.minimax(board, depth + 1, true)); board[i] = null; } return best; }
        }
        handleTTTResult(result) {
            if (result === 'win') { this.state.balance += 5; this.state.stats.tttWins = (this.state.stats.tttWins || 0) + 1; alert('Победа! +5$'); }
            else if (result === 'draw') { this.state.balance += 1; alert('Ничья! +1$'); }
            else alert('Поражение.');
            this.saveState(); this.updateBalanceDisplay(); this.renderMinigames();
        }

        initConsoleDrag() {
            const modal = document.getElementById('console-modal');
            const content = document.getElementById('console-modal-content');
            const handle = document.getElementById('console-drag-handle');
            let isDragging = false, startX, startY, initialLeft, initialTop;
            handle.addEventListener('mousedown', (e) => {
                isDragging = true; startX = e.clientX; startY = e.clientY;
                const rect = content.getBoundingClientRect();
                initialLeft = rect.left; initialTop = rect.top;
                content.style.position = 'fixed'; content.style.left = initialLeft + 'px'; content.style.top = initialTop + 'px';
                e.preventDefault();
            });
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                content.style.left = (initialLeft + e.clientX - startX) + 'px';
                content.style.top = (initialTop + e.clientY - startY) + 'px';
            });
            document.addEventListener('mouseup', () => { isDragging = false; });
        }
        initConsoleResize() {
            const content = document.getElementById('console-modal-content');
            const handles = content.querySelectorAll('.resize-handle');
            handles.forEach(handle => {
                handle.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    const dir = handle.dataset.resize;
                    const startX = e.clientX, startY = e.clientY;
                    const rect = content.getBoundingClientRect();
                    const startWidth = rect.width, startHeight = rect.height, startLeft = rect.left, startTop = rect.top;
                    content.style.position = 'fixed'; content.style.left = startLeft + 'px'; content.style.top = startTop + 'px';
                    function onMouseMove(e) {
                        const dx = e.clientX - startX, dy = e.clientY - startY;
                        if (dir.includes('e')) content.style.width = Math.max(200, startWidth + dx) + 'px';
                        if (dir.includes('w')) { content.style.width = Math.max(200, startWidth - dx) + 'px'; content.style.left = (startLeft + dx) + 'px'; }
                        if (dir.includes('s')) content.style.height = Math.max(100, startHeight + dy) + 'px';
                        if (dir.includes('n')) { content.style.height = Math.max(100, startHeight - dy) + 'px'; content.style.top = (startTop + dy) + 'px'; }
                    }
                    function onMouseUp() { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });
        }
        exportSave() {
            const data = JSON.parse(JSON.stringify(this.state));
            data.inventory.forEach(i => { if (!i.image) i.image = i.imageUrl || this.generateItemImage(i); });
            const blob = new Blob([JSON.stringify(data)], { type:'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'arsenalzone_backup.json'; a.click();
        }
        importSavePrompt() {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        data.consoleLog = Array.isArray(data.consoleLog) ? data.consoleLog : [];
                        data.inventory.forEach(i => { if (!i.image) i.image = i.imageUrl || this.generateItemImage(i); });
                        this.state = data; this.saveState(); location.reload();
                    } catch { alert('Неверный файл'); }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        resetProgress() {
            if (confirm('Удалить весь прогресс?')) { try { localStorage.removeItem('arsenalzone_save'); } catch(e) {} this._memory = {}; location.reload(); }
        }
        updateUILanguage() {
            document.querySelectorAll('nav button').forEach(b => { b.textContent = this.t(b.dataset.view); });
            this.renderInventory(); this.renderProfile(); this.renderMinigames(); this.renderShop();
        }
        renderMinigames() { this.prepareMinigamesView(); }
    }

    function checkWin(board, player) {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return wins.some(w => w.every(i => board[i] === player));
    }

    window.addEventListener('load', () => { window.Game = new ArsenalZone(); });
    </script>
</body>
</html>
