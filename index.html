    showMarketCaseDetail(caseTpl) {
        const modal = document.getElementById('market-item-modal');
        modal.classList.add('active');
        const content = document.getElementById('market-item-content');
        const t = this.t.bind(this);
        const remainingRefreshes = this.getRemainingMarketRefreshes();

        let html = `<button class="modal-close-btn" onclick="Game.closeModal()">✕</button>
            <h3>${caseTpl.weaponType} ${caseTpl.skinName}</h3>
            <div class="filter-bar" style="justify-content:center; gap:10px;">
                <button id="refresh-case-offer-btn" onclick="Game.refreshMarketCaseOffers('${caseTpl.collection}','${caseTpl.name}',${caseTpl.minPrice},'${caseTpl.imageUrl}')" ${remainingRefreshes <= 0 ? 'disabled' : ''}>${t('refresh')} (${remainingRefreshes})</button>
                <button id="reset-case-offers-btn">${t('reset_btn')}</button>
            </div>
            <div class="inventory-grid" id="market-case-list"></div>`;
        content.innerHTML = html;

        document.getElementById('reset-case-offers-btn').addEventListener('click', () => {
            document.getElementById('market-case-list').innerHTML = '';
        });

        this.generateMarketCaseOffers(caseTpl);
    }

    generateMarketCaseOffers(caseTpl) {
        const listDiv = document.getElementById('market-case-list');
        if (!listDiv) return;
        const offers = [];
        const basePrice = caseTpl.minPrice || 1;
        for (let i = 0; i < 10; i++) {
            const seller = this.sellerNames[Math.floor(Math.random() * this.sellerNames.length)];
            const randomFactor = 0.9 + Math.random() * 0.4;
            const price = basePrice * randomFactor;
            offers.push({
                id: Date.now() + i.toString(36) + Math.random().toString(36),
                ...caseTpl,
                seller,
                _marketPrice: price,
                _purchased: false,
                image: caseTpl.imageUrl || this.generateItemImage(caseTpl),
            });
        }
        this._currentMarketCaseOffers = offers;
        this.renderMarketCaseOffers(offers);
    }

    renderMarketCaseOffers(offers) {
        const listDiv = document.getElementById('market-case-list');
        if (!listDiv) return;
        listDiv.innerHTML = '';
        const t = this.t.bind(this);
        offers.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.dataset.rarity = item.rarity;
            card.innerHTML = `
                <img src="${item.image}" class="item-img">
                <span class="item-name">${item.weaponType} ${item.skinName}</span>
                <span style="color:var(--gold);">₽${this.formatPrice(item._marketPrice)}</span>
                <span class="item-wear">${item.seller}</span>
            `;
            card.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                this.showMarketCaseOfferDetail(item);
            });
            const wrapper = document.createElement('div');
            wrapper.className = 'market-item-wrapper';
            wrapper.appendChild(card);
            const buyBtn = document.createElement('button');
            buyBtn.textContent = item._purchased ? t('purchased') : t('buy');
            buyBtn.className = item._purchased ? 'purchased-btn' : '';
            buyBtn.style.margin = '2px 0';
            buyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (item._purchased) return;
                if (confirm(`Купить у ${item.seller} за ₽${this.formatPrice(item._marketPrice)}?`)) {
                    this.buyMarketCaseOffer(item, buyBtn);
                }
            });
            wrapper.appendChild(buyBtn);
            listDiv.appendChild(wrapper);
        });
    }

    refreshMarketCaseOffers(collection, name, minPrice, imageUrl) {
        if (this.getRemainingMarketRefreshes() <= 0) {
            alert(this.t('refresh_limit'));
            return;
        }
        const caseTpl = {
            collection,
            name,
            weaponType: name.split(' | ')[0],
            skinName: name.split(' | ').slice(1).join(' | '),
            rarity: 'Usual',
            minPrice,
            imageUrl,
            type: 'case'
        };
        this.generateMarketCaseOffers(caseTpl);
        this._marketRefreshTimestamps.push(Date.now());
        this.state._marketRefreshTimestamps = this._marketRefreshTimestamps;
        this.saveState();
        this.updateRefreshButton();
    }

    showMarketCaseOfferDetail(offer) {
        this.showMarketCaseFullDetail(offer);
    }

    buyMarketCaseOffer(offer, buyButton = null) {
        if (this.state.balance < offer._marketPrice) return alert('Недостаточно ₽');
        this.state.balance -= offer._marketPrice;

        const cItem = {
            id: Date.now().toString(36) + Math.random().toString(36),
            type: 'case',
            collection: offer.collection,
            dropType: 'weapon',
            name: offer.name,
            rarity: 'Usual',
            wear: 0,
            wearCategory: '',
            pattern: 0,
            stickers: [],
            isFavorite: false,
            emoji: '📦',
            imageUrl: offer.imageUrl,
            sellable: true,
            minPrice: offer._marketPrice,
            purchasePrice: offer._marketPrice,
            acquiredDate: new Date().toISOString().slice(0,16).replace('T',' '),
            image: offer.image
        };
        this.addItem(cItem);

        const historyEntry = {
            weaponType: offer.name.split(' | ')[0],
            skinName: offer.name.split(' | ').slice(1).join(' | '),
            seller: offer.seller,
            purchaseDate: new Date().toISOString(),
            purchasePrice: offer._marketPrice
        };
        this.state.marketPurchaseHistory.unshift(historyEntry);
        if (this.state.marketPurchaseHistory.length > 50) this.state.marketPurchaseHistory.length = 50;

        offer._purchased = true;
        if (this._currentMarketCaseOffers) {
            this._currentMarketCaseOffers.forEach(o => {
                if (o.id === offer.id) o._purchased = true;
            });
        }

        if (buyButton) {
            buyButton.textContent = this.t('purchased');
            buyButton.className = 'purchased-btn';
            buyButton.disabled = true;
        }

        const listDiv = document.getElementById('market-case-list');
        if (listDiv && this._currentMarketCaseOffers) {
            this.renderMarketCaseOffers(this._currentMarketCaseOffers);
        }

        const detailModal = document.getElementById('item-detail-modal');
        if (detailModal && detailModal.classList.contains('active')) {
            detailModal.classList.remove('active');
        }

        this.saveState();
        this.updateBalanceDisplay();
        this.renderInventory();
    }

    buyMarketCaseOfferFromDetail(offerId) {
        const offer = this._currentMarketCaseOffers.find(o => o.id === offerId);
        if (offer && !offer._purchased) {
            if (confirm(`Купить этот кейс за ₽${this.formatPrice(offer._marketPrice)}?`)) {
                this.buyMarketCaseOffer(offer, null);
            }
        }
    }

    showMarketItemDetail(tpl) {
        const modal = document.getElementById('market-item-modal');
        modal.classList.add('active');
        const content = document.getElementById('market-item-content');
        const t = this.t.bind(this);
        const showWear = tpl.type === 'weapon' || tpl.type === 'knife' || tpl.type === 'gloves';
        const showStatTrack = (tpl.type === 'weapon' || tpl.type === 'knife') && !(this.battlePassConfig.noStatTrackCollections || []).includes(tpl.collection);
        const showStickers = tpl.type === 'weapon';
        this._offerWears = [];
        let wearHtml = '';
        if (showWear) {
            wearHtml = `<div id="multi-wear-offer"></div>`;
        }
        let stattrackHtml = showStatTrack ? `<label style="display:flex;align-items:center;gap:5px;color:var(--text);">StatTrack <input type="checkbox" id="offer-stattrack"></label>` : '';
        let stickersHtml = showStickers ? `<label style="display:flex;align-items:center;gap:5px;color:var(--text);">${t('with_stickers')} <input type="checkbox" id="offer-with-stickers"></label>` : '';
        if (!showWear && !showStatTrack && !showStickers) wearHtml = '<p>Для этого типа нет износа/паттерна/StatTrack</p>';
        const remainingRefreshes = this.getRemainingMarketRefreshes();
        content.innerHTML = `<button class="modal-close-btn" onclick="Game.closeModal()">✕</button>
            <h3>${tpl.weaponType} | ${tpl.skinName||''}</h3>
            <div class="filter-bar" id="market-offer-filters">
                ${wearHtml}${stattrackHtml}${stickersHtml}
                <button id="refresh-offer-btn" onclick="Game.refreshMarketOffers('${tpl.name}','${tpl.collection}','${tpl.type}','${tpl.rarity}',${tpl.minPrice},'${tpl.imageUrl}')" ${remainingRefreshes <= 0 ? 'disabled' : ''}>${t('refresh')} (${remainingRefreshes})</button>
                <button id="reset-offers-btn">${t('reset_btn')}</button>
            </div>
            <div id="market-item-list" class="inventory-grid"></div>`;
        if (showWear) {
            const wearOptions = this.wearLevels.map(w => ({ value:w, label:w }));
            this.createMultiSelect('multi-wear-offer', wearOptions, this._offerWears, null, t('filter_wear'));
        }
        document.getElementById('reset-offers-btn').addEventListener('click', () => {
            if (showWear) {
                this._offerWears.length = 0;
                this.createMultiSelect('multi-wear-offer', this.wearLevels.map(w => ({ value:w, label:w })), this._offerWears, null, t('filter_wear'));
            }
            if (document.getElementById('offer-stattrack')) document.getElementById('offer-stattrack').checked = false;
            if (document.getElementById('offer-with-stickers')) document.getElementById('offer-with-stickers').checked = false;

        });

    getRemainingMarketRefreshes() {
        const now = Date.now();
        const oneHour = 3600000;
        this._marketRefreshTimestamps = (this._marketRefreshTimestamps || []).filter(ts => now - ts < oneHour);
        return Math.max(0, 10 - this._marketRefreshTimestamps.length);
    }

    updateRefreshButton() {
        const rem = this.getRemainingMarketRefreshes();
        const buttons = ['refresh-offer-btn', 'refresh-case-offer-btn'];
        buttons.forEach(id => {
            const btn = document.getElementById(id);
            if (btn) {
                btn.textContent = `${this.t('refresh')} (${rem})`;
                btn.disabled = rem <= 0;
            }
        });
    }

    refreshMarketOffers(skinName, collection, type, rarity, minPrice, imageUrl) {
        if (this.getRemainingMarketRefreshes() <= 0) {
            alert(this.t('refresh_limit'));
            return;
        }
        const success = this.generateMarketOffers(skinName, collection, type, rarity, minPrice, imageUrl);
        if (success) {
            this._marketRefreshTimestamps.push(Date.now());
            this.state._marketRefreshTimestamps = this._marketRefreshTimestamps;
            this.updateRefreshButton();
            this.saveState();
        }
    }

    parseWearInput(str) {
        if (!str) return NaN;
        str = str.replace(',', '.');
        const val = parseFloat(str);
        if (isNaN(val) || val < this.MIN_WEAR || val > this.MAX_WEAR) return NaN;
        return val;
    }

    generateMarketOffers(skinName, collection, type, rarity, minPrice, imageUrl) {
        const t = this.t.bind(this);
        const listDiv = document.getElementById('market-item-list');
        if (!listDiv) return false;

        let wearMin = this.MIN_WEAR;
        let wearMax = this.MAX_WEAR;

        if (this._offerWears && this._offerWears.length > 0) {
            let minWear = this.MAX_WEAR, maxWear = this.MIN_WEAR;
            for (const w of this._offerWears) {
                const [cmin, cmax] = this.wearCategoryRanges[w];
                if (cmin < minWear) minWear = cmin;
                if (cmax > maxWear) maxWear = cmax;
            }
            wearMin = minWear;
            wearMax = maxWear;
        }

        const st = document.getElementById('offer-stattrack')?.checked || false;
        const withStickers = document.getElementById('offer-with-stickers')?.checked || false;

        const offers = [];
        let attempts = 0;
        const maxAttempts = 1000;
        while (offers.length < 10 && attempts < maxAttempts) {
            attempts++;
            const item = this.generateItem(collection, type, true);
            if (!item) continue;
            item.name = skinName;
            const parts = skinName.split(' | ');
            item.weaponType = parts[0];
            item.skinName = parts.slice(1).join(' | ');
            item.collection = collection;
            item.rarity = rarity;
            item.minPrice = minPrice;
            item.imageUrl = imageUrl;

            if (type === 'weapon' || type === 'knife' || type === 'gloves') {
                item.wear = wearMin + Math.random() * (wearMax - wearMin);
                if (item.wear < 0.05) item.wearCategory = 'Freshly Made';
                else if (item.wear < 0.20) item.wearCategory = 'Practically New';
                else if (item.wear < 0.50) item.wearCategory = 'Lightly-Used';
                else if (item.wear < 0.70) item.wearCategory = 'Worn';
                else item.wearCategory = 'Heavily-Worn';

                item.pattern = Math.floor(Math.random() * 10000);
                item.statTrack = st && (type === 'weapon' || type === 'knife');
            }

            if (this.specialPatterns[skinName]) {
                for (const sp of this.specialPatterns[skinName]) {
                    if (item.pattern >= sp.min && item.pattern <= sp.max) {
                        item.specialPattern = sp;
                        if (sp.imageUrl) {
                            item.imageUrl = sp.imageUrl;
                        }
                        break;
                    }
                }
            }

            if (type === 'weapon') {
                if (withStickers) {
                    const stickerChance = Math.random();
                    if (stickerChance < 0.005) item.stickers = this.generateStickers(5);
                    else if (stickerChance < 0.025) item.stickers = this.generateStickers(4);
                    else if (stickerChance < 0.095) item.stickers = this.generateStickers(3);
                    else if (stickerChance < 0.195) item.stickers = this.generateStickers(2);
                    else if (stickerChance < 0.395) item.stickers = this.generateStickers(1);
                } else item.stickers = [];
            }
            if (withStickers && (!item.stickers || item.stickers.length === 0)) continue;

            item.seller = this.sellerNames[Math.floor(Math.random() * this.sellerNames.length)];
            const basePrice = this.getItemPrice(item);
            const minAllowed = minPrice * 0.7;
            const lowerCoeff = Math.max(0.9, minAllowed / basePrice);
            const upperCoeff = Math.max(lowerCoeff, 1.1);
            item.sellerMarkup = lowerCoeff + Math.random() * (upperCoeff - lowerCoeff);
            item._marketPrice = basePrice * item.sellerMarkup;
            item.image = item.imageUrl || this.generateItemImage(item);
            item._purchased = false;
            offers.push(item);
        }
        this._currentMarketOffers = offers;
        for (let i = offers.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [offers[i], offers[j]] = [offers[j], offers[i]];
        }
        listDiv.innerHTML = '';
        if (offers.length === 0) {
            listDiv.innerHTML = `<p>${t('offer_no_items')}</p>`;
            return false;
        }
        offers.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.dataset.rarity = item.rarity;
            card.dataset.offerId = item.id;
            const stickersHtml = (item.stickers||[]).map(s => s.imageUrl ? `<img src="${s.imageUrl}" title="${s.name}" style="width:20px;height:15px;object-fit:contain;">` : '').join('');
            const specialHtml = item.specialPattern ? `<span class="item-wear" style="color:#ffaa00;">${item.specialPattern.name}</span>` : '';
            card.innerHTML = `<img src="${item.image}" class="item-img"><span class="item-name">${item.weaponType} ${item.skinName}</span>${specialHtml}${item.statTrack ? '<span class="stattrack-label">StatTrack™</span>' : ''}<div class="item-stickers">${stickersHtml}</div><span>₽${this.formatPrice(item._marketPrice)}</span>`;
            card.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                this.showMarketOfferDetail(item);
            });
            const wrapper = document.createElement('div');
            wrapper.className = 'market-item-wrapper';
            wrapper.dataset.offerId = item.id;
            wrapper.appendChild(card);
            const buyBtn = document.createElement('button');
            buyBtn.textContent = item._purchased ? t('purchased') : t('buy');
            buyBtn.className = item._purchased ? 'purchased-btn' : '';
            buyBtn.style.margin = '2px 0';
            buyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (item._purchased) return;
                if (confirm(`Купить у ${item.seller} за ₽${this.formatPrice(item._marketPrice)}?`)) {
                    this.buyMarketOffer(item, item._marketPrice, buyBtn);
                }
            });
            wrapper.appendChild(buyBtn);
            listDiv.appendChild(wrapper);
        });
        return true;
    }

    showMarketOfferDetail(item) {
        const modal = document.getElementById('item-detail-modal');
        modal.classList.add('active');
        item._purchased = item._purchased || false;
        this.showItemDetail(item, null, null, 0, true);
    }

    buyMarketOfferFromDetail(itemId, price) {
        const item = this._currentMarketOffers.find(o => o.id === itemId);
        if (item && !item._purchased) {
            const safePrice = (price != null && !isNaN(price)) ? price : (item._marketPrice ?? this.getItemPrice(item) ?? 0);
            if (confirm(`Купить этот предмет за ₽${this.formatPrice(safePrice)}?`)) this.buyMarketOffer(item, safePrice);
        }
    }

    buyMarketOffer(item, price, buyButton = null) {
        if (this.state.balance < price) return alert('Недостаточно ₽');
        this.state.balance -= price;
        const purchasedItem = JSON.parse(JSON.stringify(item));
        delete purchasedItem.seller;
        delete purchasedItem.sellerMarkup;
        delete purchasedItem._marketPrice;
        purchasedItem.purchasePrice = price;
        purchasedItem.acquiredDate = new Date().toISOString().slice(0,16).replace('T',' ');
        purchasedItem.image = purchasedItem.imageUrl || this.generateItemImage(purchasedItem);
        this.addItem(purchasedItem);
        const historyEntry = { ...JSON.parse(JSON.stringify(item)), purchaseDate: new Date().toISOString(), purchasePrice: price };
        this.state.marketPurchaseHistory.unshift(historyEntry);
        if (this.state.marketPurchaseHistory.length > 50) this.state.marketPurchaseHistory.length = 50;
        this._currentMarketOffers.forEach(o => { if (o.id === item.id) o._purchased = true; });
        if (buyButton) {
            buyButton.textContent = this.t('purchased');
            buyButton.className = 'purchased-btn';
            buyButton.disabled = true;
        } else {
            const wrapper = document.querySelector(`.market-item-wrapper[data-offer-id="${item.id}"]`);
            if (wrapper) {
                const btn = wrapper.querySelector('button');
                if (btn) { btn.textContent = this.t('purchased'); btn.className = 'purchased-btn'; btn.disabled = true; }
            }
        }
        const detailContent = document.getElementById('item-detail-content');
        if (detailContent) {
            const buyBtns = detailContent.querySelectorAll('button');
            buyBtns.forEach(btn => {
                if (btn.textContent.includes('Купить') || btn.textContent.includes('Buy')) {
                    btn.textContent = this.t('purchased');
                    btn.className = 'purchased-btn';
                    btn.disabled = true;
                    btn.onclick = null;
                }
            });
        }
        this.saveState();
        this.updateBalanceDisplay();
        this.renderInventory();
    }

    showPurchaseHistory() {
        const modal = document.getElementById('purchase-history-modal');
        const content = document.getElementById('purchase-history-content');
        modal.classList.add('active');
        const history = this.state.marketPurchaseHistory || [];
        let html = '<h3>История покупок</h3>';
        if (history.length === 0) html += '<p>Пусто</p>';
        else {
            html += '<div style="display:flex; flex-direction:column; gap:5px;">';
            history.forEach((h, idx) => {
                const date = new Date(h.purchaseDate).toLocaleString();
                html += `<div style="background:var(--panel); padding:8px; border-radius:5px; cursor:pointer;" onclick="Game.showPurchaseHistoryItem(${idx})"><span>${h.weaponType} | ${h.skinName}</span> - ${h.seller} - ₽${this.formatPrice(h.purchasePrice)}<br><small>${date}</small></div>`;
            });
            html += '</div>';
        }
        html += '<button onclick="Game.closeModal()">Закрыть</button>';
        content.innerHTML = html;
    }

    showPurchaseHistoryItem(index) {
        const h = this.state.marketPurchaseHistory[index];
        if (!h) return;
        const item = { ...h, image: h.imageUrl || this.generateItemImage(h), _marketPrice: h.purchasePrice, seller: h.seller };
        this.showItemDetail(item, null, null, 0, true);
    }

    generateStickers(count) {
        const stickers = [];
        const allStickers = [];
        for (const col of Object.values(this.collections)) {
            if (col.stickersByRarity) for (const pool of Object.values(col.stickersByRarity)) allStickers.push(...pool);
        }
        const sorted = allStickers.sort((a,b) => (this.rarities.indexOf(a.rarity) - this.rarities.indexOf(b.rarity)));
        for (let i = 0; i < count; i++) {
            const roll = Math.random();
            let pick;
            if (roll < 0.5) pick = sorted[Math.floor(Math.random() * sorted.length * 0.3)];
            else if (roll < 0.8) pick = sorted[Math.floor(Math.random() * sorted.length * 0.6)];
            else pick = sorted[Math.floor(Math.random() * sorted.length)];
            if (pick) stickers.push({ name: pick.name, imageUrl: pick.imageUrl, minPrice: pick.minPrice, rarity: pick.rarity });
        }
        return stickers;
    }

    prepareMinigamesView() {
        const v = document.getElementById('view-minigames');
        if (v) v.innerHTML = `<h2>${this.t('minigames')}</h2>
            <button onclick="Game.startTicTacToe()">❌⭕ Крестики-нолики (1⚡)</button>
            <button onclick="Game.startMinesweeper()">💣 Минное поле (3⚡)</button>
            <button onclick="Game.startUpgrader()">⬆️ Апгрейдер (10₽)</button>`;
    }

    startTicTacToe() {
        if (this.state.energy < 1) return alert('Нет энергии');
        this.state.energy--;
        this.updateEnergyDisplay();
        const modal = document.createElement('div'); modal.className='modal active'; modal.id='ttt-modal';
        modal.innerHTML = `<div class="modal-content" style="max-width:400px;"><h3>Крестики-нолики</h3><div class="game-board" id="ttt-board"></div><p id="ttt-status"></p><button onclick="document.getElementById('ttt-modal').remove()">Закрыть</button></div>`;
        document.body.appendChild(modal);
        const board = Array(9).fill(null); let gameOver = false;
        const render = () => {
            const grid = document.getElementById('ttt-board'); grid.innerHTML = '';
            for (let i=0;i<9;i++) {
                const cell = document.createElement('div'); cell.className='game-cell'; cell.textContent = board[i]||'';
                cell.onclick = () => {
                    if (gameOver||board[i]) return;
                    board[i]='X'; render();
                    if (checkWin(board,'X')) { gameOver=true; this.endTTT('win', modal); return; }
                    if (board.every(c=>c)) { gameOver=true; this.endTTT('draw', modal); return; }
                    this.tttAIMedium(board); render();
                    if (checkWin(board,'O')) { gameOver=true; this.endTTT('lose', modal); return; }
                    if (board.every(c=>c)) { gameOver=true; this.endTTT('draw', modal); }
                };
                grid.appendChild(cell);
            }
        };
        render();
    }

    tttAIMedium(board) {
        const empty = board.map((v,i)=>v===null?i:null).filter(v=>v!==null);
        if (empty.length===0) return;
        if (Math.random() < 0.3) { board[empty[Math.floor(Math.random()*empty.length)]] = 'O'; return; }
        let best=-Infinity, move=empty[0];
        for (let i of empty) { board[i]='O'; const score=this.minimax(board,0,false); board[i]=null; if (score>best){best=score;move=i;} }
        board[move]='O';
    }

    minimax(board, depth, isMax) {
        if (checkWin(board,'O')) return 10 - depth;
        if (checkWin(board,'X')) return depth - 10;
        if (board.every(c=>c)) return 0;
        const empty = board.map((v,i)=>v===null?i:null).filter(v=>v!==null);
        if (isMax) {
            let best = -Infinity;
            for (let i of empty) { board[i]='O'; best = Math.max(best, this.minimax(board, depth+1, false)); board[i]=null; }
            return best;
        } else {
            let best = Infinity;
            for (let i of empty) { board[i]='X'; best = Math.min(best, this.minimax(board, depth+1, true)); board[i]=null; }
            return best;
        }
    }

    endTTT(result, modal) {
        let xp=0, money=0;
        if (result==='win') { xp=5; money=2.5; } else if (result==='draw') { xp=3; money=0.7; } else { xp=1; money=0.1; }
        this.state.balance+=money; this.addXp(xp);
        if (Math.random()<0.1) { const c=this.generateItem(Object.keys(this.collections)[0],'weapon'); if(c) this.addItem(c); }
        if (Math.random()<0.05) this.state.battleStars++;
        this.saveState(); this.updateBalanceDisplay();
        const msg = `${this.t('game_over')}: ${this.t('ttt_'+result)} +${xp}XP +₽${money.toFixed(2)}`;
        modal.querySelector('#ttt-status').textContent = msg;
    }

    startMinesweeper() {
        if (this.state.energy < 3) return alert('Нет энергии');
        this.state.energy-=3; this.updateEnergyDisplay();
        const modal = document.createElement('div'); modal.className='modal active'; modal.id='mine-modal';
        modal.innerHTML = `<div class="modal-content" style="max-width:400px;"><h3>${this.t('minesweeper')}</h3><div class="mine-grid" id="mine-grid"></div><p id="mine-status"></p><button onclick="document.getElementById('mine-modal').remove()">Закрыть</button></div>`;
        document.body.appendChild(modal);
        const mines = new Set(); while (mines.size<10) mines.add(Math.floor(Math.random()*25));
        let revealed = 0; const clicked = new Set(); let gameOver = false;
        const grid = document.getElementById('mine-grid');
        for (let i=0;i<25;i++) {
            const cell = document.createElement('div'); cell.className='mine-cell'; cell.textContent = '';
            cell.onclick = () => {
                if (gameOver||clicked.has(i)) return;
                clicked.add(i);
                if (mines.has(i)) {
                    gameOver=true; cell.textContent='💣'; cell.style.background='red';
                    for (let j of mines) { const c = grid.children[j]; c.textContent='💣'; c.style.background='red'; }
                    this.endMinesweeper(0, modal);
                } else {
                    revealed++; cell.textContent='✅'; cell.style.background='green';
                    if (revealed===5) { gameOver=true; this.endMinesweeper(5, modal); }
                }
            };
            grid.appendChild(cell);
        }
    }

    endMinesweeper(found, modal) {
        const rewards = {0:[1,1],1:[2,2],2:[4,4],3:[6,6],4:[8,8],5:[10,10]};
        const [xp, money] = rewards[found];
        this.state.balance+=money; this.addXp(xp);
        if (Math.random()<0.1) { const c=this.generateItem(Object.keys(this.collections)[0],'weapon'); if(c) this.addItem(c); }
        if (Math.random()<0.05) this.state.battleStars++;
        this.saveState(); this.updateBalanceDisplay();
        modal.querySelector('#mine-status').textContent = `Найдено: ${found}/5 +${xp}XP +₽${money}`;
    }

    startUpgrader() {
        const items = this.state.inventory.filter(i => i.type !== 'case' && i.type !== 'capsule');
        if (items.length === 0) return alert('Нет предметов');
        if (this.state.balance < 10) return alert('Недостаточно ₽');
        this.state.balance -= 10;
        this.saveState();
        this.updateBalanceDisplay();
        const item = items[Math.floor(Math.random() * items.length)];
        const r = Math.random();
        if (r < 0.7) {
            item.wear = Math.max(this.MIN_WEAR, item.wear - 0.05);
            alert('Износ улучшен!');
        } else if (r < 0.95) alert('Ничего не изменилось.');
        else if (r < 0.99) {
            const idx = this.rarities.indexOf(item.rarity);
            if (idx < this.rarities.length - 1) {
                item.rarity = this.rarities[idx + 1];
                item.image = item.imageUrl || this.generateItemImage(item);
                alert('Редкость повышена!');
            } else alert('Максимальная редкость.');
        } else {
            this.state.inventory = this.state.inventory.filter(i => i.id !== item.id);
            alert('Предмет сломан!');
        }
        this.saveState();
        this.renderInventory();
    }

    addXp(amount) {
        this.state.currentXp += amount;
        while (this.state.currentXp >= 30) {
            if (this.state.battlePasses > 0) {
                this.state.battleStars += this.state.battlePasses;
                this.addConsoleLog(`+${this.state.battlePasses} бойцовских звезд`);
            }
            this.state.currentXp -= 30;
        }
        this.state.totalXp += amount;
        this.saveState();
    }

    buyBattlePass() {
        if (this.state.battlePasses >= 5) return alert(this.t('battlepass_max'));
        if (this.state.balance < 500) return alert('Недостаточно ₽');
        this.state.balance -= 500;
        this.state.battlePasses++;
        this.saveState();
        this.updateBalanceDisplay();
        this.renderBattlePass();
    }

    showBattlePassReward(item) {
        const modal = document.createElement('div');
        modal.className = 'modal active';
        modal.id = 'bp-reward-modal';
        modal.style.zIndex = '2000';
        modal.innerHTML = `
            <div class="modal-content" style="
                background: transparent;
                box-shadow: none;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100%;
                max-width: none;
                max-height: none;
            ">
                <div id="bp-flash" style="
                    width: 200px;
                    height: 200px;
                    border-radius: 50%;
                    background: radial-gradient(circle, rgba(255,215,0,0.9) 0%, rgba(255,215,0,0) 70%);
                    animation: bpPulse 0.6s ease-out forwards;
                "></div>
            </div>
        `;
        document.body.appendChild(modal);

        if (!document.getElementById('bp-anim-style')) {
            const style = document.createElement('style');
            style.id = 'bp-anim-style';
            style.textContent = `
                @keyframes bpPulse {
                    0% { transform: scale(0.3); opacity: 0; }

                    100% { transform: scale(1.0); opacity: 1; }
                }
            `;
            document.head.appendChild(style);
        }

        setTimeout(() => {
            if (modal.parentNode) modal.remove();
            if (!this.state.inventory.includes(item)) {
                this.addItem(item);
            }
            this.showItemDetail(item);
            this.sound.play('case_open');
        }, 1500);
    }

    purchaseBattlePassItem(type) {
        const cfg = this.battlePassConfig;
        let cost, col, dropType;
        switch(type) {
            case 'case': cost = cfg.caseCost; col = cfg.caseCollection; dropType = 'case'; break;
            case 'skin': cost = cfg.skinCost; col = cfg.skinCollection; dropType = 'weapon'; break;
            case 'sticker': cost = cfg.stickerCost; col = cfg.stickerCollection; dropType = 'sticker'; break;
            case 'charm': cost = cfg.charmCost; col = cfg.charmCollection; dropType = 'charm'; break;
            case 'agent': cost = cfg.agentCost; col = cfg.agentCollection; dropType = 'agent'; break;
            case 'limited': cost = cfg.limitedCost; col = cfg.skinCollection; dropType = 'limited'; break;
            default: return;
        }
        if (this.state.battleStars < cost) return alert('Недостаточно звёзд');
        this.state.battleStars -= cost;
        this.saveState();
        this.updateBalanceDisplay();
        this.renderBattlePass();

        if (type === 'case') {
            const cItem = {
                id: Date.now().toString(36),
                type: 'case',
                collection: col,
                dropType: 'weapon',
                name: col + ' Case',
                rarity: 'Usual',
                wear: 0,
                wearCategory: '',
                pattern: 0,
                stickers: [],
                isFavorite: false,
                emoji: '📦',
                imageUrl: 'https://i.ibb.co/fVPGr8xw/Momentum-Case.png',
                sellable: false,
                acquiredDate: new Date().toISOString().slice(0,16).replace('T',' ')
            };
            cItem.image = cItem.imageUrl || this.generateItemImage(cItem);
            this.addItem(cItem);
            this.showCaseDetail(cItem);
        } else if (type === 'limited') {
            const name = cfg.limitedSkin.name;
            const parts = name.split(' | ');
            const limitedSkin = {
                ...cfg.limitedSkin,
                id: Date.now().toString(36) + Math.random().toString(36),
                type: 'weapon',
                weaponType: parts[0],
                skinName: parts.slice(1).join(' | '),
                collection: col,
                wear: this.MIN_WEAR + Math.random() * (this.MAX_WEAR - this.MIN_WEAR),
                pattern: Math.floor(Math.random() * 10000),
                statTrack: false,
                stickers: [],
                acquiredDate: new Date().toISOString().slice(0,16).replace('T',' ')
            };
            if (limitedSkin.wear < 0.05) limitedSkin.wearCategory = 'Freshly Made';
            else if (limitedSkin.wear < 0.20) limitedSkin.wearCategory = 'Practically New';
            else if (limitedSkin.wear < 0.50) limitedSkin.wearCategory = 'Lightly-Used';
            else if (limitedSkin.wear < 0.70) limitedSkin.wearCategory = 'Worn';
            else limitedSkin.wearCategory = 'Heavily-Worn';

            if (this.specialPatterns[name]) {
                for (const sp of this.specialPatterns[name]) {
                    if (limitedSkin.pattern >= sp.min && limitedSkin.pattern <= sp.max) {
                        limitedSkin.specialPattern = sp;
                        if (sp.imageUrl) limitedSkin.imageUrl = sp.imageUrl;
                        break;
                    }
                }
            }
            limitedSkin.image = limitedSkin.imageUrl || this.generateItemImage(limitedSkin);
            this.showBattlePassReward(limitedSkin);
        } else {
            const item = this.generateItem(col, dropType);
            if (item) {
                this.showBattlePassReward(item);
            } else {
                this.state.battleStars += cost;
                this.saveState();
                this.renderBattlePass();
                alert('Не удалось создать предмет');
            }
        }
    }

    changeShopQuantity(colId, delta, price) {
        const input = document.getElementById(`qty-${colId}`);
        if (!input) return;
        let val = parseInt(input.value) || 1;
        val = Math.max(1, Math.min(100, val + delta));
        input.value = val;
        this.updateShopPrice(colId, price);
    }

    validateShopQuantity(colId, price) {
        const input = document.getElementById(`qty-${colId}`);
        if (!input) return;
        let val = parseInt(input.value) || 1;
        if (val > 100) { val = 100; input.value = 100; }
        if (val < 1) { val = 1; input.value = 1; }
        this.updateShopPrice(colId, price);
    }

    updateShopPrice(colId, price) {
        const input = document.getElementById(`qty-${colId}`);
        const btn = document.getElementById(`buy-btn-${colId}`);
        if (!input || !btn) return;
        const qty = parseInt(input.value) || 1;
        const total = price * qty;
        btn.textContent = `${this.t('buy')} ${qty} шт. (₽${this.formatPrice(total)})`;
    }

    buyMultipleCases(colId, col, type, dropT, price, emoji, imageUrl) {
        const input = document.getElementById(`qty-${colId}`);
        if (!input) return;
        const qty = parseInt(input.value) || 1;
        const total = price * qty;
        if (this.state.balance < total) return alert('Недостаточно ₽');
        this.state.balance -= total;
        for (let i = 0; i < qty; i++) {
            const nc = {
                id: Date.now() + Math.random().toString(36) + i,
                type, collection: col, dropType: dropT,
                name: `${col} ${type === 'case' ? 'Case' : 'Capsule'}`,
                rarity: 'Usual', wear: 0, wearCategory: '', pattern: 0,
                stickers: [], isFavorite: false, emoji: emoji, imageUrl: imageUrl,
                sellable: false
            };
            nc.image = nc.imageUrl || this.generateItemImage(nc);
            this.addItem(nc);
        }
        this.saveState();
        this.updateBalanceDisplay();
        this.renderInventory();
        this.addConsoleLog(`Куплено ${qty} кейсов ${col}`);
    }

    buyStorageUnit() {
        if (this.state.storageUnits.length >= 50) return alert(this.t('storage_max'));
        if (this.state.balance < 2000) return alert('Недостаточно ₽');
        this.state.balance -= 2000;
        this.state.storageUnits.push({
            id: 'su_' + Date.now() + Math.random().toString(36),
            name: `Хранилище #${this.state.storageUnits.length + 1}`,
            items: []
        });
        this.saveState();
        this.updateBalanceDisplay();
        this.renderShop();
        this.renderInventory();
        this.addConsoleLog('Куплено новое хранилище');
    }

    showStorage(unitId) {
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return;
        const modal = document.getElementById('storage-modal');
        const content = document.getElementById('storage-content');
        modal.classList.add('active');
        this._currentStorageUnitId = unitId;
        this._storageReturnMode = false;
        this._storageReturnSelected = new Set();
        this.initStorageFilters(unitId);
        this.updateStorageGrid(unitId);
    }

    initStorageFilters(unitId) {
        this.getStorageFilters(unitId);
        this.updateStorageGrid(unitId);
    }

    updateStorageGrid(unitId) {
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return;
        const t = this.t.bind(this);
        const filtered = this.getFilteredStorageItems(unitId);
        const content = document.getElementById('storage-content');
        if (!content) return;
        const filters = this.getStorageFilters(unitId);
        let html = `<div class="storage-header"><h3>${unit.name} (${unit.items.length})</h3>
            <div>
                <button onclick="Game.renameStorage('${unitId}')">${t('storage_rename')}</button>
                <button onclick="Game.enterStorageReturnMode('${unitId}')">${t('storage_return')}</button>
                <button onclick="Game.transferFromInventoryToStorage('${unitId}')">${t('storage_add_items')}</button>
                <button onclick="Game.closeModal()">${t('close_storage')}</button>
            </div></div>
            <div class="filter-bar">
                <div id="multi-type-storage"></div><div id="multi-rarity-storage"></div><div id="multi-collection-storage"></div><div id="multi-wear-storage"></div>
                <select id="filter-stattrack-storage">
                    <option value="all">${t('stattrack_filter')}: ${t('filter_all')}</option>
                    <option value="yes">StatTrack™</option>
                    <option value="no">Обычный</option>
                </select>
                <input type="number" placeholder="Паттерн от" id="filter-patmin-storage" style="width:80px">
                <input type="number" placeholder="до" id="filter-patmax-storage" style="width:80px">
                <button onclick="Game.resetStorageFilters('${unitId}')">${t('reset_filters')}</button>
            </div>`;
        if (this._storageReturnMode) {
            const maxSelect = Math.min(100, filtered.length);
            html += `<div class="sell-controls">
                <button onclick="Game.changeStorageReturnQuantity(-1)">-</button>
                <input type="number" id="storage-return-qty-input" value="0" min="0" max="${maxSelect}" style="width:60px;" oninput="Game.validateStorageReturnQuantity()">
                <button onclick="Game.changeStorageReturnQuantity(1)">+</button>
                <button onclick="Game.confirmStorageReturn()">${t('storage_return_selected')} (<span id="storage-return-count">0</span>)</button>
            </div>`;
        }
        html += `<div class="inventory-grid" id="storage-grid"></div>`;
        content.innerHTML = html;
        const typeOptions = [
            { value:'weapon', label:t('filter_weapon') }, { value:'knife', label:t('filter_knife') },
            { value:'gloves', label:t('filter_gloves') }, { value:'sticker', label:t('filter_sticker') },
            { value:'agent', label:t('filter_agent') }, { value:'case', label:t('filter_case') }
        ];
        const rarityOptions = this.rarities.map(r => ({ value:r, label:r }));
        const collectionOptions = Object.keys(this.collections).map(c => ({ value:c, label:this.collectionDisplayNames[c] || c }));
        const wearOptions = this.wearLevels.map(w => ({ value:w, label:w }));
        this.createMultiSelect('multi-type-storage', typeOptions, filters.filterType, () => this.updateStorageGrid(unitId), t('filter_type'));
        this.createMultiSelect('multi-rarity-storage', rarityOptions, filters.filterRarity, () => this.updateStorageGrid(unitId), t('filter_rarity'));
        this.createMultiSelect('multi-collection-storage', collectionOptions, filters.filterCollection, () => this.updateStorageGrid(unitId), t('filter_collection'));
        this.createMultiSelect('multi-wear-storage', wearOptions, filters.filterWear, () => this.updateStorageGrid(unitId), t('filter_wear'));
        document.getElementById('filter-stattrack-storage').value = filters.filterStatTrack;
        document.getElementById('filter-patmin-storage').value = filters.filterPatternMin || '';
        document.getElementById('filter-patmax-storage').value = filters.filterPatternMax || '';
        document.getElementById('filter-stattrack-storage').onchange = (e) => { filters.filterStatTrack = e.target.value; this.updateStorageGrid(unitId); };
        document.getElementById('filter-patmin-storage').oninput = (e) => { filters.filterPatternMin = e.target.value; this.updateStorageGrid(unitId); };
        document.getElementById('filter-patmax-storage').oninput = (e) => { filters.filterPatternMax = e.target.value; this.updateStorageGrid(unitId); };
        this.renderStorageItems(filtered, unitId);
    }

    resetStorageFilters(unitId) {
        const filters = this.getStorageFilters(unitId);
        filters.filterType = []; filters.filterRarity = []; filters.filterStatTrack = 'all';
        filters.filterWear = []; filters.filterCollection = [];
        filters.filterPatternMin = ''; filters.filterPatternMax = '';
        this.updateStorageGrid(unitId);
    }

    renderStorageItems(items, unitId) {
        const grid = document.getElementById('storage-grid');
        if (!grid) return;
        grid.innerHTML = '';
        if (items.length === 0) {
            grid.innerHTML = `<p style="grid-column:1/-1">${this.t('no_items')}</p>`;
            return;
        }
        items.forEach(item => {
            if (!item.image) item.image = item.imageUrl || this.generateItemImage(item);
            const card = document.createElement('div');
            card.className = 'item-card';
            card.dataset.rarity = item.rarity;
            const stickersHtml = (item.stickers || []).map(s => s.imageUrl ? `<img src="${s.imageUrl}" title="${s.name}" style="width:20px;height:15px;object-fit:contain;">` : '').join('');
            const isFav = item.isFavorite;
            const isStat = item.statTrack;
            const isCase = item.type === 'case' || item.type === 'capsule';
            const displayName = isCase ? (this.collectionDisplayNames[item.collection] || item.collection) : item.weaponType;
            const collectionOrSkin = isCase ? item.collection : (item.skinName || '');
            card.innerHTML = `${isFav ? '<span class="favorite-badge">⭐</span>' : ''}${isStat ? '<span class="stattrack-label">StatTrack™</span>' : ''}<img src="${item.image}" class="item-img"><span class="item-name">${displayName}</span><span class="item-wear">${collectionOrSkin}</span><div class="item-stickers">${stickersHtml}</div>`;
            card.addEventListener('click', () => {
                if (this._storageReturnMode) this.toggleStorageReturnSelection(item.id);
                else this.onStorageItemClick(unitId, item.id);
            });
            if (this._storageReturnMode && this._storageReturnSelected.has(item.id)) card.classList.add('selected-for-transfer');
            grid.appendChild(card);
        });
    }

    enterStorageReturnMode(unitId) {
        this._storageReturnMode = true;
        this._storageReturnUnitId = unitId;
        this._storageReturnSelected = new Set();
        this.updateStorageGrid(unitId);
    }

    cancelStorageReturn() {
        this._storageReturnMode = false;
        this.updateStorageGrid(this._storageReturnUnitId);
    }

    changeStorageReturnQuantity(delta) {
        const input = document.getElementById('storage-return-qty-input');
        if (!input) return;
        const unit = this.state.storageUnits.find(u => u.id === this._storageReturnUnitId);
        if (!unit) return;
        const filtered = this.getFilteredStorageItems(this._storageReturnUnitId);
        const max = Math.min(100, filtered.length);
        let val = parseInt(input.value) || 0;
        val = Math.max(0, Math.min(max, val + delta));
        input.value = val;
        this._applyStorageReturnQuantity(val, filtered);
    }

    validateStorageReturnQuantity() {
        const input = document.getElementById('storage-return-qty-input');
        if (!input) return;
        const unit = this.state.storageUnits.find(u => u.id === this._storageReturnUnitId);
        if (!unit) return;
        const filtered = this.getFilteredStorageItems(this._storageReturnUnitId);
        const max = Math.min(100, filtered.length);
        let val = parseInt(input.value) || 0;
        if (val > max) val = max;
        if (val < 0) val = 0;
        input.value = val;
        this._applyStorageReturnQuantity(val, filtered);
    }

    _applyStorageReturnQuantity(qty, filtered) {
        this._storageReturnSelected.clear();
        for (let i = 0; i < qty && i < filtered.length; i++) this._storageReturnSelected.add(filtered[i].id);
        this.updateStorageReturnUI();
        this.updateStorageReturnGrid();
    }

    toggleStorageReturnSelection(itemId) {
        if (this._storageReturnSelected.has(itemId)) this._storageReturnSelected.delete(itemId);
        else this._storageReturnSelected.add(itemId);
        const input = document.getElementById('storage-return-qty-input');
        if (input) input.value = this._storageReturnSelected.size;
        this.updateStorageReturnUI();
        this.updateStorageReturnGrid();
    }

    updateStorageReturnUI() {
        const countSpan = document.getElementById('storage-return-count');
        if (countSpan) countSpan.textContent = this._storageReturnSelected.size;
    }

    updateStorageReturnGrid() {
        const unitId = this._storageReturnUnitId;
        if (unitId) this.renderStorageItems(this.getFilteredStorageItems(unitId), unitId);
    }

    confirmStorageReturn() {
        const unit = this.state.storageUnits.find(u => u.id === this._storageReturnUnitId);
        if (!unit) return;
        const ids = Array.from(this._storageReturnSelected);
        ids.forEach(id => {
            const idx = unit.items.findIndex(i => i.id === id);
            if (idx !== -1) {
                const item = unit.items.splice(idx, 1)[0];
                this.state.inventory.push(item);
            }
        });
        this._storageReturnSelected.clear();
        this._storageReturnMode = false;
        this.saveState();
        this.updateStorageGrid(this._storageReturnUnitId);
        this.renderInventory();
        this.addConsoleLog('Предметы возвращены в инвентарь');
    }

    onStorageItemClick(unitId, itemId) {
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return;
        const item = unit.items.find(i => i.id === itemId);
        if (!item) return;
        if (item.type === 'case' || item.type === 'capsule') {
            this.showCaseDetail(item, unitId);
        } else {
            this.showItemDetail(item, unitId);
        }
    }

    renameStorage(unitId) {
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return;
        const newName = prompt('Новое название:', unit.name);
        if (newName) { unit.name = newName; this.saveState(); this.updateStorageGrid(unitId); }
    }

    moveFromStorageToInventory(unitId, itemId) {
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return;
        const idx = unit.items.findIndex(i => i.id === itemId);
        if (idx === -1) return;
        const item = unit.items.splice(idx, 1)[0];
        this.state.inventory.push(item);
        this.saveState();
        this.closeItemDetail();
        this.renderInventory();
        this.showStorage(unitId);
    }

    transferFromInventoryToStorage(unitId) {
        this._transferUnitId = unitId;
        this._transferSelectedIds = new Set();
        this.renderTransferInventory(unitId);
    }

    renderTransferInventory(unitId) {
        const modal = document.getElementById('storage-modal');
        const content = document.getElementById('storage-content');
        if (!modal.classList.contains('active')) return;
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return;
        const t = this.t.bind(this);
        const filtered = this.getFilteredTransferItems();
        const maxSelect = Math.min(100, filtered.length);
        let html = `<div class="storage-header"><h3>${t('storage_add_items')} → ${unit.name}</h3>
            <button onclick="Game.showStorage('${unitId}')">${t('back')}</button></div>
            <div class="filter-bar">
                <div id="multi-type-transfer"></div><div id="multi-rarity-transfer"></div><div id="multi-collection-transfer"></div><div id="multi-wear-transfer"></div>
                <select id="filter-stattrack-transfer">
                    <option value="all">${t('stattrack_filter')}: ${t('filter_all')}</option>
                    <option value="yes">StatTrack™</option>
                    <option value="no">Обычный</option>
                </select>
                <input type="number" placeholder="Паттерн от" id="filter-patmin-transfer" style="width:80px">
                <input type="number" placeholder="до" id="filter-patmax-transfer" style="width:80px">
                <button onclick="Game.resetTransferFilters()">${t('reset_filters')}</button>
            </div>
            <div class="sell-controls">
                <button onclick="Game.changeTransferQuantity(-1)">-</button>
                <input type="number" id="transfer-qty-input" value="0" min="0" max="${maxSelect}" style="width:60px;" oninput="Game.validateTransferQuantity()">
                <button onclick="Game.changeTransferQuantity(1)">+</button>
                <button onclick="Game.confirmTransferToStorage('${unitId}')">${t('storage_move_to_storage')} (<span id="transfer-count">0</span>)</button>
            </div>
            <div class="inventory-grid" id="transfer-grid"></div>`;
        content.innerHTML = html;
        const f = this._transferFilters;
        const typeOptions = [
            { value:'weapon', label:t('filter_weapon') }, { value:'knife', label:t('filter_knife') },
            { value:'gloves', label:t('filter_gloves') }, { value:'sticker', label:t('filter_sticker') },
            { value:'agent', label:t('filter_agent') }, { value:'case', label:t('filter_case') }
        ];
        const rarityOptions = this.rarities.map(r => ({ value:r, label:r }));
        const collectionOptions = Object.keys(this.collections).map(c => ({ value:c, label:this.collectionDisplayNames[c] || c }));
        const wearOptions = this.wearLevels.map(w => ({ value:w, label:w }));
        this.createMultiSelect('multi-type-transfer', typeOptions, f.filterType, () => this.renderTransferInventory(unitId), t('filter_type'));
        this.createMultiSelect('multi-rarity-transfer', rarityOptions, f.filterRarity, () => this.renderTransferInventory(unitId), t('filter_rarity'));
        this.createMultiSelect('multi-collection-transfer', collectionOptions, f.filterCollection, () => this.renderTransferInventory(unitId), t('filter_collection'));
        this.createMultiSelect('multi-wear-transfer', wearOptions, f.filterWear, () => this.renderTransferInventory(unitId), t('filter_wear'));
        document.getElementById('filter-stattrack-transfer').value = f.filterStatTrack;
        document.getElementById('filter-patmin-transfer').value = f.filterPatternMin || '';
        document.getElementById('filter-patmax-transfer').value = f.filterPatternMax || '';
        document.getElementById('filter-stattrack-transfer').onchange = (e) => { f.filterStatTrack = e.target.value; this.renderTransferInventory(unitId); };
        document.getElementById('filter-patmin-transfer').oninput = (e) => { f.filterPatternMin = e.target.value; this.renderTransferInventory(unitId); };
        document.getElementById('filter-patmax-transfer').oninput = (e) => { f.filterPatternMax = e.target.value; this.renderTransferInventory(unitId); };
        this.updateTransferGrid();
    }

    resetTransferFilters() {
        this._transferFilters = {
            filterType:[], filterRarity:[], filterStatTrack:'all', filterWear:[],
            filterCollection:[], filterPatternMin:'', filterPatternMax:''
        };
        this.renderTransferInventory(this._transferUnitId);
    }

    changeTransferQuantity(delta) {
        const input = document.getElementById('transfer-qty-input');
        if (!input) return;
        const filtered = this.getFilteredTransferItems();
        const max = Math.min(100, filtered.length);
        let val = parseInt(input.value) || 0;
        val = Math.max(0, Math.min(max, val + delta));
        input.value = val;
        this._applyTransferQuantity(val, filtered);
    }

    validateTransferQuantity() {
        const input = document.getElementById('transfer-qty-input');
        if (!input) return;
        const filtered = this.getFilteredTransferItems();
        const max = Math.min(100, filtered.length);
        let val = parseInt(input.value) || 0;
        if (val > max) val = max;
        if (val < 0) val = 0;
        input.value = val;
        this._applyTransferQuantity(val, filtered);
    }

    _applyTransferQuantity(qty, filtered) {
        this._transferSelectedIds.clear();
        for (let i = 0; i < qty && i < filtered.length; i++) this._transferSelectedIds.add(filtered[i].id);
        this.updateTransferUI();
        this.updateTransferGrid();
    }

    toggleTransferSelection(itemId) {
        if (this._transferSelectedIds.has(itemId)) this._transferSelectedIds.delete(itemId);
        else this._transferSelectedIds.add(itemId);
        const input = document.getElementById('transfer-qty-input');
        if (input) input.value = this._transferSelectedIds.size;
        this.updateTransferUI();
        this.updateTransferGrid();
    }

    updateTransferUI() {
        const countSpan = document.getElementById('transfer-count');
        if (countSpan) countSpan.textContent = this._transferSelectedIds.size;
    }

    updateTransferGrid() {
        const grid = document.getElementById('transfer-grid');
        if (!grid) return;
        const filtered = this.getFilteredTransferItems();
        grid.innerHTML = '';
        if (filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column:1/-1">${this.t('no_items')}</p>`;
            return;
        }
        filtered.forEach(item => {
            if (!item.image) item.image = item.imageUrl || this.generateItemImage(item);
            const card = document.createElement('div');
            card.className = 'item-card';
            card.dataset.rarity = item.rarity;
            const stickersHtml = (item.stickers || []).map(s => s.imageUrl ? `<img src="${s.imageUrl}" title="${s.name}" style="width:20px;height:15px;object-fit:contain;">` : '').join('');
            const isFav = item.isFavorite;
            const isStat = item.statTrack;
            const isCase = item.type === 'case' || item.type === 'capsule';
            const displayName = isCase ? (this.collectionDisplayNames[item.collection] || item.collection) : item.weaponType;
            const collectionOrSkin = isCase ? item.collection : (item.skinName || '');
            card.innerHTML = `${isFav ? '<span class="favorite-badge">⭐</span>' : ''}${isStat ? '<span class="stattrack-label">StatTrack™</span>' : ''}<img src="${item.image}" class="item-img"><span class="item-name">${displayName}</span><span class="item-wear">${collectionOrSkin}</span><div class="item-stickers">${stickersHtml}</div>`;
            if (this._transferSelectedIds.has(item.id)) card.classList.add('selected-for-transfer');
            card.addEventListener('click', () => this.toggleTransferSelection(item.id));
            grid.appendChild(card);
        });
    }

    confirmTransferToStorage(unitId) {
        const unit = this.state.storageUnits.find(u => u.id === unitId);
        if (!unit) return;
        const ids = Array.from(this._transferSelectedIds);
        ids.forEach(id => {
            const idx = this.state.inventory.findIndex(i => i.id === id);
            if (idx !== -1) {
                const item = this.state.inventory.splice(idx, 1)[0];
                unit.items.push(item);
            }
        });
        this._transferSelectedIds.clear();
        this.saveState();
        this.renderInventory();
        this.showStorage(unitId);
        this.addConsoleLog(`Предметы перемещены в ${unit.name}`);
    }

    openTrade() {
        const modal = document.getElementById('trade-modal');
        modal.classList.add('active');
        this.renderTradeRaritySelect();
    }

    renderTradeRaritySelect() {
        const t = this.t.bind(this);
        const content = document.getElementById('trade-content');
        content.innerHTML = `<h3>${t('select_rarity')}</h3>`;
        this.rarities.slice(0, -1).forEach(rarity => {
            const btn = document.createElement('button');
            btn.textContent = rarity;
            btn.addEventListener('click', () => this.selectTradeRarity(rarity));
            content.appendChild(btn);
        });
    }

    selectTradeRarity(rarity) {
        this.tradeRarity = rarity;
        this.tradeSelected = [];
        this.renderTradeItems();
    }

    renderTradeItems() {
        const t = this.t.bind(this);
        const content = document.getElementById('trade-content');
        const eligible = this.state.inventory.filter(i => i.rarity === this.tradeRarity && i.type !== 'case' && i.type !== 'capsule');
        content.innerHTML = `<h3>${t('select_items')} (${this.tradeRarity})</h3>
            <div class="inventory-grid" id="trade-grid"></div>
            <p>${t('select_items')}: <span id="trade-count">0</span>/10</p>
            <button onclick="Game.submitTrade()">${t('submit_trade')}</button>
            <button onclick="Game.openTrade()">${t('back')}</button>`;
        const grid = document.getElementById('trade-grid');
        eligible.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card trade-item';
            card.dataset.rarity = item.rarity;
            card.innerHTML = `<img src="${item.image}" class="item-img"><span class="item-name">${item.weaponType} | ${item.skinName}</span>`;
            if (this.tradeSelected.includes(item.id)) card.classList.add('selected');
            card.addEventListener('click', () => this.toggleTradeItem(item.id));
            grid.appendChild(card);
        });
    }

    toggleTradeItem(id) {
        const idx = this.tradeSelected.indexOf(id);
        if (idx === -1) {
            if (this.tradeSelected.length >= 10) return alert('Максимум 10');
            this.tradeSelected.push(id);
        } else {
            this.tradeSelected.splice(idx, 1);
        }
        document.getElementById('trade-count').textContent = this.tradeSelected.length;
        this.renderTradeItems();
    }

    submitTrade() {
        if (this.tradeSelected.length !== 10) return alert('Нужно 10 предметов');
        const nextRarity = this.rarities[this.rarities.indexOf(this.tradeRarity) + 1] || this.tradeRarity;
        const firstItem = this.state.inventory.find(i => i.id === this.tradeSelected[0]);
        const colName = firstItem ? firstItem.collection : 'Armor';
        const newItem = this.generateItem(colName, null, true);
        if (!newItem) return;
        newItem.rarity = nextRarity;
        this.state.inventory = this.state.inventory.filter(i => !this.tradeSelected.includes(i.id));
        this.addItem(newItem);
        this.tradeSelected = [];
        this.saveState();
        this.closeModal();
        this.renderInventory();
        alert(`Trade Up! Получен ${newItem.rarity} предмет.`);
    }

    regenerateEnergy() {
        const now = Date.now();
        const mins = Math.floor((now - this.state.lastEnergyTime) / 60000);
        if (mins > 0) {
            this.state.energy = Math.min(this.state.maxEnergy, this.state.energy + mins);
            this.state.lastEnergyTime += mins * 60000;
            this.saveState();
        }
        this.updateEnergyDisplay();
    }

    updateEnergyDisplay() {
        const el = document.getElementById('energy');
        if (el) el.textContent = `⚡ ${this.state.energy}/${this.state.maxEnergy}`;
    }

    updateBalanceDisplay() {
        const el = document.getElementById('balance');
        if (el) el.textContent = `₽${this.formatPrice(this.state.balance)}`;
    }

    dailyCheck() {
        const today = new Date().toDateString();
        if (this.state.lastDailyBonus !== today) {
            this.state.balance += Math.floor(Math.random() * 40) + 10;
            this.state.lastDailyBonus = today;
            alert('Ежедневный бонус!');
            this.saveState();
            this.updateBalanceDisplay();
        }
    }

    checkDailyReset() {
        const today = new Date().toDateString();
        if (this.state.quests.lastDailyReset !== today) {
            this.state.quests.daily.forEach(q => { q.progress = 0; q.completed = false; });
            this.state.quests.lastDailyReset = today;
            this.saveState();
        }
    }

    addConsoleLog(msg) {
        if (!Array.isArray(this.state.consoleLog)) this.state.consoleLog = [];
        this.state.consoleLog.unshift(`${new Date().toLocaleTimeString()} | ${msg}`);
        if (this.state.consoleLog.length > 20) this.state.consoleLog.pop();
        this.updateConsole();
    }

    updateConsole() {
        const log = document.getElementById('console-log');
        if (log) log.textContent = (this.state.consoleLog || []).join('\n');
    }

    initConsoleDrag() {
        const modal = document.getElementById('console-modal');
        const content = document.getElementById('console-modal-content');
        const handle = document.getElementById('console-drag-handle');
        let isDragging = false, startX, startY, initialLeft, initialTop;
        handle.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX; startY = e.clientY;
            const rect = content.getBoundingClientRect();
            initialLeft = rect.left; initialTop = rect.top;
            content.style.position = 'fixed';
            content.style.left = initialLeft + 'px';
            content.style.top = initialTop + 'px';
            e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            content.style.left = (initialLeft + e.clientX - startX) + 'px';
            content.style.top = (initialTop + e.clientY - startY) + 'px';
        });
        document.addEventListener('mouseup', () => { isDragging = false; });
    }

    initConsoleResize() {
        const content = document.getElementById('console-modal-content');
        const handles = content.querySelectorAll('.resize-handle');
        handles.forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const dir = handle.dataset.resize;
                const startX = e.clientX, startY = e.clientY;
                const rect = content.getBoundingClientRect();
                const startWidth = rect.width, startHeight = rect.height, startLeft = rect.left, startTop = rect.top;
                content.style.position = 'fixed';
                content.style.left = startLeft + 'px';
                content.style.top = startTop + 'px';
                function onMouseMove(e) {
                    const dx = e.clientX - startX, dy = e.clientY - startY;
                    if (dir.includes('e')) content.style.width = Math.max(200, startWidth + dx) + 'px';
                    if (dir.includes('w')) { content.style.width = Math.max(200, startWidth - dx) + 'px'; content.style.left = (startLeft + dx) + 'px'; }
                    if (dir.includes('s')) content.style.height = Math.max(100, startHeight + dy) + 'px';
                    if (dir.includes('n')) { content.style.height = Math.max(100, startHeight - dy) + 'px'; content.style.top = (startTop + dy) + 'px'; }
                }
                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        });
    }

    exportSave() {
        const data = JSON.parse(JSON.stringify(this.state));
        data.inventory.forEach(i => { if (!i.image) i.image = i.imageUrl || this.generateItemImage(i); });
        const blob = new Blob([JSON.stringify(data)], { type:'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'arsenalzone_backup.json';
        a.click();
    }

    importSavePrompt() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    data.consoleLog = Array.isArray(data.consoleLog) ? data.consoleLog : [];
                    data.storageUnits = Array.isArray(data.storageUnits) ? data.storageUnits : [];
                    data.inventory.forEach(i => { if (!i.image) i.image = i.imageUrl || this.generateItemImage(i); });
                    this.state = data;
                    this._itemCounter = this.state._itemCounter || 0;
                    this.saveState();
                    location.reload();
                } catch { alert('Неверный файл'); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    resetProgress() {
        if (confirm('Удалить весь прогресс?')) {
            try { localStorage.removeItem('arsenalzone_save'); } catch(e) {}
            this._memory = {};
            location.reload();
        }
    }

    updateUILanguage() {
        this.renderInventory();
        this.renderProfile();
        this.renderMinigames();
        this.renderShop();
    }

    renderMinigames() {
        this.prepareMinigamesView();
    }
}

window.addEventListener('load', () => {
    window.Game = new ArsenalZone();
});
</script>
</body>
</html>
