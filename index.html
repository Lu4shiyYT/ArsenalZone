<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ArsenalZone</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        :root{--bg:#1b1b1b;--panel:#2a2a2a;--text:#ccc;--accent:#ffd700;--usual:#6b6b6b;--frequent:#a0a0a0;--conveyor:#4b69ff;--rare:#8845ff;--unique:#d32ce6;--relic:#e74c3c;--gold:#ffd700;--button:#3a3a3a;--button-hover:#4d4d4d;--danger:#e74c3c;--success:#2ecc71}
        body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;-webkit-tap-highlight-color:transparent}
        header{background:var(--panel);padding:10px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #444;flex-shrink:0}
        .balance{font-weight:bold;color:var(--gold)}.energy{font-size:0.9em;color:#4fc3f7}
        nav{display:flex;background:var(--panel);border-top:1px solid #444;flex-shrink:0}
        nav button{flex:1;padding:12px 5px;background:transparent;color:var(--text);border:none;border-bottom:3px solid transparent;font-size:0.85rem;cursor:pointer;transition:0.2s}
        nav button.active{border-bottom-color:var(--accent);color:#fff}
        main{flex:1;overflow-y:auto;padding:10px 10px 60px 10px;display:flex;flex-direction:column}
        .view{display:none;flex:1;flex-direction:column}.view.active{display:flex}
        .inventory-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
        @media(max-width:600px){.inventory-grid{grid-template-columns:repeat(3,1fr)}}
        .item-card{background:var(--panel);border-radius:6px;padding:5px;border-left:4px solid var(--usual);cursor:pointer;position:relative;transition:0.2s;display:flex;flex-direction:column;align-items:center;min-height:120px;justify-content:center}
        .item-card:hover{background:#3a3a3a}.item-name{font-size:0.7rem;text-align:center;margin:4px 0}.item-wear{font-size:0.6rem;color:#999}
        .item-card[data-rarity="Usual"]{border-left-color:var(--usual)}.item-card[data-rarity="Frequent"]{border-left-color:var(--frequent)}.item-card[data-rarity="Conveyor-type"]{border-left-color:var(--conveyor)}.item-card[data-rarity="Rare"]{border-left-color:var(--rare)}.item-card[data-rarity="Unique"]{border-left-color:var(--unique)}.item-card[data-rarity="Relic"]{border-left-color:var(--relic)}.item-card[data-rarity="Gold"]{border-left-color:var(--gold)}
        .item-img{width:80px;height:60px;object-fit:contain;margin-bottom:5px}.favorite-badge{position:absolute;top:5px;right:5px;font-size:1rem;color:var(--accent)}.stattrack-label{position:absolute;top:5px;left:5px;font-size:0.65rem;color:#ff8c00;font-weight:bold}.item-stickers{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center}.item-stickers img{width:20px;height:15px;object-fit:contain}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:1000;flex-direction:column}.modal.active{display:flex}
        .modal-content{background:var(--panel);border-radius:10px;padding:20px;max-width:760px;width:95%;text-align:center;max-height:80vh;overflow-y:auto;position:relative}
        #case-canvas{background:#000;border-radius:8px;width:100%;height:210px}
        button{background:var(--button);color:var(--text);border:none;padding:10px 15px;border-radius:4px;cursor:pointer;transition:0.2s;font-weight:bold;font-size:0.9rem;margin:4px}button:hover{background:var(--button-hover)}button.accent{background:var(--accent);color:#000}button.danger{background:var(--danger)}
        .profile-stat{display:flex;justify-content:space-between;margin:10px 0}
        .filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}.filter-bar select,.filter-bar input,.filter-bar button{padding:5px 10px;background:var(--button);color:var(--text);border:none;border-radius:4px}
        .quest-item{background:var(--panel);padding:10px;margin:5px 0;border-radius:5px}.achievement{background:var(--panel);padding:8px;margin:4px 0;border-radius:5px;display:flex;justify-content:space-between}
        .sticker-select-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.sticker-select-item{background:var(--button);border-radius:6px;padding:5px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}.sticker-select-item:hover{background:var(--button-hover)}.sticker-select-item img{width:50px;height:40px;object-fit:contain}.sticker-rarity-bar{width:100%;height:6px;border-radius:2px}
        .rarity-bar{width:100%;height:4px;margin-top:4px;border-radius:2px}
        #console-toggle{position:fixed;bottom:78px;right:10px;z-index:2001;font-size:0.8rem;left:auto;transform:none}
        #console-modal{background:none;pointer-events:none;z-index:2000}
        #console-modal.active{display:flex}
        #console-modal .modal-content{width:500px;max-width:90vw;height:300px;min-width:200px;min-height:100px;background:#000;color:#0f0;font-family:monospace;padding:0;box-shadow:0 0 10px #000;position:relative;overflow:hidden;display:flex;flex-direction:column;pointer-events:auto;}
        #console-modal .drag-handle{cursor:move;background:#111;padding:5px 10px;color:#0f0;font-weight:bold;flex-shrink:0}
        #console-log{flex:1;overflow-y:auto;padding:5px;white-space:pre-wrap;font-size:13px}
        .resize-handle{position:absolute;z-index:10;background:transparent}
        .resize-n{top:0;left:0;right:0;height:6px;cursor:n-resize}.resize-s{bottom:0;left:0;right:0;height:6px;cursor:s-resize}.resize-e{top:0;bottom:0;right:0;width:6px;cursor:e-resize}.resize-w{top:0;bottom:0;left:0;width:6px;cursor:w-resize}
        .resize-ne{top:0;right:0;width:12px;height:12px;cursor:ne-resize}.resize-nw{top:0;left:0;width:12px;height:12px;cursor:nw-resize}.resize-se{bottom:0;right:0;width:12px;height:12px;cursor:se-resize}.resize-sw{bottom:0;left:0;width:12px;height:12px;cursor:sw-resize}
        .trade-item{position:relative}.trade-item.selected::after{content:'✅';position:absolute;top:2px;right:2px;font-size:1.2rem}
        #trade-modal .modal-content{width:100%;height:100%;max-width:none;max-height:none;border-radius:0;padding:10px;display:flex;flex-direction:column}#trade-content{flex:1;overflow-y:auto}
        #market-item-modal .modal-content{width:100%;height:100%;max-width:100vw;max-height:100vh;border-radius:0;padding:10px;display:flex;flex-direction:column}
        #market-item-content{flex:1;display:flex;flex-direction:column;overflow-y:auto}
        #sound-toggle{background:transparent;border:none;font-size:1.3rem;cursor:pointer;padding:0 5px;color:var(--text)}
        .inventory-counter{margin-bottom:8px;font-size:0.9rem;color:var(--accent)}
        .selected-for-transfer{outline:2px solid var(--accent)}
        .storage-card{border-left:4px solid #ffaa00!important;background:#2a2a2a;}
        .storage-icon{font-size:2.5rem;margin-bottom:5px;}
        .storage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;position:sticky;top:0;background:var(--panel);z-index:5;padding-bottom:5px;border-bottom:1px solid #444;}
        #storage-modal .modal-content{width:100%;height:100%;max-width:none;max-height:none;border-radius:0;padding:10px;display:flex;flex-direction:column;}
        #storage-content{flex:1;overflow-y:auto;}
        #item-detail-modal,#case-modal{z-index:1100}
        .bulk-controls{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:10px}
        .transfer-buttons{display:flex;justify-content:space-between;margin-bottom:10px}
        .sell-controls{display:flex;justify-content:center;align-items:center;gap:5px;margin-bottom:10px}
        #item-detail-modal .modal-content.fullskin{
            background: #1b1b1b;
            max-width: 100vw;
            max-height: 100vh;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .fullskin .skin-header{text-align:center;padding:15px 20px 5px; flex-shrink:0;}
        .fullskin .skin-header h2{margin:0;color:#fff;font-size:1.8rem;}
        .fullskin .skin-header .stat-track{color:#ff8c00;margin-right:5px;}
        .fullskin .skin-header .collection-name{color:#aaa;font-size:0.9em;}
        .fullskin .rarity-line{width:100%;height:3px;margin-top:4px;}
        .fullskin .skin-image-area{flex:1 1 auto; display:flex; justify-content:center; align-items:center; position:relative; width:100%; padding:10px; min-height:0;}
        .fullskin .skin-image-area img{max-width:90%; max-height:50vh; object-fit:contain;}
        .fullskin .bulk-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);border:none;color:white;font-size:2rem;padding:10px;cursor:pointer;z-index:10;}
        .fullskin .bulk-nav.left{left:10px;}
        .fullskin .bulk-nav.right{right:10px;}
        .fullskin .close-fullskin{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.5);border:none;color:white;font-size:1.5rem;width:40px;height:40px;border-radius:50%;cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
        .fullskin .skin-actions{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:5px;padding:8px 10px;background:rgba(0,0,0,0.7);width:100%; flex-shrink:0; margin-top:auto;}
        .fullskin .skin-actions #info-btn{position:static; margin-right:auto; margin-left:10px;}
        .fullskin #info-popup{display:none; position:absolute; bottom:90px; left:20px; background:var(--panel); color:var(--text); padding:15px; border-radius:8px; box-shadow:0 0 15px black; max-width:320px; z-index:30; font-size:0.9rem; line-height:1.5; text-align:left;}
        .case-skins-scroll{margin:10px 0; flex-shrink:1; overflow:visible;}
        .case-skin-items{display:flex;flex-wrap:wrap;justify-content:flex-start;gap:10px; padding:0 10px;}
        .case-skin-card{display:flex;flex-direction:column;align-items:center;width:120px;text-align:center;}
        .case-skin-card img{width:100px;height:75px;object-fit:contain;display:block;margin:0 auto;}
        .case-skin-card .skin-name{font-size:0.7rem;margin:4px 0 0 0;}
        .case-skin-card .rarity-line{width:100%;height:3px;margin-top:auto;}
        .modal-close-btn{position:absolute;top:10px;right:10px;background:transparent;border:none;color:white;font-size:1.5rem;cursor:pointer;z-index:10;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
        .bulk-counter{position:absolute;top:15px;left:20px;color:white;font-size:1.2rem;z-index:25;background:rgba(0,0,0,0.5);padding:5px 10px;border-radius:5px;}
        .market-item-wrapper{display:flex;flex-direction:column;align-items:center;}
        .market-item-wrapper .item-card{margin-bottom:4px;}
    </style>
</head>
<body>
    <header>
        <span class="balance" id="balance">₽0.00</span>
        <span class="energy" id="energy">⚡ 50/50</span>
        <select id="lang-select"><option value="ru">Русский</option><option value="en">English</option></select>
        <button id="sound-toggle">🔊</button>
    </header>
    <main id="main-container"></main>
    <nav>
        <button data-view="inventory" class="active">🎒 Инвентарь</button><button data-view="market">🏪 Рынок</button><button data-view="minigames">🎮 Мини-игры</button><button data-view="profile">👤 Профиль</button><button data-view="shop">🛒 Магазин</button>
    </nav>
    <div class="modal" id="case-modal"><div class="modal-content"><button class="modal-close-btn" onclick="Game.skipCaseAnimation()">✕</button><h3>Открытие кейса</h3><canvas id="case-canvas" width="740" height="210"></canvas></div></div>
    <div class="modal" id="item-detail-modal"><div class="modal-content fullskin" id="item-detail-content"></div></div>
    <div class="modal" id="console-modal"><div class="modal-content" id="console-modal-content"><div class="drag-handle" id="console-drag-handle">Консоль</div><div id="console-log"></div><div class="resize-handle resize-n" data-resize="n"></div><div class="resize-handle resize-s" data-resize="s"></div><div class="resize-handle resize-e" data-resize="e"></div><div class="resize-handle resize-w" data-resize="w"></div><div class="resize-handle resize-ne" data-resize="ne"></div><div class="resize-handle resize-nw" data-resize="nw"></div><div class="resize-handle resize-se" data-resize="se"></div><div class="resize-handle resize-sw" data-resize="sw"></div></div></div>
    <div class="modal" id="trade-modal"><div class="modal-content" id="trade-content"></div></div>
    <div class="modal" id="market-item-modal"><div class="modal-content" id="market-item-content"></div></div>
    <div class="modal" id="storage-modal"><div class="modal-content" id="storage-content"></div></div>
    <div class="modal" id="bulk-open-modal"><div class="modal-content" id="bulk-open-content" style="max-width:800px;"></div></div>
    <button id="console-toggle">📟 Консоль</button>
    <script>
    class ArsenalZone {
        constructor() {
            this._memory = {};
            this.initData();
            this.state = this.loadState();
            this.sound = this.initSound();
            this.locale = this.state.settings.language || 'ru';
            this._sellMode = false;
            this._sellSelected = new Set();
            this._transferSelectedIds = new Set();
            this._storageFilters = {};
            this._transferFilters = { filterType:'all', filterRarity:'all', filterStatTrack:'all', filterWear:'all', filterCollection:'all', filterPatternMin:'', filterPatternMax:'' };
            this._transferUnitId = null;
            this._transferFilteredItems = [];
            this._storageReturnMode = false;
            this._storageReturnSelected = new Set();
            this._storageReturnUnitId = null;
            this._storageReturnFilteredItems = [];
            this._currentBulkItems = null;
            this._currentBulkIndex = 0;
            this._currentAnimCallback = null;
            this._currentWonItem = null;
            this._currentMarketOffers = [];
            if (!this.state.marketFilters) {
                this.state.marketFilters = { type:'all', rarity:'all', collection:'all', name:'' };
            }
            this.translations = {
                ru: { inventory:'🎒 Инвентарь',market:'🏪 Рынок',minigames:'🎮 Мини-игры',profile:'👤 Профиль',shop:'🛒 Магазин',backup:'💾 Бэкап',import:'📥 Импорт',profile_title:'Профиль',cases_opened:'Кейсов открыто',items_collected:'Предметов собрано',gold_items:'Золотых предметов',reset:'Сбросить прогресс',quest_daily:'Ежедневные квесты',shop_title:'Магазин',buy:'Купить',price:'Цена',trade_up:'🔃 Trade Up',open:'Открыть',odds:'Шансы',open_fast:'Быстрое открытие',wear:'Износ',rarity:'Редкость',collection:'Коллекция',type:'Тип',pattern:'Паттерн',stickers:'Стикеры',apply_sticker:'Наклеить',sell:'Продать',favorite:'Избранное',close:'Закрыть',close_storage:'Закрыть хранилище',filter_all:'Все',filter_weapon:'Оружие',filter_knife:'Ножи',filter_gloves:'Перчатки',filter_charm:'Брелоки',filter_sticker:'Стикеры',filter_agent:'Агенты',filter_case:'Кейсы/Капсулы',no_items:'Нет предметов',no_stickers:'У вас нет стикеров',back:'Назад',stattrack_filter:'StatTrack',wear_filter:'Износ',pattern_filter:'Паттерн',select_rarity:'Выберите редкость',select_items:'Выберите 10 предметов',submit_trade:'Сдать на трейд',need_more:'Выберите ещё',market_buy:'Купить на рынке',market_no_items:'Ничего не найдено',market_title:'Рынок',storage_buy:'Купить хранилище (2000₽)',storage_max:'Максимум 50 хранилищ',storage_rename:'Переименовать',storage_open:'Открыть',storage_move_to_storage:'📦 В хранилище',storage_move_to_inv:'📥 В инвентарь',storage_add_items:'➕ Добавить предметы из инвентаря',storage_empty:'Хранилище пусто',storage_select_target:'Выберите хранилище',sell_mode:'Продажа',sell_selected:'Продать выбранные',cancel:'Отмена',remove_sticker:'Снять стикер',storage_return:'Вернуть в инвентарь',storage_return_selected:'Вернуть выбранные',reset_filters:'Сбросить фильтры',with_stickers:'С наклейками',with_charms:'С брелоками',reset_btn:'Сбросить',offer_error:'Неверный формат износа',offer_no_items:'Предметов не найдено' },
                en: { inventory:'🎒 Inventory',market:'🏪 Market',minigames:'🎮 Mini-games',profile:'👤 Profile',shop:'🛒 Shop',backup:'💾 Backup',import:'📥 Import',profile_title:'Profile',cases_opened:'Cases opened',items_collected:'Items collected',gold_items:'Gold items',reset:'Reset progress',quest_daily:'Daily quests',shop_title:'Shop',buy:'Buy',price:'Price',trade_up:'🔃 Trade Up',open:'Open',odds:'Odds',open_fast:'Fast Open',wear:'Wear',rarity:'Rarity',collection:'Collection',type:'Type',pattern:'Pattern',stickers:'Stickers',apply_sticker:'Apply',sell:'Sell',favorite:'Favorite',close:'Close',close_storage:'Close storage',filter_all:'All',filter_weapon:'Weapons',filter_knife:'Knives',filter_gloves:'Gloves',filter_charm:'Charms',filter_sticker:'Stickers',filter_agent:'Agents',filter_case:'Cases/Capsules',no_items:'No items',no_stickers:'No stickers available',back:'Back',stattrack_filter:'StatTrack',wear_filter:'Wear',pattern_filter:'Pattern',select_rarity:'Select rarity',select_items:'Select 10 items',submit_trade:'Submit Trade',need_more:'Need more',market_buy:'Buy on market',market_no_items:'Nothing found',market_title:'Market',storage_buy:'Buy storage (2000₽)',storage_max:'Maximum 50 storages',storage_rename:'Rename',storage_open:'Open',storage_move_to_storage:'📦 To storage',storage_move_to_inv:'📥 To inventory',storage_add_items:'➕ Add items from inventory',storage_empty:'Storage is empty',storage_select_target:'Select storage',sell_mode:'Sell Mode',sell_selected:'Sell Selected',cancel:'Cancel',remove_sticker:'Remove Sticker',storage_return:'Return to Inventory',storage_return_selected:'Return Selected',reset_filters:'Reset Filters',with_stickers:'With Stickers',with_charms:'With Charms',reset_btn:'Reset',offer_error:'Invalid wear format',offer_no_items:'No items found' }
            };
            this.goldPlaceholder = new Image();
            this.goldPlaceholder.src = 'https://i.ibb.co/r29jJTNL/image.png';
            this.initUI();
            this.energyTimer = setInterval(() => this.regenerateEnergy(), 60000);
            this.dailyCheck();
            this.initConsoleDrag();
            this.initConsoleResize();
        }

        safeGet(k,d){ try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return this._memory[k] || d; } }
        safeSet(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { this._memory[k] = v; } }

        loadState() {
            let s = this.safeGet('arsenalzone_save', null);
            if (!s) s = this.defaultState();
            if (typeof s.balance !== 'number') s.balance = 100;
            if (typeof s.energy !== 'number') s.energy = 50;
            if (typeof s.maxEnergy !== 'number') s.maxEnergy = 50;
            if (typeof s.lastEnergyTime !== 'number') s.lastEnergyTime = Date.now();
            if (!s.stats || typeof s.stats !== 'object') s.stats = { casesOpened:0, itemsCollected:0, goldItems:0, upgrades:0, tttWins:0 };
            if (!s.quests || typeof s.quests !== 'object') s.quests = { daily: [], lastDailyReset: new Date().toDateString() };
            if (!Array.isArray(s.quests.daily)) s.quests.daily = [];
            if (!s.settings) s.settings = { language:'ru', soundEnabled: true };
            if (typeof s.settings.soundEnabled !== 'boolean') s.settings.soundEnabled = true;
            s.consoleLog = Array.isArray(s.consoleLog) ? s.consoleLog : [];
            if (!Array.isArray(s.storageUnits)) s.storageUnits = [];
            if (!s.marketFilters) s.marketFilters = { type:'all', rarity:'all', collection:'all', name:'' };
            if (s.inventory) s.inventory.forEach(i => {
                i.rarity = i.rarity || 'Usual';
                i.weaponType = i.weaponType || i.name || 'Unknown';
                i.skinName = i.skinName || '';
                i.wearCategory = i.wearCategory || 'Worn';
                i.pattern = i.pattern || 0;
                i.stickers = (i.stickers || []).map(s => {
                    if (typeof s === 'string') return { name: s, imageUrl: '', minPrice: 0 };
                    if (!s.rarity) s.rarity = this.getStickerRarityByName(s.name);
                    return s;
                });
                i.isFavorite = i.isFavorite || false;
                i.statTrack = i.statTrack || false;
                i.type = i.type || 'weapon';
                if (!i.image) i.image = i.imageUrl || this.generateItemImage(i);
                if (typeof i.minPrice !== 'number') i.minPrice = 0.1;
                if (i.type === 'case' || i.type === 'capsule') i.sellable = false;
                if (!i.acquiredDate) i.acquiredDate = new Date().toISOString().slice(0,10);
            });
            return s;
        }

        defaultState() {
            return {
                balance:100, energy:50, maxEnergy:50, lastEnergyTime:Date.now(),
                inventory:[], stats:{ casesOpened:0, itemsCollected:0, goldItems:0, upgrades:0, tttWins:0 },
                quests:{
                    daily:[
                        {id:'open3',desc:'Открыть 3 кейса',progress:0,goal:3,reward:30,completed:false},
                        {id:'ttt2',desc:'Выиграть 2 раза в крестики-нолики',progress:0,goal:2,reward:20,completed:false},
                        {id:'upgrade5',desc:'Улучшить предметы 5 раз',progress:0,goal:5,reward:25,completed:false}
                    ],
                    lastDailyReset:new Date().toDateString()
                },
                achievements:[
                    {id:'first_case',desc:'Открыть кейс',unlocked:false},
                    {id:'gold_found',desc:'Выбить золотой предмет',unlocked:false},
                    {id:'collector_10',desc:'Выбить 10 предметов',unlocked:false},
                    {id:'upgrade_master',desc:'Улучшить предмет до Gold',unlocked:false},
                    {id:'ttt_master',desc:'Выиграть 10 игр в крестики-нолики',unlocked:false}
                ],
                settings:{ language:'ru', soundEnabled: true },
                lastDailyBonus:null,
                filterType:'all', filterRarity:'all', filterStatTrack:'all', filterWear:'all',
                filterPatternMin:'', filterPatternMax:'', filterCollection:'all',
                consoleLog:[], marketListings:[],
                storageUnits: [],
                marketFilters: { type:'all', rarity:'all', collection:'all', name:'' }
            };
        }

        saveState() {
            if (this._saveTimeout) clearTimeout(this._saveTimeout);

                this.state.lastEnergyTime = Date.now();

        generateItemImage(item) {
            if (!item || !item.name) return '';
            const c = document.createElement('canvas'); c.width = 200; c.height = 150;
            const ctx = c.getContext('2d');
            const rc = this.rarityColors[item.rarity] || '#888';
            const g = ctx.createLinearGradient(0,0,200,150);
            g.addColorStop(0, rc); g.addColorStop(1, '#111');
            ctx.fillStyle = g; ctx.fillRect(0,0,200,150);
            if (item.emoji) {
                ctx.font = '80px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(item.emoji, 100, 70);
            } else {
                ctx.fillStyle = 'white'; ctx.font = 'bold 24px "Segoe UI"';
                ctx.textAlign = 'center'; ctx.fillText(item.name, 100, 75);
            }
            ctx.font = '14px "Segoe UI"'; ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.fillText(item.rarity, 100, 130);
            return c.toDataURL();
        }

        generateItem(colN, dropT, allowGold = true, chOvr = null) {
            const col = this.collections[colN];
            if (!col) return null;
            let chances = chOvr || col.odds || this.globalRarityChances;
            if (!allowGold) {
                chances = chances.filter(r => r.rarity !== 'Gold');
                if (chances.length === 0) return null;
            }
            let itT = dropT;
            if (!itT) {
                if (col.weaponsByRarity) itT = 'weapon';
                else if (col.stickersByRarity) itT = 'sticker';
                else if (col.agentsByRarity) itT = 'agent';
                else if (col.knife) itT = 'knife';
                else return null;
            }
            const rand = Math.random() * 100;
            let cum = 0, selectedRarity = null;
            for (const r of chances) {
                cum += r.chance;
                if (rand < cum) { selectedRarity = r.rarity; break; }
            }
            if (!selectedRarity) selectedRarity = chances[0].rarity;
            if (itT === 'weapon' && selectedRarity === 'Gold') itT = 'knife';
            if (itT === 'knife') selectedRarity = 'Gold';
            let pool;
            if (itT === 'weapon') pool = col.weaponsByRarity?.[selectedRarity];
            else if (itT === 'sticker') pool = col.stickersByRarity?.[selectedRarity];
            else if (itT === 'agent') pool = col.agentsByRarity?.[selectedRarity];
            else if (itT === 'knife') pool = col.knife;
            if (!pool || pool.length === 0) return null;
            const data = pool[Math.floor(Math.random() * pool.length)];
            if (!data) return null;
            const name = typeof data === 'string' ? data : data.name;
            let wt, sn;
            if (name && name.includes(' | ')) {
                const p = name.split(' | '); wt = p[0]; sn = p.slice(1).join(' | ');
            } else { wt = name; sn = ''; }
            let wear = 0, wc = '', pat = 0;
            if (itT !== 'agent' && itT !== 'sticker' && itT !== 'case' && itT !== 'capsule') {
                wear = Math.random() * 0.9999999998 + 0.0000000001;
                if (wear < 0.05) wc = 'Freshly Made';
                else if (wear < 0.20) wc = 'Practically New';
                else if (wear < 0.50) wc = 'Lightly-Used';
                else if (wear < 0.70) wc = 'Worn';
                else wc = 'Heavily-Worn';
                pat = Math.floor(Math.random() * 10000);
            }
            const st = (itT === 'weapon' || itT === 'knife') && Math.random() < 0.2;
            let specialPattern = null;
            if (this.specialPatterns[name]) {
                for (const sp of this.specialPatterns[name]) {
                    if (pat >= sp.min && pat <= sp.max) {
                        specialPattern = sp;
                        break;
                    }
                }
            }
            return {
                id: Date.now() + Math.random().toString(36),
                type: itT, collection: colN, name, weaponType: wt, skinName: sn,
                rarity: selectedRarity, wear, wearCategory: wc, pattern: pat,
                stickers: [], isFavorite: false, statTrack: st,
                emoji: data?.emoji || '',
                imageUrl: data?.imageUrl || '',
                minPrice: data?.minPrice || 0.1,
                sellable: itT !== 'case' && itT !== 'capsule',
                acquiredDate: new Date().toISOString().slice(0,10),
                specialPattern: specialPattern
            };
        }

        addItem(item) {
            if (!item.image) item.image = item.imageUrl || this.generateItemImage(item);
            if (!item.acquiredDate) item.acquiredDate = new Date().toISOString().slice(0,10);
            this.state.inventory.push(item);
            if (typeof this.state.stats.itemsCollected === 'number') this.state.stats.itemsCollected++;
            if (item.rarity === 'Gold' && typeof this.state.stats.goldItems === 'number') this.state.stats.goldItems++;
            this.checkAchievements(); this.saveState();
        }

        getItemPrice(item) {
            if (typeof item.minPrice === 'number') {
                if (item.type === 'weapon' || item.type === 'knife') {
                    let p = item.minPrice * (1 + (1 - item.wear) * 3.2);
                    if (item.statTrack) p *= (item.type === 'knife' ? 1.3 : 3);
                    if (item.stickers && item.stickers.length > 0) {
                        item.stickers.forEach(s => { if (s.minPrice) p += s.minPrice * 0.3; });
                    }
                    if (item.specialPattern) p *= item.specialPattern.multiplier;
                    return isNaN(p) ? 0 : p;
                }
                return item.minPrice;
            }
            const base = { Usual:0.3, Frequent:1, 'Conveyor-type':3, Rare:10, Unique:30, Relic:80, Gold:300 }[item.rarity] || 0.3;
            return base;
        }

        initSound() {
            const AC = window.AudioContext || window.webkitAudioContext;
            const ctx = new AC();
            return { play: (type) => {
                if (type === 'case_open' && this.state.settings.soundEnabled) {
                    const osc = ctx.createOscillator(), gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
                }
            }};
        }

            const el = document.getElementById(`view-${name}`);
            if (el) el.classList.add('active');
            if (name === 'inventory') this.renderInventory();
            else if (name === 'profile') this.renderProfile();

            else if (name === 'minigames') this.renderMinigames();

        sortInventory(items) {
            return items.sort((a,b) => {
                if (a.isFavorite !== b.isFavorite) return a.isFavorite ? -1 : 1;
                const ta = this.typeOrder.indexOf(a.type), tb = this.typeOrder.indexOf(b.type);
                if (ta !== tb) return ta - tb;
                const ra = this.rarities.indexOf(a.rarity), rb = this.rarities.indexOf(b.rarity);
                if (ra !== rb) return rb - ra;
                if (a.statTrack !== b.statTrack) return a.statTrack ? -1 : 1;
                if (a.name !== b.name) return a.name.localeCompare(b.name);
                return (a.wear || 0) - (b.wear || 0);
            });
        }

        getFilteredItems(excludeCases = false) {
            const tf = this.state.filterType || 'all', rf = this.state.filterRarity || 'all', sf = this.state.filterStatTrack || 'all', wf = this.state.filterWear || 'all', pmn = parseInt(this.state.filterPatternMin), pmx = parseInt(this.state.filterPatternMax), cf = this.state.filterCollection || 'all';
            let items = [...this.state.inventory];
            if (tf !== 'all') items = items.filter(i => { if (tf === 'case') return i.type === 'case' || i.type === 'capsule'; return i.type === tf; });
            if (rf !== 'all') items = items.filter(i => i.rarity === rf);
            if (sf === 'yes') items = items.filter(i => i.statTrack);
            else if (sf === 'no') items = items.filter(i => !i.statTrack);
            if (wf !== 'all') items = items.filter(i => i.wearCategory === wf);
            if (cf !== 'all') items = items.filter(i => i.collection === cf);
            if (!isNaN(pmn)) items = items.filter(i => i.pattern >= pmn);
            if (!isNaN(pmx)) items = items.filter(i => i.pattern <= pmx);
            if (excludeCases) items = items.filter(i => i.type !== 'case' && i.type !== 'capsule');
            return this.sortInventory(items);
        }

        getStorageFilters(unitId) {
            if (!this._storageFilters[unitId]) {
                this._storageFilters[unitId] = {
                    filterType: 'all', filterRarity: 'all', filterStatTrack: 'all', filterWear: 'all', filterCollection: 'all',
                    filterPatternMin: '', filterPatternMax: ''
                };
            }
            return this._storageFilters[unitId];
        }

        getFilteredStorageItems(unitId) {
            const unit = this.state.storageUnits.find(u => u.id === unitId);
            if (!unit) return [];
            const filters = this.getStorageFilters(unitId);
            let items = [...unit.items];
            const tf = filters.filterType || 'all';
            const rf = filters.filterRarity || 'all';
            const sf = filters.filterStatTrack || 'all';
            const wf = filters.filterWear || 'all';
            const cf = filters.filterCollection || 'all';
            const pmn = parseInt(filters.filterPatternMin);
            const pmx = parseInt(filters.filterPatternMax);
            if (tf !== 'all') items = items.filter(i => { if (tf === 'case') return i.type === 'case' || i.type === 'capsule'; return i.type === tf; });
            if (rf !== 'all') items = items.filter(i => i.rarity === rf);
            if (sf === 'yes') items = items.filter(i => i.statTrack);
            else if (sf === 'no') items = items.filter(i => !i.statTrack);
            if (wf !== 'all') items = items.filter(i => i.wearCategory === wf);
            if (cf !== 'all') items = items.filter(i => i.collection === cf);
            if (!isNaN(pmn)) items = items.filter(i => i.pattern >= pmn);
            if (!isNaN(pmx)) items = items.filter(i => i.pattern <= pmx);
            return this.sortInventory(items);
        }

        getFilteredTransferItems() {
            let items = [...this.state.inventory];
            const f = this._transferFilters;
            if (f.filterType !== 'all') items = items.filter(i => { if (f.filterType === 'case') return i.type === 'case' || i.type === 'capsule'; return i.type === f.filterType; });
            if (f.filterRarity !== 'all') items = items.filter(i => i.rarity === f.filterRarity);
            if (f.filterStatTrack === 'yes') items = items.filter(i => i.statTrack);
            else if (f.filterStatTrack === 'no') items = items.filter(i => !i.statTrack);
            if (f.filterWear !== 'all') items = items.filter(i => i.wearCategory === f.filterWear);
            if (f.filterCollection !== 'all') items = items.filter(i => i.collection === f.filterCollection);
            const pmn = parseInt(f.filterPatternMin), pmx = parseInt(f.filterPatternMax);
            if (!isNaN(pmn)) items = items.filter(i => i.pattern >= pmn);
            if (!isNaN(pmx)) items = items.filter(i => i.pattern <= pmx);
            return this.sortInventory(items);
        }

        renderInventory() {
            const c = document.getElementById('view-inventory'); if (!c) return;
            const t = this.t.bind(this);
            const ft = this.state.filterType || 'all', fr = this.state.filterRarity || 'all', fs = this.state.filterStatTrack || 'all', fw = this.state.filterWear || 'all', fc = this.state.filterCollection || 'all', pmn = this.state.filterPatternMin || '', pmx = this.state.filterPatternMax || '';
            const filteredItems = this.getFilteredItems();
            const totalItems = this.state.inventory.length;
            let html = `<div class="inventory-counter">${filteredItems.length}/${totalItems}</div>
            <div style="display:flex; gap:10px; margin-bottom:5px;">
                <button id="toggle-sell-mode">${this._sellMode ? t('cancel') : t('sell_mode')}</button>
            </div>`;
            if (this._sellMode) {
                const totalAvailable = this.getFilteredItems(true).length;
                const maxSelect = Math.min(100, totalAvailable);
                html += `<div class="sell-controls">
                    <button onclick="Game.changeSellQuantity(-1)">-</button>
                    <input type="number" id="sell-qty-input" value="0" min="0" max="${maxSelect}" style="width:60px;" oninput="Game.validateSellQuantity()">
                    <button onclick="Game.changeSellQuantity(1)">+</button>
                    <button onclick="Game.sellSelectedItems()">${t('sell_selected')} (<span id="sell-count">0</span>) - ₽<span id="sell-total">0.00</span></button>
                </div>`;
            }
            html += this.getFilterBarHTML(t, ft, fr, fc, fs, fw, pmn, pmx);
            html += `<div class="inventory-grid" id="inv-grid"></div>`;
            c.innerHTML = html;

            document.getElementById('filter-type').value = ft;
            document.getElementById('filter-rarity').value = fr;
            document.getElementById('filter-collection').value = fc;
            document.getElementById('filter-stattrack').value = fs;
            document.getElementById('filter-wear').value = fw;
            document.getElementById('filter-patmin').value = pmn;
            document.getElementById('filter-patmax').value = pmx;

            document.getElementById('toggle-sell-mode').addEventListener('click', () => this.toggleSellMode());
            document.getElementById('filter-type').addEventListener('change', (e) => { this.state.filterType = e.target.value; this.saveState(); this.renderInventory(); });
            document.getElementById('filter-rarity').addEventListener('change', (e) => { this.state.filterRarity = e.target.value; this.saveState(); this.renderInventory(); });
            document.getElementById('filter-collection').addEventListener('change', (e) => { this.state.filterCollection = e.target.value; this.saveState(); this.renderInventory(); });
            document.getElementById('filter-stattrack').addEventListener('change', (e) => { this.state.filterStatTrack = e.target.value; this.saveState(); this.renderInventory(); });
            document.getElementById('filter-wear').addEventListener('change', (e) => { this.state.filterWear = e.target.value; this.saveState(); this.renderInventory(); });
            document.getElementById('filter-patmin').addEventListener('input', (e) => { this.state.filterPatternMin = e.target.value; this.saveState(); this.renderInventory(); });
            document.getElementById('filter-patmax').addEventListener('input', (e) => { this.state.filterPatternMax = e.target.value; this.saveState(); this.renderInventory(); });
            document.getElementById('reset-filters-btn').addEventListener('click', () => {
                this.state.filterType = 'all'; this.state.filterRarity = 'all'; this.state.filterStatTrack = 'all'; this.state.filterWear = 'all'; this.state.filterCollection = 'all'; this.state.filterPatternMin = ''; this.state.filterPatternMax = '';
                this.saveState(); this.renderInventory();
            });
            this.applyFiltersAndStorage(filteredItems, this._sellMode);
        }

        getFilterBarHTML(t, ft, fr, fc, fs, fw, pmn, pmx) {
            return `<div class="filter-bar">
                <select id="filter-type">
                    <option value="all">${t('filter_all')}</option>
                    <option value="weapon">${t('filter_weapon')}</option><option value="knife">${t('filter_knife')}</option>
                    <option value="gloves">${t('filter_gloves')}</option><option value="charm">${t('filter_charm')}</option>
                    <option value="sticker">${t('filter_sticker')}</option><option value="agent">${t('filter_agent')}</option>
                    <option value="case">${t('filter_case')}</option>
                </select>
                <select id="filter-rarity">
                    <option value="all">${t('filter_all')}</option>
                    ${this.rarities.map(r => `<option value="${r}">${r}</option>`).join('')}
                </select>
                <select id="filter-collection">
                    <option value="all">${t('collection')}: ${t('filter_all')}</option>
                    ${Object.keys(this.collections).map(c => `<option value="${c}">${this.collectionDisplayNames[c] || c}</option>`).join('')}
                </select>
                <select id="filter-stattrack">
                    <option value="all">${t('stattrack_filter')}: ${t('filter_all')}</option>
                    <option value="yes">StatTrack™</option><option value="no">Обычный</option>
                </select>
                <select id="filter-wear">
                    <option value="all">${t('wear_filter')}: ${t('filter_all')}</option>
                    ${this.wearLevels.map(w => `<option value="${w}">${w}</option>`).join('')}
                </select>
                <input type="number" placeholder="Паттерн от" value="${pmn}" id="filter-patmin" style="width:80px">
                <input type="number" placeholder="до" value="${pmx}" id="filter-patmax" style="width:80px">
                <button id="reset-filters-btn">${t('reset_filters')}</button>
            </div>`;
        }

        toggleSellMode() {
            this._sellMode = !this._sellMode;
            if (!this._sellMode) this._sellSelected.clear();
            this.renderInventory();
        }

        changeSellQuantity(delta) {
            const input = document.getElementById('sell-qty-input');
            if (!input) return;
            const filtered = this.getFilteredItems(true);
            const max = Math.min(100, filtered.length);
            let val = parseInt(input.value) || 0;
            val = Math.max(0, Math.min(max, val + delta));
            input.value = val;
            this._applySellQuantity(val, filtered);
        }

        validateSellQuantity() {
            const input = document.getElementById('sell-qty-input');
            if (!input) return;
            const filtered = this.getFilteredItems(true);
            const max = Math.min(100, filtered.length);
            let val = parseInt(input.value) || 0;
            if (val > max) val = max;
            if (val < 0) val = 0;
            input.value = val;
            this._applySellQuantity(val, filtered);
        }

        _applySellQuantity(qty, filtered) {
            this._sellSelected.clear();
            for (let i = 0; i < qty && i < filtered.length; i++) {
                this._sellSelected.add(filtered[i].id);
            }
            this.updateSellUI();
            this.applyFiltersAndStorage(filtered, true);
        }

        toggleSellSelection(itemId) {
            if (!this._sellMode) return;
            if (this._sellSelected.has(itemId)) {
                this._sellSelected.delete(itemId);
            } else {
                this._sellSelected.add(itemId);
            }
            const input = document.getElementById('sell-qty-input');
            if (input) input.value = this._sellSelected.size;
            this.updateSellUI();
            this.applyFiltersAndStorage(this.getFilteredItems(true), true);
        }

        updateSellUI() {
            const countSpan = document.getElementById('sell-count');
            const totalSpan = document.getElementById('sell-total');
            if (!countSpan || !totalSpan) return;
            const count = this._sellSelected.size;
            let total = 0;
            this._sellSelected.forEach(id => {
                const item = this.state.inventory.find(i => i.id === id);
                if (item) total += this.getItemPrice(item) * 0.8;
            });
            countSpan.textContent = count;
            totalSpan.textContent = total.toFixed(2);
        }

        sellSelectedItems() {
            if (this._sellSelected.size === 0) return;
            let total = 0;
            const ids = Array.from(this._sellSelected);
            ids.forEach(id => {
                const item = this.state.inventory.find(i => i.id === id);
                if (item) {
                    total += this.getItemPrice(item) * 0.8;
                    this.state.inventory = this.state.inventory.filter(i => i.id !== id);
                }
            });
            this.state.balance += total;
            this._sellSelected.clear();
            this._sellMode = false;
            this.saveState();
            this.updateBalanceDisplay();
            this.renderInventory();
            this.addConsoleLog(`Продано предметов на ₽${total.toFixed(2)}`);
        }

        applyFiltersAndStorage(items, sellMode = false) {
            const grid = document.getElementById('inv-grid'); if (!grid) return;
            items = this.sortInventory(items);
            grid.innerHTML = '';
            if (!sellMode && this.state.storageUnits.length > 0) {
                this.state.storageUnits.forEach(unit => {
                    const card = document.createElement('div');
                    card.className = 'item-card storage-card';
                    card.innerHTML = `<div class="storage-icon">🗄️</div><span class="item-name">${unit.name}</span><span class="item-wear">Предметов: ${unit.items.length}</span>`;
                    card.addEventListener('click', () => this.showStorage(unit.id));
                    grid.appendChild(card);
                });
            }
            const displayItems = sellMode ? items.filter(i => i.type !== 'case' && i.type !== 'capsule') : items;
            if (displayItems.length === 0 && (this.state.storageUnits.length === 0 || sellMode)) {
                grid.innerHTML = `<p style="grid-column:1/-1;text-align:center">${this.t('no_items')}</p>`;
                return;
            }
            displayItems.forEach(item => {
                if (!item.image) item.image = item.imageUrl || this.generateItemImage(item);
                const card = document.createElement('div'); card.className = 'item-card'; card.dataset.rarity = item.rarity;
                const stickersHtml = (item.stickers || []).map(s => s.imageUrl ? `<img src="${s.imageUrl}" title="${s.name}" style="width:20px;height:15px;object-fit:contain;">` : '').join('');
                const isFav = item.isFavorite;
                const isStat = item.statTrack;
                const isSelected = sellMode && this._sellSelected.has(item.id);
                if (isSelected) card.classList.add('selected-for-transfer');
                const isCase = item.type === 'case' || item.type === 'capsule';
                const displayName = isCase ? (this.collectionDisplayNames[item.collection] || item.collection) : item.weaponType;
                const collectionOrSkin = isCase ? item.collection : (item.skinName || '');
                card.innerHTML = `${isFav ? '<span class="favorite-badge">⭐</span>' : ''}${isStat ? '<span class="stattrack-label">StatTrack™</span>' : ''}<img src="${item.image}" class="item-img"><span class="item-name">${displayName}</span><span class="item-wear">${collectionOrSkin}</span><div class="item-stickers">${stickersHtml}</div><div class="rarity-bar" style="background:${this.rarityColors[item.rarity] || '#888'};"></div>`;
                card.addEventListener('click', () => {
                    if (sellMode) this.toggleSellSelection(item.id);
                    else this.onItemClick(item);
                });
                grid.appendChild(card);
            });
        }

        onItemClick(item) {
            if (item.type === 'case' || item.type === 'capsule') this.showCaseDetail(item);
            else this.showItemDetail(item);
        }

        getOdds(col) {
            const chances = this.collections[col]?.odds || this.globalRarityChances;
            const odds = {}; chances.forEach(r => odds[r.rarity] = r.chance);
            return odds;
        }

        showCaseDetail(cItem, storageId = null) {
            const t = this.t.bind(this);
            const modal = document.getElementById('item-detail-modal'); modal.classList.add('active');
            const content = document.getElementById('item-detail-content');
            const col = this.collections[cItem.collection];
            const odds = this.getOdds(cItem.collection);
            const displayName = this.collectionDisplayNames[cItem.collection] || cItem.collection;
            let buttons = '';
            if (storageId) {
                buttons = `<button onclick="Game.openCaseFromStorage('${storageId}','${cItem.id}')">${t('open')}</button>
                           <button onclick="Game.moveFromStorageToInventory('${storageId}','${cItem.id}')">${t('storage_move_to_inv')}</button>`;
            } else {
                buttons = `<button onclick="Game.openCaseById('${cItem.id}')">${t('open')}</button>
                           <button onclick="Game.closeModal(); setTimeout(() => Game.startBulkOpen('${cItem.id}'), 0)">${t('open_fast')}</button>`;
            }
            let skinItems = [];
            if (col.weaponsByRarity) {
                const rarityOrder = odds ? Object.keys(odds) : Object.keys(col.weaponsByRarity);
                rarityOrder.forEach(rarity => {
                    if (col.weaponsByRarity[rarity]) col.weaponsByRarity[rarity].forEach(w => skinItems.push({ ...w, type: 'weapon', rarity }));
                });
                if (col.knife && col.knife.length > 0) skinItems.push({ type: 'gold', rarity: 'Gold', name: '', imageUrl: this.goldPlaceholder.src });
            } else if (col.stickersByRarity) {
                const rarityOrder = odds ? Object.keys(odds) : Object.keys(col.stickersByRarity);
                rarityOrder.forEach(rarity => {
                    if (col.stickersByRarity[rarity]) col.stickersByRarity[rarity].forEach(s => skinItems.push({ ...s, type: 'sticker', rarity }));
                });
            } else if (col.agentsByRarity) {
                const rarityOrder = odds ? Object.keys(odds) : Object.keys(col.agentsByRarity);
                rarityOrder.forEach(rarity => {
                    if (col.agentsByRarity[rarity]) col.agentsByRarity[rarity].forEach(a => skinItems.push({ ...a, type: 'agent', rarity }));
                });
            }
            let skinsHTML = '<div class="case-skins-scroll"><div class="case-skin-items">';
            skinItems.forEach(skin => {
                const rarityColor = this.rarityColors[skin.rarity] || '#888';
                let imgSrc = skin.imageUrl || this.generateItemImage(skin);
                let nameDisplay = skin.name || '';
                if (skin.type === 'gold') { imgSrc = this.goldPlaceholder.src; nameDisplay = ''; }
                skinsHTML += `<div class="case-skin-card"><img src="${imgSrc}" alt="${nameDisplay}"><div class="skin-name">${nameDisplay}</div><div class="rarity-line" style="background:${rarityColor};"></div></div>`;
            });
            skinsHTML += '</div></div>';
            content.innerHTML = `
            <button class="close-fullskin" onclick="Game.closeItemDetail()">✕</button>
            <div class="skin-header"><h2>${displayName}</h2><div class="collection-name">${cItem.collection}</div><div class="rarity-line" style="background:#6b6b6b;"></div></div>
            <div class="skin-image-area" style="flex:1 1 auto; display:flex; justify-content:center; align-items:center; padding:10px;"><img src="${cItem.image}" style="max-width:90%; max-height:50vh; object-fit:contain;"></div>
            ${skinsHTML}
            <div class="skin-actions">${buttons}</div>`;
        }

        openCaseById(id) { const item = this.state.inventory.find(i => i.id === id); if (!item) return; this.closeModal(); this.openCase(item); }

        showItemDetail(item, storageId = null, bulkItems = null, bulkIndex = 0, isMarketOffer = false) {
            const modal = document.getElementById('item-detail-modal');
            const content = document.getElementById('item-detail-content');
            modal.classList.add('active');
            this._currentBulkItems = bulkItems;
            this._currentBulkIndex = bulkIndex;
            const t = this.t.bind(this);
            const rarityColor = this.rarityColors[item.rarity] || '#888';
            const sw = item.type !== 'agent' && item.type !== 'sticker' && item.type !== 'case' && item.type !== 'capsule';
            const statTrackLabel = item.statTrack ? `<span class="stat-track">StatTrack™</span>` : '';
            const collectionName = this.collectionDisplayNames[item.collection] || item.collection;
            const releaseDate = this.collectionReleaseDates[item.collection] || 'неизвестно';
            const sellPrice = (this.getItemPrice(item) * 0.8).toFixed(2);
            const hideStickers = ['sticker','charm','agent'].includes(item.type);
            let infoHTML = '';
            if (sw) {
                infoHTML += `<p><strong>Износ:</strong> ${item.wear.toFixed(10)} (${item.wearCategory})</p>`;
                const patStr = String(item.pattern).padStart(4,'0');
                if (item.specialPattern) infoHTML += `<p><strong>Паттерн:</strong> ${patStr} (${item.specialPattern.name})</p>`;
                else infoHTML += `<p><strong>Паттерн:</strong> ${patStr}</p>`;
            }
            infoHTML += `<p><strong>Редкость:</strong> <span style="color:${rarityColor}">${item.rarity}</span></p>`;
            if (!hideStickers) {
                if ((item.stickers || []).length > 0) {
                    const stickerList = (item.stickers || []).map(s => {
                        const stickerRarityColor = this.rarityColors[s.rarity] || '#ccc';
                        return `${s.imageUrl ? `<img src="${s.imageUrl}" style="width:20px;height:20px;vertical-align:middle;"> ` : ''}<span style="color:${stickerRarityColor}">${s.name}</span>`;
                    }).join(', ');
                    infoHTML += `<p><strong>Стикеры:</strong> ${stickerList}</p>`;
                } else infoHTML += `<p><strong>Стикеры:</strong> —</p>`;
                infoHTML += `<p><strong>Брелок:</strong> —</p>`;
            }
            if (isMarketOffer && item.seller) {
                infoHTML += `<p><strong>Продавец:</strong> ${item.seller}</p>`;
            } else {
                infoHTML += `<p><strong>Дата получения:</strong> ${item.acquiredDate || 'неизвестно'}</p>`;
                infoHTML += `<p><strong>Дата выпуска:</strong> ${releaseDate}</p>`;
            }
            let navButtons = '';
            let counterHTML = '';
            if (bulkItems && bulkItems.length > 1) {
                navButtons = `<button class="bulk-nav left" onclick="Game.bulkPrev()">❮</button><button class="bulk-nav right" onclick="Game.bulkNext()">❯</button>`;
                counterHTML = `<div class="bulk-counter">${bulkIndex+1}/${bulkItems.length}</div>`;
            }
            const closeBtn = `<button class="close-fullskin" onclick="Game.closeItemDetail()">✕</button>`;
            let actionsHTML = '';
            if (isMarketOffer) {
                const marketPrice = item._marketPrice || this.getItemPrice(item);
                actionsHTML = `<div class="skin-actions"><button id="info-btn" onclick="Game.toggleInfoPopup()">i</button><button onclick="Game.buyMarketOfferFromDetail('${item.id}', ${marketPrice})">${t('buy')} (₽${marketPrice.toFixed(2)})</button></div>`;
            } else if (storageId) {
                actionsHTML = `<div class="skin-actions"><button id="info-btn" onclick="Game.toggleInfoPopup()">i</button><button onclick="Game.moveFromStorageToInventory('${storageId}','${item.id}')">${t('storage_move_to_inv')}</button></div>`;
            } else {
                actionsHTML = `<div class="skin-actions"><button id="info-btn" onclick="Game.toggleInfoPopup()">i</button><button onclick="Game.sellItem('${item.id}')">${t('sell')} (₽${sellPrice})</button>${item.type === 'weapon' ? `<button onclick="Game.applyStickerModal('${item.id}')">${t('apply_sticker')}</button>` : ''}${item.type === 'weapon' && (item.stickers || []).length > 0 ? `<button onclick="Game.removeStickerModal('${item.id}')">${t('remove_sticker')}</button>` : ''}<button onclick="Game.toggleFavorite('${item.id}')">${item.isFavorite ? '💔' : '❤️'}</button><button onclick="Game.moveItemToStorage('${item.id}')">${t('storage_move_to_storage')}</button></div>`;
            }
            content.innerHTML = `${counterHTML}<div class="skin-header"><h2>${statTrackLabel} ${item.weaponType} | ${item.skinName || ''}</h2><div class="collection-name">${collectionName}</div><div class="rarity-line" style="background:${rarityColor}"></div></div><div class="skin-image-area">${navButtons}<img src="${item.image}" alt="${item.name}"></div>${actionsHTML}${closeBtn}<div id="info-popup">${infoHTML}</div>`;
        }

        toggleInfoPopup() {
            const popup = document.getElementById('info-popup');
            if (popup) popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
        }

        bulkPrev() {
            if (!this._currentBulkItems || this._currentBulkIndex <= 0) return;
            this._currentBulkIndex--;
            this.showItemDetail(this._currentBulkItems[this._currentBulkIndex], null, this._currentBulkItems, this._currentBulkIndex);
        }
        bulkNext() {
            if (!this._currentBulkItems || this._currentBulkIndex >= this._currentBulkItems.length - 1) return;
            this._currentBulkIndex++;
            this.showItemDetail(this._currentBulkItems[this._currentBulkIndex], null, this._currentBulkItems, this._currentBulkIndex);
        }

        applyStickerModal(itemId) {
            const item = this.state.inventory.find(i => i.id === itemId);
            if (!item) return;
            if (item.type !== 'weapon') { alert('Стикеры можно клеить только на оружие!'); return; }
            if ((item.stickers || []).length >= 5) { alert('Максимум 5 стикеров.'); return; }
            const stickers = this.state.inventory.filter(i => i.type === 'sticker');
            stickers.sort((a, b) => {
                const rarityDiff = this.rarities.indexOf(b.rarity) - this.rarities.indexOf(a.rarity);
                if (rarityDiff !== 0) return rarityDiff;

        skipCaseAnimation() {
            const modal = document.getElementById('case-modal');
            if (modal.classList.contains('active') && this._currentWonItem) {
                modal.classList.remove('active');
                if (this._currentWonItem._realImageUrl) {
                    this._currentWonItem.imageUrl = this._currentWonItem._realImageUrl;
                    this._currentWonItem.image = this._currentWonItem._realImageUrl;
                    delete this._currentWonItem._realImageUrl;
                }
                this.addItem(this._currentWonItem);
                this.showItemDetail(this._currentWonItem);
                this.sound.play('case_open');
                this.checkQuests();
                if (this._currentAnimCallback) this._currentAnimCallback();
                this.renderInventory();
                this._currentWonItem = null;
                this._currentAnimCallback = null;
            }
        }

        animateCaseOpen(colN, dropT, callback = null) {
            const modal = document.getElementById('case-modal'); modal.classList.add('active');
            const canvas = document.getElementById('case-canvas'); const ctx = canvas.getContext('2d');
            const col = this.collections[colN];
            if (!col) { modal.classList.remove('active'); return; }
            const chances = col.odds || this.globalRarityChances;
            let won = this.generateItem(colN, dropT, true, chances);
            if (!won) won = this.generateItem(colN, dropT, false, chances.filter(r => r.rarity !== 'Gold'));
            if (!won) { modal.classList.remove('active'); return; }
            this._currentWonItem = won;
            this._currentAnimCallback = callback;
            const items = [];
            const desiredCount = 25;
            for (let i = 0; i < desiredCount; i++) {
                const it = this.generateItem(colN, dropT, false, chances);
                if (!it) continue;
                it.imageObj = new Image();
                it.imageObj.src = it.imageUrl || this.generateItemImage(it);
                items.push(it);
            }
            if (items.length === 0) {
                const fb = this.generateItem(colN, dropT, false, chances);
                if (fb) { fb.imageObj = new Image(); fb.imageObj.src = fb.imageUrl || this.generateItemImage(fb); items.push(fb); }
                else { modal.classList.remove('active'); return; }
            }
            const actualCount = items.length;
            const iw = 144, tw = actualCount * iw, centerLineX = canvas.width / 2;
            const stopIdx = Math.floor(Math.random() * actualCount);
            if (won.rarity === 'Gold') { won.imageObj = this.goldPlaceholder; items[stopIdx] = won; won._realImageUrl = won.imageUrl; }
            else { items[stopIdx] = won; won.imageObj = new Image(); won.imageObj.src = won.imageUrl || this.generateItemImage(won); }
            const offsetInsideCell = Math.random() * iw;
            const td = 2 * tw + (stopIdx * iw + offsetInsideCell - centerLineX);
            const dur = 4500;
            let st = performance.now();
            const draw = (now) => {
                if (!modal.classList.contains('active')) return;
                const el = now - st;
                if (el >= dur) {
                    const disp = ((td % tw) + tw) % tw;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    this.drawItems(ctx, items, disp, iw);
                    this.drawCenterLine(ctx, canvas);
                    setTimeout(() => {
                        if (!modal.classList.contains('active')) return;
                        modal.classList.remove('active');
                        if (won._realImageUrl) { won.imageUrl = won._realImageUrl; won.image = won._realImageUrl; delete won._realImageUrl; }
                        this.addItem(won);
                        this.showItemDetail(won);
                        this.sound.play('case_open');
                        this.checkQuests();
                        if (callback) callback();
                        this.renderInventory();
                        this._currentWonItem = null; this._currentAnimCallback = null;
                    }, 500);
                    return;
                }
                const prog = el / dur, ease = 1 - Math.pow(1 - prog, 3);
                const co = td * ease, disp = ((co % tw) + tw) % tw;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                this.drawItems(ctx, items, disp, iw);
                this.drawCenterLine(ctx, canvas);
                requestAnimationFrame(draw);
            };
            requestAnimationFrame(draw);
        }

        drawItems(ctx, items, off, iw) {
            const c = ctx.canvas; const sx = -off; const gap = 2;
            for (let i = 0; i < items.length * 2; i++) {
                const idx = i % items.length;
                const x = sx + i * iw;
                if (x > -iw && x < c.width + iw) {
                    const it = items[idx];
                    if (it.imageObj && it.imageObj.complete) {
                        ctx.drawImage(it.imageObj, x + gap, 18, iw - 2 * gap, c.height - 36);
                        ctx.fillStyle = this.rarityColors[it.rarity] || '#888';
                        ctx.fillRect(x + gap, c.height - 18, iw - 2 * gap, 6);
                    } else {
                        ctx.fillStyle = this.rarityColors[it.rarity] || '#888';
                        ctx.fillRect(x + gap, 16, iw - 2 * gap, c.height - 32);
                        ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif'; ctx.fillText(it.weaponType, x + gap + 4, 40);
                        ctx.font = '12px sans-serif'; ctx.fillText(it.skinName || '', x + gap + 4, 60);
                    }
                }
            }
        }

        drawCenterLine(ctx, c) {
            const cx = c.width / 2;
            ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, c.height); ctx.stroke();
        }

        startBulkOpen(itemId) {
            const item = this.state.inventory.find(i => i.id === itemId);
            if (!item) return;
            const sameCases = this.state.inventory.filter(i => i.type === item.type && i.collection === item.collection);
            if (sameCases.length === 0) { alert('Нет других таких кейсов'); return; }
            this._bulkCases = sameCases;
            const modal = document.getElementById('bulk-open-modal');
            const content = document.getElementById('bulk-open-content');
            modal.classList.add('active');
            this._bulkSelected = new Set();
            const totalAvailable = sameCases.length;
            const maxSelect = Math.min(100, totalAvailable);
            let html = `<button class="modal-close-btn" onclick="Game.closeModal()">✕</button>
            <div class="bulk-controls"><button onclick="Game.changeBulkQuantity(-1)">-</button><input type="number" id="bulk-qty-input" value="1" min="0" max="${maxSelect}" style="width:60px;" oninput="Game.validateBulkQuantity()"><button onclick="Game.changeBulkQuantity(1)">+</button></div>
            <p style="margin:5px 0;">Выбрано: <span id="bulk-count">1</span>/100 (всего ${totalAvailable})</p>
            <button onclick="Game.confirmBulkOpen('${item.collection}')" style="margin-bottom:10px;">Открыть выбранные</button>
            <div class="inventory-grid" id="bulk-grid">`;
            sameCases.forEach(c => {
                const displayName = this.collectionDisplayNames[c.collection] || c.collection;
                html += `<div class="item-card" data-id="${c.id}" onclick="Game.toggleBulkSelect('${c.id}')" id="bulkitem-${c.id}"><img src="${c.image}" class="item-img"><span class="item-name">${displayName}</span></div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
            this._applyBulkQuantity(1);
        }

        changeBulkQuantity(delta) {
            const input = document.getElementById('bulk-qty-input');
            if (!input) return;
            let val = parseInt(input.value) || 0;
            const max = Math.min(100, this._bulkCases.length);
            val = Math.max(0, Math.min(max, val + delta));
            input.value = val;
            this._applyBulkQuantity(val);
        }

        validateBulkQuantity() {
            const input = document.getElementById('bulk-qty-input');
            if (!input) return;
            let val = parseInt(input.value) || 0;
            const max = Math.min(100, this._bulkCases.length);
            if (val > max) val = max;
            if (val < 0) val = 0;
            input.value = val;
            this._applyBulkQuantity(val);
        }

        _applyBulkQuantity(qty) {
            this._bulkSelected = new Set();
            for (let i = 0; i < qty && i < this._bulkCases.length; i++) this._bulkSelected.add(this._bulkCases[i].id);
            this._updateBulkUI();
        }

        toggleBulkSelect(id) {
            if (this._bulkSelected.has(id)) this._bulkSelected.delete(id);
            else { if (this._bulkSelected.size >= 100) return; this._bulkSelected.add(id); }
            const input = document.getElementById('bulk-qty-input');
            if (input) input.value = this._bulkSelected.size;
            this._updateBulkUI();
        }

        _updateBulkUI() {
            const allCards = document.querySelectorAll('#bulk-grid .item-card');
            allCards.forEach(card => {
                const id = card.dataset.id;
                if (this._bulkSelected.has(id)) card.classList.add('selected-for-transfer');
                else card.classList.remove('selected-for-transfer');
            });
            const countSpan = document.getElementById('bulk-count');
            if (countSpan) countSpan.textContent = this._bulkSelected.size;
            const input = document.getElementById('bulk-qty-input');
            if (input) input.value = this._bulkSelected.size;
        }

        confirmBulkOpen(collection) {
            if (this._bulkSelected.size === 0) return;
            const ids = Array.from(this._bulkSelected).slice(0, 100);
            const casesToOpen = [];
            ids.forEach(id => {
                const idx = this.state.inventory.findIndex(i => i.id === id);
                if (idx !== -1) { casesToOpen.push(this.state.inventory[idx]); this.state.inventory.splice(idx, 1); }
            });
            const drops = [];
            casesToOpen.forEach(c => {
                const won = this.generateItem(c.collection, c.dropType);
                if (won) { this.addItem(won); drops.push(won); }
            });
            this.saveState();
            this.renderInventory();
            this.closeModal();
            if (drops.length > 0) {
                this._bulkDrops = drops;
                this._bulkCurrentIdx = 0;
                this.showItemDetail(drops[0], null, drops, 0);
            }
        }

            document.querySelectorAll('.modal').forEach(m => { if (m.id !== 'console-modal') m.classList.remove('active'); });
            this.renderInventory();
        }

            c.innerHTML = `<h2>${t('market_title')}</h2>

        applyMarketFilters() {
            const mf = this.state.marketFilters;
            mf.type = document.getElementById('market-filter-type')?.value || 'all';
            mf.rarity = document.getElementById('market-filter-rarity')?.value || 'all';
            mf.collection = document.getElementById('market-filter-collection')?.value || 'all';
            mf.name = document.getElementById('market-filter-name')?.value || '';
            this.saveState();
            const grid = document.getElementById('market-grid'); if (!grid) return;
            const skins = new Map();
            for (const [cn, col] of Object.entries(this.collections)) {
                if (mf.collection !== 'all' && cn !== mf.collection) continue;
                const allItems = [];
                if (col.weaponsByRarity) for (const pool of Object.values(col.weaponsByRarity)) allItems.push(...pool.map(w => ({...w, type:'weapon', collection:cn})));
                if (col.knife) allItems.push(...col.knife.map(k => ({...k, type:'knife', collection:cn})));
                if (col.stickersByRarity) for (const pool of Object.values(col.stickersByRarity)) allItems.push(...pool.map(s => ({...s, type:'sticker', collection:cn})));
                if (col.agentsByRarity) for (const pool of Object.values(col.agentsByRarity)) allItems.push(...pool.map(a => ({...a, type:'agent', collection:cn})));
                for (const d of allItems) {
                    if (mf.type !== 'all' && d.type !== mf.type) continue;
                    if (mf.rarity !== 'all' && d.rarity !== mf.rarity) continue;
                    const name = typeof d === 'string' ? d : d.name;
                    if (mf.name && !name.toLowerCase().includes(mf.name.toLowerCase())) continue;
                    if (!skins.has(name)) skins.set(name, d);
                }
            }
            grid.innerHTML = '';
            if (skins.size === 0) { grid.innerHTML = `<p style="grid-column:1/-1">${this.t('market_no_items')}</p>`; return; }
            const sorted = Array.from(skins.values()).sort((a,b) => {
                const ra = this.rarities.indexOf(a.rarity), rb = this.rarities.indexOf(b.rarity);
                if (ra !== rb) return rb - ra;
                return (a.name || '').localeCompare(b.name || '');
            });
            sorted.forEach(d => {
                const name = typeof d === 'string' ? d : d.name;
                const minPrice = d.minPrice != null ? d.minPrice : 0.1;
                const displayMin = (minPrice * 0.7).toFixed(2);
                const item = { name, rarity: d.rarity, weaponType: name.split(' | ')[0], skinName: name.split(' | ').slice(1).join(' | '), type: d.type, collection: d.collection, emoji: d.emoji || '', imageUrl: d.imageUrl || '', minPrice: minPrice };
                item.image = item.imageUrl || this.generateItemImage(item);
                const card = document.createElement('div'); card.className = 'item-card'; card.dataset.rarity = item.rarity;
                card.innerHTML = `<img src="${item.image}" class="item-img"><span class="item-name">${item.weaponType} ${item.skinName}</span><span style="color:var(--gold);">от ₽${displayMin}</span>`;
                card.addEventListener('click', () => this.showMarketItemDetail(item));
                grid.appendChild(card);
            });
        }
