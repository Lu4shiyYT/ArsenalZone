        generateMarketOffers(skinName, collection, type, rarity, minPrice, imageUrl) {
            const listDiv = document.getElementById('market-item-list'); if (!listDiv) return;
            const wearCat = document.getElementById('offer-wear')?.value || 'all';
            const wearMinStr = document.getElementById('offer-wear-min')?.value;
            const wearMaxStr = document.getElementById('offer-wear-max')?.value;
            const wearMin = this.parseWearInput(wearMinStr);
            const wearMax = this.parseWearInput(wearMaxStr);
            const pmin = parseInt(document.getElementById('offer-pat-min')?.value);
            const pmax = parseInt(document.getElementById('offer-pat-max')?.value);
            const st = document.getElementById('offer-stattrack')?.checked || false;
            const withStickers = document.getElementById('offer-with-stickers')?.checked || false;
            const withCharms = document.getElementById('offer-with-charms')?.checked || false;
            if ((wearMinStr && isNaN(wearMin)) || (wearMaxStr && isNaN(wearMax))) {
                listDiv.innerHTML = `<p style="color:red">${this.t('offer_error')}</p>`;
                return;
            }
            // Если запрошены брелоки, их сейчас нет - сразу выходим
            if (withCharms) {
                listDiv.innerHTML = `<p>${this.t('offer_no_items')}</p>`;
                return;
            }
            const offers = [];
            let attempts = 0;
            const maxAttempts = 1000;
            while (offers.length < 10 && attempts < maxAttempts) {
                attempts++;
                const item = this.generateItem(collection, type, true);
                if (!item) continue;
                item.name = skinName;
                const parts = skinName.split(' | '); item.weaponType = parts[0]; item.skinName = parts.slice(1).join(' | ');
                item.collection = collection; item.rarity = rarity; item.minPrice = minPrice;
                item.imageUrl = imageUrl;
                if (type === 'weapon' || type === 'knife') {
                    if (!isNaN(wearMin) && !isNaN(wearMax) && wearMin <= wearMax) {
                        item.wear = wearMin + Math.random() * (wearMax - wearMin);
                    } else {
                        item.wear = Math.random() * 0.9999999998 + 0.0000000001;
                    }
                    if (item.wear < 0.05) item.wearCategory = 'Freshly Made';
                    else if (item.wear < 0.20) item.wearCategory = 'Practically New';
                    else if (item.wear < 0.50) item.wearCategory = 'Lightly-Used';
                    else if (item.wear < 0.70) item.wearCategory = 'Worn';
                    else item.wearCategory = 'Heavily-Worn';
                    if (wearCat !== 'all' && (!isNaN(wearMin) || !isNaN(wearMax))) {
                        // если задан диапазон, не фильтруем по категории
                    } else if (wearCat !== 'all' && item.wearCategory !== wearCat) {
                        continue;
                    }
                    if (!isNaN(pmin) && !isNaN(pmax)) item.pattern = pmin + Math.floor(Math.random() * (pmax - pmin + 1));
                    else if (!isNaN(pmin)) item.pattern = pmin;
                    else if (!isNaN(pmax)) item.pattern = pmax;
                    item.statTrack = st;
                }
                if (type === 'weapon') {
                    const stickerChance = Math.random();
                    if (stickerChance < 0.005) item.stickers = this.generateStickers(5);
                    else if (stickerChance < 0.025) item.stickers = this.generateStickers(4);
                    else if (stickerChance < 0.095) item.stickers = this.generateStickers(3);
                    else if (stickerChance < 0.195) item.stickers = this.generateStickers(2);
                    else if (stickerChance < 0.395) item.stickers = this.generateStickers(1);
                }
                if (withStickers && (!item.stickers || item.stickers.length === 0)) continue;
                item.seller = this.sellerNames[Math.floor(Math.random() * this.sellerNames.length)];
                const basePrice = this.getItemPrice(item);
                const minAllowed = minPrice * 0.7;
                const lowerCoeff = Math.max(0.7, minAllowed / basePrice);
                const upperCoeff = Math.max(lowerCoeff, 1.3);
                item.sellerMarkup = lowerCoeff + Math.random() * (upperCoeff - lowerCoeff);
                let price = basePrice * item.sellerMarkup;
                item._marketPrice = price;
                item.image = item.imageUrl || this.generateItemImage(item);
                offers.push(item);
            }
            this._currentMarketOffers = offers;
            offers.sort((a,b) => a._marketPrice - b._marketPrice);
            listDiv.innerHTML = '';
            if (offers.length === 0) { listDiv.innerHTML = `<p>${this.t('offer_no_items')}</p>`; return; }
            offers.forEach(item => {
                const card = document.createElement('div'); card.className = 'item-card'; card.dataset.rarity = item.rarity;
                const stickersHtml = (item.stickers||[]).map(s => s.imageUrl ? `<img src="${s.imageUrl}" title="${s.name}" style="width:20px;height:15px;object-fit:contain;">` : '').join('');
                card.innerHTML = `<img src="${item.image}" class="item-img"><span class="item-name">${item.weaponType}</span>${item.statTrack ? '<span class="stattrack-label">StatTrack™</span>' : ''}<div class="item-stickers">${stickersHtml}</div><span>₽${item._marketPrice.toFixed(2)}</span>`;
                card.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    this.showMarketOfferDetail(item);
                });
                const wrapper = document.createElement('div');
                wrapper.className = 'market-item-wrapper';
                wrapper.appendChild(card);
                const buyBtn = document.createElement('button');
                buyBtn.textContent = 'Купить';
                buyBtn.style.margin = '2px 0';
                buyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`Купить у ${item.seller} за ₽${item._marketPrice.toFixed(2)}?`)) {
                        this.buyMarketOffer(item, item._marketPrice);
                    }
                });
                wrapper.appendChild(buyBtn);
                listDiv.appendChild(wrapper);
            });
        }

        showMarketOfferDetail(item) {
            const modal = document.getElementById('item-detail-modal');
            modal.classList.add('active');
            this.showItemDetail(item, null, null, 0, true);
        }

        buyMarketOfferFromDetail(itemId, price) {
            const item = this._currentMarketOffers.find(o => o.id === itemId);
            if (item) {
                if (confirm(`Купить этот предмет за ₽${price.toFixed(2)}?`)) {
                    this.buyMarketOffer(item, price);
                }
            }
        }

        generateStickers(count) {
            const stickers = [];
            const allStickers = [];
            for (const col of Object.values(this.collections)) {
                if (col.stickersByRarity) for (const pool of Object.values(col.stickersByRarity)) allStickers.push(...pool);
            }
            const sorted = allStickers.sort((a,b) => (this.rarities.indexOf(a.rarity) - this.rarities.indexOf(b.rarity)));
            for (let i = 0; i < count; i++) {
                const roll = Math.random();
                let pick;
                if (roll < 0.5) pick = sorted[Math.floor(Math.random() * sorted.length * 0.3)];
                else if (roll < 0.8) pick = sorted[Math.floor(Math.random() * sorted.length * 0.6)];
                else pick = sorted[Math.floor(Math.random() * sorted.length)];
                if (pick) stickers.push({ name: pick.name, imageUrl: pick.imageUrl, minPrice: pick.minPrice, rarity: pick.rarity });
            }
            return stickers;
        }

        buyMarketOffer(item, price) {
            if (this.state.balance < price) return alert('Недостаточно ₽');
            this.state.balance -= price;
            delete item.seller; delete item.sellerMarkup; delete item._hasCharm; delete item._marketPrice;
            this.addItem(item); this.saveState(); this.updateBalanceDisplay(); this.renderInventory();
            const listDiv = document.getElementById('market-item-list');
            if (listDiv) {
                const wrappers = listDiv.querySelectorAll('.market-item-wrapper');
                wrappers.forEach(w => {
                    if (w.querySelector('.seller-name')?.textContent === item.seller) w.remove();
                });
            }
        }

        // Minigames
        prepareMinigamesView() {
            const v = document.getElementById('view-minigames');
            if (v) v.innerHTML = `<h2>${this.t('minigames')}</h2><button onclick="Game.startUpgrader()">⬆️ Апгрейдер (10₽)</button><button onclick="Game.startTicTacToe()">❌⭕ Крестики-нолики (энергия 1)</button><div id="minigame-container"></div>`;
        }
        startUpgrader() {
            const items = this.state.inventory.filter(i => i.type !== 'case' && i.type !== 'capsule');
            if (items.length === 0) return alert('Нет предметов');
            if (this.state.balance < 10) return alert('Недостаточно ₽');
            this.state.balance -= 10; this.saveState(); this.updateBalanceDisplay();
            const item = items[Math.floor(Math.random() * items.length)];
            const r = Math.random();
            if (r < 0.7) { item.wear = Math.max(0.0000000001, item.wear - 0.05); alert('Износ улучшен!'); }
            else if (r < 0.95) alert('Ничего не изменилось.');
            else if (r < 0.99) {
                const idx = this.rarities.indexOf(item.rarity);
                if (idx < this.rarities.length - 1) { item.rarity = this.rarities[idx + 1]; item.image = item.imageUrl || this.generateItemImage(item); alert('Редкость повышена!'); }
                else alert('Максимальная редкость.');
            } else { this.state.inventory = this.state.inventory.filter(i => i.id !== item.id); alert('Предмет сломан!'); }
            this.saveState(); this.renderInventory();
        }
        startTicTacToe() {
            if (this.state.energy < 1) return alert('Нет энергии');
            this.state.energy--; this.updateEnergyDisplay();
            const container = document.getElementById('minigame-container'); if (!container) return;
            container.innerHTML = '';
            const board = Array(9).fill(null); let gameOver = false;
            const renderBoard = () => {
                container.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.style = 'width:60px;height:60px;border:1px solid #555;display:inline-flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;';
                    cell.textContent = board[i] || '';
                    cell.onclick = () => {
                        if (gameOver || board[i]) return;
                        board[i] = 'X'; renderBoard();
                        if (checkWin(board, 'X')) { gameOver = true; this.handleTTTResult('win'); return; }
                        if (board.every(c => c)) { gameOver = true; this.handleTTTResult('draw'); return; }
                        this.tttAI(board); renderBoard();
                        if (checkWin(board, 'O')) { gameOver = true; this.handleTTTResult('lose'); return; }
                        if (board.every(c => c)) { gameOver = true; this.handleTTTResult('draw'); }
                    };
                    container.appendChild(cell);
                }
            }; renderBoard();
        }
        tttAI(board) {
            const empty = board.map((v,i) => v === null ? i : null).filter(v => v !== null);
            if (empty.length === 0) return;
            let best = -Infinity, move = empty[0];
            for (let i of empty) { board[i] = 'O'; const score = this.minimax(board, 0, false); board[i] = null; if (score > best) { best = score; move = i; } }
            board[move] = 'O';
        }
        minimax(board, depth, isMax) {
            if (checkWin(board, 'O')) return 10 - depth;
            if (checkWin(board, 'X')) return depth - 10;
            if (board.every(c => c)) return 0;
            const empty = board.map((v,i) => v === null ? i : null).filter(v => v !== null);
            if (isMax) { let best = -Infinity; for (let i of empty) { board[i] = 'O'; best = Math.max(best, this.minimax(board, depth + 1, false)); board[i] = null; } return best; }
            else { let best = Infinity; for (let i of empty) { board[i] = 'X'; best = Math.min(best, this.minimax(board, depth + 1, true)); board[i] = null; } return best; }
        }
        handleTTTResult(result) {
            if (result === 'win') { this.state.balance += 5; this.state.stats.tttWins = (this.state.stats.tttWins || 0) + 1; alert('Победа! +5₽'); }
            else if (result === 'draw') { this.state.balance += 1; alert('Ничья! +1₽'); }
            else alert('Поражение.');
            this.saveState(); this.updateBalanceDisplay(); this.renderMinigames();
        }

        // Profile

        // Shop

            const v = document.getElementById('view-shop'); if (!v) return;
            v.innerHTML = `<h2>${this.t('shop_title')}</h2><div id="shop-items"></div>`;
            this.renderShopContent();
        }
        renderShop() { this.renderShopContent(); }
        renderShopContent() {
            const c = document.getElementById('shop-items'); if (!c) return;
            const t = this.t.bind(this);
            const off = [
                { displayName:'Armor Case', collection:'Armor', type:'case', dropType:'weapon', price:37, emoji:'📦', imageUrl:'https://i.ibb.co/wrSZMZZZ/Armor-Case.png' },
                { displayName:'Biohazard Case', collection:'Biohazard', type:'case', dropType:'weapon', price:45, emoji:'📦', imageUrl:'https://i.ibb.co/KzXtC1tL/Biohazard-Case.png' },
                { displayName:'Tropical Ash Sticker Capsule', collection:'Tropical Ash', type:'capsule', dropType:'sticker', price:73, emoji:'🏷️', imageUrl:'https://i.ibb.co/dwSdJTxQ/Tropical-Ash-Capsule.png' },
                { displayName:'Street Scrawl Sticker Capsule', collection:'Street Scrawl', type:'capsule', dropType:'sticker', price:95, emoji:'🏷️', imageUrl:'https://i.ibb.co/KcnjtKVv/Street-Scrawl-capsule.png' },

                return `<div style="margin:5px 0;background:var(--panel);padding:10px;border-radius:5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;"><span>${img} ${o.displayName} - ${t('price')}: ₽${o.price}</span><div style="display:flex;align-items:center;gap:5px;"><button onclick="Game.changeShopQuantity('${colId}', -1, ${o.price})">-</button><input type="number" id="qty-${colId}" value="1" min="1" max="100" style="width:60px;" oninput="Game.validateShopQuantity('${colId}', ${o.price})"><button onclick="Game.changeShopQuantity('${colId}', 1, ${o.price})">+</button><button id="buy-btn-${colId}" onclick="Game.buyMultipleCases('${colId}', '${o.collection}', '${o.type}', '${o.dropType}', ${o.price}, '${o.emoji}', '${o.imageUrl}')">${t('buy')} (₽${o.price})</button></div></div>`;
            }).join('') + `<hr><button onclick="Game.openTrade()">${t('trade_up')}</button><button onclick="Game.buyStorageUnit()">${t('storage_buy')} (${this.state.storageUnits.length}/50)</button>`;
        }
        changeShopQuantity(colId, delta, price) {
            const input = document.getElementById(`qty-${colId}`);
            if (!input) return;
            let val = parseInt(input.value) || 1;
            val = Math.max(1, Math.min(100, val + delta));
            input.value = val;
            this.updateShopPrice(colId, price);
        }
        validateShopQuantity(colId, price) {
            const input = document.getElementById(`qty-${colId}`);
            if (!input) return;
            let val = parseInt(input.value) || 1;
            if (val > 100) { val = 100; input.value = 100; }
            if (val < 1) { val = 1; input.value = 1; }
            this.updateShopPrice(colId, price);
        }
        updateShopPrice(colId, price) {
            const input = document.getElementById(`qty-${colId}`);
            const btn = document.getElementById(`buy-btn-${colId}`);
            if (!input || !btn) return;
            const qty = parseInt(input.value) || 1;
            const total = price * qty;
            btn.textContent = `${this.t('buy')} ${qty} шт. (₽${total.toFixed(2)})`;
        }
        buyMultipleCases(colId, col, type, dropT, price, emoji, imageUrl) {
            const input = document.getElementById(`qty-${colId}`);
            if (!input) return;
            const qty = parseInt(input.value) || 1;
            const total = price * qty;
            if (this.state.balance < total) return alert('Недостаточно ₽');
            this.state.balance -= total;
            for (let i = 0; i < qty; i++) {
                const nc = { id: Date.now() + Math.random().toString(36) + i, type, collection: col, dropType: dropT, name: `${col} ${type === 'case' ? 'Case' : 'Capsule'}`, rarity: 'Usual', wear: 0, wearCategory: '', pattern: 0, stickers: [], isFavorite: false, emoji: emoji, imageUrl: imageUrl, sellable: false };
                nc.image = nc.imageUrl || this.generateItemImage(nc);
                this.state.inventory.push(nc);
            }
            this.saveState(); this.updateBalanceDisplay(); this.renderInventory();
            this.addConsoleLog(`Куплено ${qty} кейсов ${col}`);
        }

        buyStorageUnit() {
            if (this.state.storageUnits.length >= 50) return alert(this.t('storage_max'));
            if (this.state.balance < 2000) return alert('Недостаточно ₽');
            this.state.balance -= 2000;
            this.state.storageUnits.push({ id: 'su_' + Date.now() + Math.random().toString(36), name: `Хранилище #${this.state.storageUnits.length + 1}`, items: [] });
            this.saveState(); this.updateBalanceDisplay(); this.renderShop(); this.renderInventory();
            this.addConsoleLog('Куплено новое хранилище');

        // Storage
        showStorage(unitId) {
            const unit = this.state.storageUnits.find(u => u.id === unitId);
            if (!unit) return;
            const modal = document.getElementById('storage-modal');
            const content = document.getElementById('storage-content');
            modal.classList.add('active');
            const t = this.t.bind(this);
            const filters = this.getStorageFilters(unitId);
            const ft = filters.filterType || 'all', fr = filters.filterRarity || 'all', fs = filters.filterStatTrack || 'all', fw = filters.filterWear || 'all', fc = filters.filterCollection || 'all', pmn = filters.filterPatternMin || '', pmx = filters.filterPatternMax || '';
            const filteredItems = this.getFilteredStorageItems(unitId);
            if (this._storageReturnMode && this._storageReturnUnitId === unitId) {
                this._storageReturnFilteredItems = filteredItems;
                const totalAvailable = filteredItems.length;
                const maxSelect = Math.min(100, totalAvailable);
                let html = `<div class="storage-header"><h2>${unit.name} - Возврат предметов</h2><button onclick="Game.cancelStorageReturn()" style="background:transparent;border:none;color:white;font-size:1.5rem;">✕</button></div><div class="bulk-controls"><button onclick="Game.changeStorageReturnQuantity(-1)">-</button><input type="number" id="storage-return-qty-input" value="${this._storageReturnSelected.size}" min="0" max="${maxSelect}" style="width:60px;" oninput="Game.validateStorageReturnQuantity()"><button onclick="Game.changeStorageReturnQuantity(1)">+</button></div><p>Выбрано: <span id="storage-return-count">${this._storageReturnSelected.size}</span>/100 (всего ${totalAvailable})</p><button onclick="Game.confirmStorageReturn()">${t('storage_return_selected')}</button><div class="inventory-grid" id="storage-return-grid">`;
                filteredItems.forEach(item => {
                    if (!item.image) item.image = item.imageUrl || this.generateItemImage(item);
                    const isSelected = this._storageReturnSelected.has(item.id);
                    const stickersHtml = (item.stickers || []).map(s => s.imageUrl ? `<img src="${s.imageUrl}" title="${s.name}" style="width:20px;height:15px;object-fit:contain;">` : '').join('');
                    const favHtml = item.isFavorite ? '<span class="favorite-badge">⭐</span>' : '';
                    const statHtml = item.statTrack ? '<span class="stattrack-label">StatTrack™</span>' : '';
                    const isCase = item.type === 'case' || item.type === 'capsule';
                    const displayName = isCase ? (this.collectionDisplayNames[item.collection] || item.collection) : item.weaponType;
                    const collectionOrSkin = isCase ? item.collection : (item.skinName || '');
                    html += `<div class="item-card ${isSelected ? 'selected-for-transfer' : ''}" data-rarity="${item.rarity}" onclick="Game.toggleStorageReturnSelection('${item.id}')">${favHtml}${statHtml}<img src="${item.image}" class="item-img"><span class="item-name">${displayName}</span><span class="item-wear">${collectionOrSkin}</span><div class="item-stickers">${stickersHtml}</div><div class="rarity-bar" style="background:${this.rarityColors[item.rarity] || '#888'};"></div></div>`;
                });
                html += `</div>`;
                content.innerHTML = html;

        importSavePrompt() { const input = document.createElement('input'); input.type = 'file'; input.accept = '.json'; input.onchange = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const data = JSON.parse(ev.target.result); data.consoleLog = Array.isArray(data.consoleLog) ? data.consoleLog : []; data.storageUnits = Array.isArray(data.storageUnits) ? data.storageUnits : []; data.inventory.forEach(i => { if (!i.image) i.image = i.imageUrl || this.generateItemImage(i); }); this.state = data; this.saveState(); location.reload(); } catch { alert('Неверный файл'); } }; reader.readAsText(file); }; input.click(); }
        resetProgress() { if (confirm('Удалить весь прогресс?')) { try { localStorage.removeItem('arsenalzone_save'); } catch(e) {} this._memory = {}; location.reload(); } }
        updateUILanguage() { document.querySelectorAll('nav button').forEach(b => { b.textContent = this.t(b.dataset.view); }); this.renderInventory(); this.renderProfile(); this.renderMinigames(); this.renderShop(); }
        renderMinigames() { this.prepareMinigamesView(); }
    }

    function checkWin(board, player) {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return wins.some(w => w.every(i => board[i] === player));
    }

    window.addEventListener('load', () => { window.Game = new ArsenalZone(); });
    </script>
</body>
